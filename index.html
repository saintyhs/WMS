// 업로드 약어 → 내부 jointType 매핑
// B 계열: SV→ButtV, DV→ButtX, SB→ButtBevel, DB→ButtK (Fillet 없음)
// T 계열: SBSF/SBDF→TJointBevel(z2=0/z1=z2), DBSF/DBDF→TJointK(z2=0/z1=z2)
// TKY: SB→TKY, DB→TKYDB (+ 경사각 tkyAngle)
function mapJointCode(row){
  const fam=(row.jointType||'').trim().toUpperCase();   // B / T / TKY
  const gv=(row.groove||'').trim().toUpperCase();        // SV/DV/SB/DB/SBSF/...
  const r={...row};
  let code=null;
  if(fam==='B'||fam==='BUTT'){
    code=({I:'ButtSquare',SV:'ButtV',DV:'ButtX',SB:'ButtBevel',DB:'ButtK',SU:'ButtU',SJ:'ButtJ'})[gv];
  } else if(fam==='T'||fam==='TJOINT'||fam==='T-JOINT'){
    // groove 약어에서 개선(SB/DB) + Fillet(SF/DF) 파싱
    const m=gv.match(/^(SB|DB)(SF|DF)?$/);
    if(m){
      code = m[1]==='SB' ? 'TJointBevel' : 'TJointK';
      // SF: 일면 fillet(z1만) / DF: 양면(z1,z2) / 미지정: z1만
      if(m[2]==='DF'){ if(r.z2===undefined||r.z2==='') r.z2=(r.z1!==undefined&&r.z1!=='')?r.z1:8; }
      else { r.z2=0; }   // SF 또는 미지정 → 뒷면 fillet 없음
    }
  } else if(fam==='TKY'){
    code = (gv==='DB') ? 'TKYDB' : 'TKY';   // 기본 SB
    // TKY 경사각: tkyAngle 우선 → tAngle → ang 순
    const ta=String(r.tkyAngle||'').trim().toUpperCase();
    if(ta===''||ta==='N/A'||ta==='NA'){
      if(r.tAngle!==undefined && r.tAngle!=='' && String(r.tAngle).toUpperCase()!=='N/A') r.tkyAngle=r.tAngle;
      else if(r.ang!==undefined && r.ang!=='') r.tkyAngle=r.ang;
    }
    // brace 두께: tkyt 없으면 모재1 T 사용
    const tt=String(r.tkyt||'').trim().toUpperCase();
    if((tt===''||tt==='N/A'||tt==='NA') && r.T!==undefined && r.T!=='') r.tkyt=r.T;
  }
  // 직접 내부코드를 넣은 경우(ButtV 등)도 허용
  if(!code){
    const direct=(row.jointType||'').trim();
    if(['ButtSquare','ButtV','ButtX','ButtBevel','ButtK','ButtU','ButtJ','Fillet','TJoint','TJointBevel','TJointK','TKY','TKYDB'].includes(direct)) code=direct;
  }
  r.jointType=code||'ButtV';
  return r;
}
function calcRow(rawRow){
  const row=mapJointCode(rawRow);
  // 드롭다운 값 정규화: Alignment(Center/Heel→소문자), backGouge/buttDiff(Y/N)
  if(row.diffAlign){ row.diffAlign=String(row.diffAlign).trim().toLowerCase(); }
  if(row.backGouge!==undefined){ const b=String(row.backGouge).trim().toUpperCase(); row.backGouge=(b==='Y'||b==='YES'||b==='TRUE')?'Y':'N'; }
  const rho=parseFloat(row.rho)||(RHO_MAP[row.material]||7.85);
  const proc=row.process||'SMAW';
  const eff=parseFloat(row.efficiency)||(PROC[proc]?.iiw||80);
  return computeDeposit({...row,rho,efficiency:eff});
}

function prjUpload(file){
  if(!file) return;
  const fr=new FileReader();
  fr.onload=e=>{
    let data;
    try{ data=MiniXLSX.parseCSV(e.target.result); }
    catch(err){ toast(tr('파일을 읽을 수 없습니다. CSV로 저장 후 다시 시도하세요.')); return; }
    if(!data.length){ toast(tr('데이터가 없습니다. 양식을 확인하세요.')); return; }
    // 헤더(그룹/키/라벨/설명)행 제거 — jointType이 유효 코드인 행만
    const VALIDFAM=new Set(['B','BUTT','T','TJOINT','T-JOINT','TKY']);
    const VALIDISO=new Set(Object.keys(ISO));
    data=data.filter(r=>{ const j=(r.jointType||'').trim(); return VALIDFAM.has(j.toUpperCase())||VALIDISO.has(j); });
    if(!data.length){ toast(tr('유효한 Joint 행이 없습니다. jointType을 확인하세요.')); return; }
    // 행별 project 컬럼 사용. 비어 있으면 경고.
    const noProj=data.filter(r=>!(r.project||'').trim());
    if(noProj.length){ toast(tr('양식의 project 열을 채우세요')); return; }
    const byProj={};
    data.forEach(row=>{
      const pj=(row.project||'').trim();
      const qty=Math.max(1, parseInt(row.qty)||1);
      const mapped=mapJointCode(row);
      const rec={...row, jointType:mapped.jointType, jointCode:(row.jointType||'').trim(), groove:(row.groove||'').trim(), component:(row.component||'-').trim()||'-', jointNo:(row.jointNo||'').trim(), qty, z2:mapped.z2, tkyAngle:mapped.tkyAngle, _r:calcRow(row)};
      (byProj[pj]=byProj[pj]||[]).push(rec);
    });
    let total=0, last='';
    Object.entries(byProj).forEach(([pj,rs])=>{ prjData[pj]=(prjData[pj]||[]).concat(rs); total+=rs.length; last=pj; });
    prjStore();
    document.getElementById('prj-status').innerHTML='<span class="ok-tag">✓ '+total+tr('개 Joint 계산 완료')+'</span>';
    const fsel=document.getElementById('prj-filter'); if(fsel) fsel.value=last;
    renderPrj();
    toast('✓ '+total+tr('개 Joint 누적')+(Object.keys(byProj).length>1?' ('+Object.keys(byProj).length+tr('개 프로젝트')+')':' — '+last));
  };
  fr.readAsText(file,'UTF-8');
}

function blRegister(){

    weldLength:$('weldLength').value };

  if(jt==='TKY'||jt==='TKYDB'){ const tt=$('tkyType'); if(tt) rec.tkyType=tt.value; }

// 재사용 SVG 가로 막대 차트 — entries:[[label,value],...], unit, decimals, forceColor(optional)
function svgBarChart(entries, opt){
  opt=opt||{};
  const unit=opt.unit||'', dec=(opt.dec!=null?opt.dec:1);
  const dk=opt.dark!=null?opt.dark:(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  const barColor=opt.color||(dk?'#2bb24c':'#00843D');
  const track=dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
  const txt=opt.txt||(dk?'#e6e6eb':'#1d1d1f'), sub=opt.sub||(dk?'#9a9aa2':'#6b6b70');
  if(!entries.length) return '';
  const max=Math.max(...entries.map(e=>e[1]),1e-9);
  const total=entries.reduce((s,e)=>s+e[1],0);
  const W=560, rowH=46, padT=8, padB=8, labelW=opt.labelW||130, valW=110, barX=labelW+8, barW=W-barX-valW;
  const H=padT+padB+entries.length*rowH;
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;font-family:inherit" xmlns="http://www.w3.org/2000/svg">`;
  entries.forEach((e,i)=>{
    const [label,val]=e;
    const y=padT+i*rowH, cy=y+rowH/2;
    const bw=Math.max(barW*(val/max),2);
    const pct=total>0?Math.round(val/total*100):0;
    const lbl=String(label).length>16?String(label).slice(0,15)+'…':label;
    svg+=`<text x="${labelW}" y="${cy}" text-anchor="end" dominant-baseline="central" font-size="13" font-weight="700" fill="${txt}">${lbl}</text>`;
    svg+=`<rect x="${barX}" y="${cy-11}" width="${barW}" height="22" rx="5" fill="${track}"/>`;
    svg+=`<rect x="${barX}" y="${cy-11}" width="${bw}" height="22" rx="5" fill="${barColor}"/>`;
    svg+=`<text x="${W}" y="${cy-2}" text-anchor="end" dominant-baseline="central" font-size="13" font-weight="800" fill="${txt}">${rnd(val,dec)} ${unit}</text>`;
    svg+=`<text x="${W}" y="${cy+12}" text-anchor="end" dominant-baseline="central" font-size="10.5" fill="${sub}">${pct}%</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

function prjAgg(rows){
  // 합계: 용착량(kg), 이론 소모(kg) — qty 반영
  const sum=(f)=>rows.reduce((s,r)=>s+f(r)*r.qty,0);
  return { joints:rows.reduce((s,r)=>s+r.qty,0), lines:rows.length,
    dep:sum(r=>r._r.mass||0), rod:sum(r=>r._r.rod||0) };
}
function prjCurrentRows(){
  const f=document.getElementById('prj-filter')?.value;
  if(f && prjData[f]) return prjData[f];
  // 선택이 없으면 첫 프로젝트
  const first=Object.keys(prjData)[0];
  return first?prjData[first]:[];
}

function prjExportJSON(){
  if(!Object.keys(prjData).length){ toast(tr('저장할 기록이 없습니다')); return; }
  const blob=new Blob([JSON.stringify({app:'WeldingDepositCalculator',type:'project-dashboard',version:1,projects:prjData},null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='WeldDeposit_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
  toast('✓ '+tr('현황 저장됨'));
}
function prjImportJSON(file){
  if(!file) return;
  const fr=new FileReader();
  fr.onload=()=>{ try{
      const d=JSON.parse(fr.result);
      const projs=d.projects||d;
      if(typeof projs!=='object'){ toast(tr('데이터가 없습니다. 파일을 확인하세요.')); return; }
      let n=0;
      Object.entries(projs).forEach(([name,rows])=>{ if(Array.isArray(rows)){
        // _r 없으면 재계산
        rows.forEach(r=>{ if(!r._r) r._r=calcRow(r); r.qty=Math.max(1,parseInt(r.qty)||1); });
        prjData[name]=(prjData[name]||[]).concat(rows); n+=rows.length; } });
      prjStore(); renderPrj(); toast('✓ '+n+tr('개 Joint 불러옴'));
    }catch(e){ toast(tr('파일을 읽을 수 없습니다. JSON 형식을 확인하세요.')); } };
  fr.readAsText(file);
}

function prjExportExcel(){
  const rows=prjCurrentRows();
  if(!rows.length){ toast(tr('저장할 기록이 없습니다')); return; }
  const sheets=[];

  // ── 1) Joint Data 시트: 업로드 양식 컬럼 그대로 + 뒤에 계산값 (그대로 재업로드 가능한 row data) ──
  // 업로드 양식과 동일한 키 순서
  const FORM_COLS=[
    {k:'project',   t:'project'},
    {k:'component', t:'component'},
    {k:'jointNo',   t:'jointNo'},
    {k:'jointType', t:'jointType'},
    {k:'groove',    t:'groove'},
    {k:'process',   t:'process'},
    {k:'weldLength',t:'weldLength'},
    {k:'qty',       t:'qty'},
    {k:'material',  t:'material'},
    {k:'T',         t:'T'},
    {k:'T2',        t:'T2'},
    {k:'diffAlign', t:'diffAlign'},
    {k:'ang',       t:'ang'},
    {k:'root',      t:'root'},
    {k:'gap',       t:'gap'},
    {k:'ratio',     t:'ratio'},
    {k:'cap',       t:'cap'},
    {k:'z1',        t:'z1'},
    {k:'z2',        t:'z2'},
    {k:'tAngle',    t:'tAngle'},
    {k:'tkyD',      t:'tkyD'},
    {k:'tkyd',      t:'tkyd'},
    {k:'backGouge', t:'backGouge'},
    {k:'remark',    t:'remark'}
  ];
  // 내부 jointType 코드 → 양식 family(jointType) + groove 약어 역매핑
  const CODE2FORM={
    ButtSquare:['B','I'], ButtV:['B','SV'], ButtX:['B','DV'], ButtBevel:['B','SB'],
    ButtK:['B','DB'], ButtU:['B','SU'], ButtJ:['B','SJ'],
    TJoint:['T','SBSF'], TJointBevel:['T','SBSF'], TJointK:['T','DBSF'],
    Fillet:['T','SBSF'], TKY:['TKY','SB'], TKYDB:['TKY','DB']
  };
  const pj=document.getElementById('prj-filter').value;
  const fcur=document.getElementById('prj-filter').value;
  const sel=rows.map(r=>({...r,_p:r.project||fcur}));

  // 헤더: 양식 키 + 계산값 키
  const hdr=FORM_COLS.map(c=>c.t).concat(['_unitDeposit(kg)','_deposit(kg)','_unitConsumed(kg)','_electrode(kg)','_manHours(h)']);
  const jd=[hdr];
  sel.forEach(r=>{
    // 양식 컬럼값: 업로드 row면 원본 키 그대로, 수동추가 row면 내부코드를 양식코드로 역매핑
    const formVal=(k)=>{
      if(k==='project') return r._p||'';
      if(k==='jointType'){
        // 원본 양식 값(B/T/TKY)이 있으면 그대로, 없으면 내부코드 역매핑
        const raw=r.jointType;
        if(raw==='B'||raw==='T'||raw==='TKY') return raw;
        return (CODE2FORM[raw]||['',''])[0];
      }
      if(k==='groove'){
        // 원본 groove가 있으면 그대로
        if(r.groove!==undefined && r.groove!=='') return r.groove;
        const raw=r.jointType;
        if(raw==='B'||raw==='T'||raw==='TKY') return r.groove||'';
        return (CODE2FORM[raw]||['',''])[1];
      }
      const v=r[k];
      return (v===undefined||v===null)?'':v;
    };
    const formRow=FORM_COLS.map(c=>formVal(c.k));
    const mh=rowManHours(r);
    const calcRowVals=[ rnd(r._r.mass,4), rnd(r._r.mass*r.qty,3), rnd(r._r.rod,4), rnd(r._r.rod*r.qty,3), rnd(mh,2) ];
    jd.push(formRow.concat(calcRowVals));
  });
  sheets.push({name:'Joint Data',rows:jd});

  // ── 2) 프로세스별 집계 ──
  const gp={}; rows.forEach(r=>{ const k=r.process||'-'; (gp[k]=gp[k]||[]).push(r); });
  const ps=[[tr('프로세스'),tr('Joint 수'),tr('용착량(kg)'),tr('필요 용접봉(kg)'),tr('투입 시수(h)'),tr('효율(%)')]];
  Object.keys(gp).sort().forEach(k=>{ const a=prjAgg(gp[k]); const mh=gp[k].reduce((s,r)=>s+rowManHours(r),0); ps.push([tr(PROC[k]?.n||k),a.joints,rnd(a.dep,2),rnd(a.rod,2),rnd(mh,1),PROC[k]?.iiw||'']); });
  const tot=prjAgg(rows); const totMH=rows.reduce((s,r)=>s+rowManHours(r),0);
  ps.push([tr('합계'),tot.joints,rnd(tot.dep,2),rnd(tot.rod,2),rnd(totMH,1),'']);
  sheets.push({name:tr('프로세스별'),rows:ps});

  // ── 3) Component별 집계 (투입 시수 포함) ──
  const gc={}; rows.forEach(r=>{ const k=r.component||'-'; (gc[k]=gc[k]||[]).push(r); });
  const cs=[[tr('Component'),tr('Joint 수'),tr('용착량(kg)'),tr('필요 용접봉(kg)'),tr('투입 시수(h)')]];
  Object.keys(gc).sort().forEach(k=>{ const a=prjAgg(gc[k]); const mh=gc[k].reduce((s,r)=>s+rowManHours(r),0); cs.push([k,a.joints,rnd(a.dep,2),rnd(a.rod,2),rnd(mh,1)]); });
  cs.push([tr('합계'),tot.joints,rnd(tot.dep,2),rnd(tot.rod,2),rnd(totMH,1)]);
  sheets.push({name:tr('Component별'),rows:cs});

  downloadBlob(MiniXLSX.writeFile(sheets), tr('WeldDeposit_현황리포트.xlsx'));
  toast('✓ '+tr('현황 리포트 다운로드'));
}

 nav:'上部バーのタブ（基準登録・計算機・ルートカード・状況）でどの画面からでも移動できます。流れは、まず基準情報を登録し、現場でルートカードに実測を入力し、状況で集計・報告書を確認します。',
 secs:[
 {h:'① 基準情報の登録',items:['<b>単件登録</b>：プロジェクト・部材・継手番号・開先・板厚・溶接長・材質・プロセスを入力し［登録］。','<b>大量登録</b>：［CSVテンプレート］を取得して記入しアップロードすると、一度に数百件を登録できます。','<b>重複処理</b>：既存の継手がある場合「重複を除いて登録／全て上書き／キャンセル」を確認します。数件の重複でも大量登録は止まりません。','初めての場合は［サンプルデータ］で例10件を読み込めます。']},
 {h:'② ルートカード — 現場実測',items:['種類（配管／圧力容器／海洋構造物）を選びます。','［基準情報の読込］で継手を検索・選択すると、形状・寸法が自動入力されます。','<b>溶接前→中→後</b>の順に実測値を入力します。自動入力値と異なれば修正、同じならそのままにします。','<b>NDE</b>は適用方式（VT・RT・UT・MT・PT）をクリックし、横で結果（合格／不合格／条件付合格）を選びます。<b>PWHT</b>は適用時に保持温度を入力します。','［保存］すると継手が「記録された継手」に表示されます。','そこから［照会］で要約と判定を確認し、［出力］で検査報告書をPDFまたはWordで取得します。']},
 {h:'③ 状況',items:['プロジェクトを選び、理論と実際の溶着量・差異(%)を一目で確認します。','プロセス別・部材別の集計、期間別（月／週）の実際溶着量・投入工数を確認します。','［報告書］でPDFまたはPPT出力。全体／プロジェクト別を選べます。']},
 {h:'計算機（補助）',items:['基準情報なしでも形状・寸法を入力して理論溶着量を素早く算定します。基準情報の読込／保存と連動します。']},
 {h:'出力・言語',items:['<b>検査報告書</b>：PDF（印刷→PDF保存）またはWord(.doc)。ファイル名は報告書番号になります。','<b>状況報告書</b>：PDFまたはPPT。','<b>言語</b>：メイン画面の言語を変えると、全メニュー・報告書・本ガイドが切り替わります。']}
 ],
 trouble:[
 {q:'読み込んだのに溶接中／後が空欄です',a:'正常です。基準情報は設計値のみで、形状・WPS・効率だけが入ります。電流や検査結果などは現場で入力する値のため空欄です。'},
 {q:'大量アップロードが重複で進みません',a:'表示されるダイアログで「重複を除いて登録」を選ぶと、重複だけ除外して残りを登録します。'},
 {q:'検査報告書が2ページになります',a:'印刷ダイアログで余白を「最小」、倍率を下げるか「用紙に合わせる」を選んでください。'},
 {q:'登録データが表示されません',a:'データは使用中のブラウザに保存されます。同じ端末・ブラウザで作業してください。初めてならサンプルデータで動作を確認できます。'},
 {q:'言語が一部しか変わりません',a:'メイン（開始）画面で言語を変えると全画面に適用されます。'}
 ]},
zh:{title:'Welding Quantity Manager',sub:'用户指南',troubleTitle:'问题处理（按情况）',
 flow:['① 登记基准','② 路线卡实测','③ 状况·报告'],
 nav:'用顶部标签（基准登记·计算器·路线卡·状况）可在任意界面间直接切换。流程为：先登记基准信息，在现场用路线卡录入实测，再到状况查看汇总与报告。',
 secs:[
 {h:'① 登记基准信息',items:['<b>单条登记</b>：输入项目·部件·接头号·坡口·板厚·焊缝长度·材质·工艺，点击［登记］。','<b>批量登记</b>：下载［CSV模板］填写后上传，可一次登记数百条。','<b>重复处理</b>：若接头已存在，会询问「排除重复后登记／全部覆盖／取消」，少量重复不会阻断批量登记。','初次使用可用［示例数据］载入10条示例。']},
 {h:'② 路线卡 — 现场实测',items:['选择类型（管道／压力容器／海洋结构）。','在［载入基准信息］中搜索并选择接头，形状·尺寸会自动填入。','按<b>焊前→焊中→焊后</b>顺序录入实测值。与自动值不同则修改，相同则保留。','<b>NDE</b>点击所采用的方式（VT·RT·UT·MT·PT），在旁边选择结果（合格／不合格／有条件合格）。<b>PWHT</b>如适用则输入保温温度。','点击［保存］后，该接头出现在「已记录接头」中。','在此处用［查看］查看摘要与判定，用［输出］将检验报告导出为PDF或Word。']},
 {h:'③ 状况',items:['选择项目，一目了然查看理论与实际熔敷量及偏差(%)。','查看按工艺·部件的汇总，以及按周期（月／周）的实际熔敷量·投入工时。','用［报告］导出为PDF或PPT，可选全部或单个项目。']},
 {h:'计算器（辅助）',items:['无需基准信息也可输入形状·尺寸快速计算理论熔敷量，并与基准信息载入/保存联动。']},
 {h:'输出·语言',items:['<b>检验报告</b>：PDF（打印→另存为PDF）或Word(.doc)，文件名为报告编号。','<b>状况报告</b>：PDF或PPT。','<b>语言</b>：在主界面切换语言，所有菜单·报告·本指南都会随之改变。']}
 ],
 trouble:[
 {q:'载入后焊中／焊后是空的',a:'属正常。基准信息仅含设计值，只填入形状·WPS·效率；电流、检验结果等为现场录入项，故为空。'},
 {q:'批量上传因重复无法进行',a:'在弹出的对话框中选择「排除重复后登记」，即可跳过重复登记其余项。'},
 {q:'检验报告打印成两页',a:'在打印对话框将边距设为「最小」，缩小比例或选择「适合页面」。'},
 {q:'登记的数据看不到',a:'数据保存在所用浏览器中。请在同一设备·同一浏览器操作；初次可用示例数据确认。'},
 {q:'语言只变了一部分',a:'在主（起始）界面切换语言即可应用到全部界面。'}
 ]},
es:{title:'Welding Quantity Manager',sub:'Guía de uso',troubleTitle:'Solución de problemas (por caso)',
 flow:['① Registrar base','② Datos reales (Route Card)','③ Estado e informe'],
 nav:'Use las pestañas de la barra superior (Base · Calculadora · Route Card · Estado) para moverse entre pantallas desde cualquier lugar. El flujo es: registrar los datos base, introducir los datos reales en la Route Card y revisar totales e informes en Estado.',
 secs:[
 {h:'① Registrar datos base',items:['<b>Entrada individual</b>: introduzca Proyecto · Componente · N.º de junta · bisel · espesor · longitud · material · proceso y pulse [Registrar].','<b>Carga masiva</b>: descargue la [plantilla CSV], complétela y súbala para registrar cientos de juntas a la vez.','<b>Duplicados</b>: si una junta ya existe se pregunta «Registrar excluyendo duplicados / Sobrescribir todo / Cancelar», de modo que unos pocos solapamientos no bloquean la carga.','¿Primera vez? Use [Datos de ejemplo] para cargar 10 juntas de muestra.']},
 {h:'② Route Card — datos reales',items:['Elija un tipo (Tubería / Recipiente / Estructura marina).','En [Cargar base] busque y seleccione una junta: la geometría y las dimensiones se rellenan solas.','Introduzca los reales en orden <b>Antes → Durante → Después</b>. Edite un valor si su medición difiere; déjelo si coincide.','En <b>END</b> pulse los métodos aplicados (VT · RT · UT · MT · PT) y elija el resultado (Aceptar / No aceptar / Aceptar con observación). En <b>PWHT</b> indique la temperatura si aplica.','Pulse [Guardar] y la junta aparece en «Juntas registradas».','Allí, [Ver] muestra un resumen y el veredicto, y [Exportar] genera el informe de inspección en PDF o Word.']},
 {h:'③ Estado',items:['Elija un proyecto para ver depósito teórico vs real y la desviación (%) de un vistazo.','Revise totales por proceso y por componente, y el depósito real y las horas-hombre por periodo (mes / semana).','Use [Informe] para exportar en PDF o PPT, para todos los proyectos o uno solo.']},
 {h:'Calculadora (auxiliar)',items:['Calcule el depósito teórico rápidamente introduciendo la geometría, sin necesidad de base. Se vincula con cargar/guardar base.']},
 {h:'Exportar · Idioma',items:['<b>Informe de inspección</b>: PDF (imprimir → guardar como PDF) o Word (.doc). El archivo se nombra con el número de informe.','<b>Informe de estado</b>: PDF o PPT.','<b>Idioma</b>: al cambiar el idioma en la pantalla principal, cambian todos los menús, informes y esta guía.']}
 ],
 trouble:[
 {q:'Tras cargar, los campos Durante/Después están vacíos',a:'Es normal. La base contiene datos de diseño, así que solo se rellenan geometría · WPS · eficiencia. Corriente, resultados de inspección, etc. se introducen en obra y quedan vacíos hasta completarlos.'},
 {q:'Una carga masiva se bloquea por duplicados',a:'En el cuadro que aparece, elija «Registrar excluyendo duplicados» para omitir los solapamientos y registrar el resto.'},
 {q:'El informe sale en dos páginas',a:'En el diálogo de impresión ponga márgenes «Mínimo» y reduzca la escala o elija «Ajustar a la página».'},
 {q:'No veo los datos registrados',a:'Los datos se guardan en el navegador que usa. Trabaje en el mismo dispositivo y navegador. Si es nuevo, use los datos de ejemplo.'},
 {q:'El idioma solo cambia en parte',a:'Cambie el idioma en la pantalla principal (inicio) para aplicarlo en todo.'}
 ]}
};

 var h='<div class="cover"><h1>'+m.title+'</h1><div class="sub">'+m.sub+'</div></div><div class="wrap">';

<script type="text/html" id="src-manual"><!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"><title>사용 설명서</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Roboto,sans-serif;background:#f4f5f7;color:#1d1d1f}
@media(prefers-color-scheme:dark){body{background:#0a0a0c;color:#f5f5f7}.mtoolbar{background:#1c1c1e!important;border-color:#2c2c2e!important}.mtoolbar select,.mtoolbar button{background:#1c1c1e;color:#f5f5f7;border-color:#3a3a3c}}
.mtoolbar{position:sticky;top:0;z-index:5;display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 16px;background:#fff;border-bottom:1px solid #d2d2d7;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mtoolbar .t{margin-right:auto;font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
.mtoolbar select,.mtoolbar button{font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;color:#1d1d1f;cursor:pointer}
.mtoolbar .pri{background:#00843D;color:#fff;border-color:transparent}
/* ── 설명서 본문 (scoped) ── */
#manual-doc{--green:#00843D; --green2:#00a04a; --bg:#f5f5f7; --card:#fff;
  --text:#1d1d1f; --text2:#3a3a3c; --text3:#6e6e73; --border:#d2d2d7;
  --accent-bg:#e8f5ed; --warn-bg:#fff8e6; --warn:#c77d11;}
#manual-doc *{box-sizing:border-box; margin:0; padding:0;}
#manual-doc{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.7;}
#manual-doc .cover{background:linear-gradient(135deg,#004d24 0%,#00843D 60%,#00b04d 100%); color:#fff; padding:56px 40px 48px; text-align:center;}
#manual-doc .cover h1{font-size:2rem; font-weight:800; letter-spacing:-.02em; margin-bottom:.4rem;}
#manual-doc .cover .sub{font-size:1rem; opacity:.85; margin-bottom:1.2rem;}
#manual-doc .cover .badge{display:inline-block; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600; letter-spacing:.04em;}
#manual-doc .toc{max-width:820px; margin:36px auto 0; background:var(--card); border-radius:16px; padding:28px 32px; box-shadow:0 2px 12px rgba(0,0,0,.07);}
#manual-doc .toc h2{font-size:14px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px;}
#manual-doc .toc ol{padding-left:1.4rem; color:var(--green);}
#manual-doc .toc li{margin-bottom:4px;}
#manual-doc .toc a{color:var(--green); text-decoration:none; font-weight:500;}
#manual-doc .toc a:hover{text-decoration:underline;}
#manual-doc .wrap{max-width:820px; margin:0 auto; padding:0 20px 60px;}
#manual-doc section{margin-top:44px;}
#manual-doc h2.sec{font-size:1.3rem; font-weight:800; color:var(--green); border-bottom:3px solid var(--green); padding-bottom:8px; margin-bottom:20px;}
#manual-doc h3{font-size:1rem; font-weight:700; margin:24px 0 8px;}
#manual-doc p{margin-bottom:10px; color:var(--text2);}
#manual-doc .box{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin:12px 0;}
#manual-doc .box.green{background:var(--accent-bg); border-color:#a8d8be;}
#manual-doc .box.warn{background:var(--warn-bg); border-color:#f0c060;}
#manual-doc .box.warn .icon{color:var(--warn); font-weight:700; margin-bottom:4px;}
#manual-doc table{width:100%; border-collapse:collapse; margin:12px 0; font-size:13.5px;}
#manual-doc th{background:var(--green); color:#fff; padding:9px 12px; text-align:left; font-weight:600;}
#manual-doc td{padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top;}
#manual-doc tr:nth-child(even) td{background:#f9f9fb;}
#manual-doc code{background:#f0f0f5; border-radius:5px; padding:1px 6px; font-size:13px; font-family:'SF Mono',Consolas,monospace; color:#5a0089;}
#manual-doc .step{display:flex; gap:14px; margin:10px 0;}
#manual-doc .step-num{flex-shrink:0; width:28px; height:28px; background:var(--green); color:#fff; border-radius:50%; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;}
#manual-doc .step-body{flex:1;}
#manual-doc .tip{font-size:12.5px; color:var(--text3); border-left:3px solid var(--green); padding-left:10px; margin:6px 0;}
#manual-doc .kw{font-weight:700; color:var(--green);}
#manual-doc ul{padding-left:1.4rem; margin-bottom:10px;}
#manual-doc li{margin-bottom:4px; color:var(--text2);}
#manual-doc .flow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:12px 0; font-size:13px;}
#manual-doc .flow-step{background:var(--green); color:#fff; border-radius:8px; padding:6px 14px; font-weight:700; font-size:12.5px;}

ko:{title:'Welding Quantity Manager',sub:'용접 물량 관리 시스템 — 사용 설명서',troubleTitle:'문제 해결 (자주 묻는 경우)',
 flow:['기준정보 등록','루트카드 작성','현황 보고서'],
 lead:'이 프로그램은 <b>이론상 필요한 용착량(용접봉 소요량)과 현장에서 실제로 들어간 양·시수를 비교</b>해, 용접봉과 투입 공수의 낭비를 줄이기 위한 도구입니다. 먼저 도면 기준의 정보를 등록해 두고, 현장에서 실측값을 입력하면, 현황 화면에서 \'얼마나 더(또는 덜) 들어갔는지\'가 자동으로 집계됩니다.',
 nav:'네 가지 도구로 이루어져 있습니다 — ① 기준정보 등록, ② Welding Route Card, ③ 현황 보기, 그리고 보조 도구인 계산기. 화면 위쪽의 탭(기준등록·계산기·루트카드·현황)을 누르면 어느 화면에서든 바로 이동할 수 있어, 시작 화면으로 돌아갈 필요가 없습니다.',
 secs:[
 {h:'① 기준정보 등록 — 모든 작업의 출발점',
  intro:'\'기준정보\'란 도면·WPS 기준의 설계값(어떤 조인트를, 어떤 형상·두께·재질·프로세스로 용접하는지)입니다. 이 값으로 이론 용착량이 계산되고, 이후 루트카드·현황이 모두 이 기준을 불러와 사용하므로 가장 먼저 등록합니다.',
  items:['<b>한 건씩 등록</b> — 프로젝트, Component(부재), Joint 번호, 개선 형상(Groove), 두께, 용접 길이, 재질, 프로세스를 입력하고 [등록]을 누릅니다. 필수 항목이 비면 알려줍니다.','<b>여러 건 한 번에(대규모)</b> — [CSV 템플릿]을 내려받아 엑셀에서 행을 채운 뒤 업로드하면 수백 건도 한 번에 등록됩니다. 템플릿의 헤더(영문 키)는 그대로 두고 행만 추가하세요.','<b>중복이 있을 때</b> — 이미 등록된 Joint가 섞여 있으면 「중복 제외하고 등록 / 전체 덮어쓰기 / 취소」를 묻습니다. 몇 건 겹쳐도 전체 업로드가 막히지 않습니다.','<b>처음이라면</b> — [샘플 데이터]로 예시 10건을 채워 전체 흐름을 미리 체험해 볼 수 있습니다.','등록한 목록은 표로 보이며, 각 행에서 수정·삭제할 수 있습니다.']},
 {h:'② Welding Route Card — 현장 실측 입력',
  intro:'현장에서 실제로 용접한 결과(개선 실측, 용접 조건, 검사 결과, 실제 사용량)를 기록하는 화면입니다. 기준정보를 불러오면 설계값이 자동으로 채워지므로, 달라진 값만 고쳐 넣으면 됩니다.',
  items:['먼저 유형(배관 / 압력용기 / 해양구조물)을 고릅니다.','<b>기준정보 불러오기</b> — 검색창에 프로젝트·Joint 등을 입력해 해당 Joint를 선택하면, 형상·치수·WPS·효율이 자동으로 입력됩니다.','<b>용접 전</b> — 개선 형상의 실측값(루트 간격, 루트면, 개선각, 단차 등)과 예열·검사자를 입력합니다. 자동으로 채워진 값과 같으면 그대로 두고, 다르면 수정합니다.','<b>용접 중</b> — 전류·전압·속도·패스 수·아크타임 등 실제 용접 조건을 입력합니다. (WPS·프로세스·효율은 기준정보에서 자동으로 들어옵니다.)','<b>용접 후</b> — 실제 사용한 용접봉/와이어 양(kg), 적용한 비파괴검사(NDE)와 그 결과(합격/불합격/조건부), 열처리(PWHT) 적용 여부·온도를 입력합니다.','입력이 끝나면 [입력값 저장]을 누릅니다. 저장된 Joint는 아래 「기록된 Joint」 표에 나타납니다.','「기록된 Joint」에서 [조회]를 누르면 그 Joint의 요약과 합격/불합격 판정을 한 화면에서 볼 수 있고, [출력]을 누르면 검사 결과서를 PDF 또는 Word로 받을 수 있습니다.']},
 {h:'③ 현황 보기 — 집계와 보고서',
  intro:'등록·입력한 내용을 프로젝트 단위로 모아, 계획(이론) 대비 실제가 얼마나 차이 나는지 한눈에 보여줍니다. 낭비가 큰 프로세스나 부재를 빠르게 찾을 수 있습니다.',
  items:['상단에서 프로젝트를 선택하면, 이론 vs 실제 용착량과 차이(%)가 요약과 표로 표시됩니다.','프로세스별·Component별로 이론·실제·필요 용접봉·투입 시수를 집계해 보여줍니다.','<b>기간별 실적</b> — 루트카드에 입력한 작업 일자를 기준으로 월별/주별, 또는 시작~종료일을 지정해 그 기간의 실제 용착량과 투입 시수를 집계합니다.','[보고서]를 누르면 PDF 또는 PPT로 출력합니다. 전체 또는 특정 프로젝트만 선택할 수 있습니다.']},
 {h:'보조 도구 — 계산기',
  intro:'계산기는 기준정보가 없어도 단독으로 쓸 수 있습니다. 도면 검토나 간단한 산정에 바로 활용하세요.',
  items:['형상·두께·길이를 직접 입력하면 이론 용착량(용접봉 소요량)을 즉시 계산합니다. 기준정보를 불러오면 등록된 값으로 계산할 수도 있습니다.']},
 {h:'출력과 언어',
  intro:'',
  items:['<b>검사 결과서</b>(루트카드) — [출력] → PDF 또는 Word를 선택합니다. PDF는 인쇄 창에서 \'PDF로 저장\'을 고르면 되고, 파일명은 보고서 번호로 저장됩니다. Word(.doc)는 받은 뒤 워드에서 열어 편집할 수 있습니다.','<b>현황 보고서</b> — PDF 또는 PPT로 출력합니다.','<b>언어</b> — 시작 화면의 언어 선택을 바꾸면 모든 메뉴·보고서·이 설명서가 선택한 언어(한·영·일·중·스페인어)로 바뀝니다.']}
 ],
 trouble:[
 {q:'기준정보를 불러왔는데 \'용접 중/후\' 칸이 비어 있어요',a:'정상입니다. 기준정보에는 도면 기준의 설계값만 있어 형상·WPS·효율만 자동으로 채워집니다. 전류·검사 결과·실제 사용량 등은 현장에서 직접 측정해 입력하는 값이라 비어 있는 것이 맞습니다.'},
 {q:'대규모(CSV) 업로드가 중복 때문에 안 돼요',a:'업로드할 때 뜨는 창에서 「중복 제외하고 등록」을 선택하면, 이미 있는 Joint만 빼고 새 항목들이 등록됩니다. 기존 값을 새 값으로 바꾸고 싶으면 「전체 덮어쓰기」를 고르면 됩니다.'},
 {q:'검사 결과서가 한 장을 넘어 두 장으로 나와요',a:'인쇄 창에서 여백을 \'최소\'로, 배율을 조금 줄이거나 \'용지에 맞춤\'으로 설정하면 한 장에 들어갑니다.'},
 {q:'등록했던 데이터가 보이지 않아요',a:'데이터는 인터넷 서버가 아니라 \'사용 중인 브라우저\'에 저장됩니다. 다른 기기나 다른 브라우저에서 열면 보이지 않으니, 작업하던 같은 기기·브라우저에서 여세요. 시크릿(비공개) 창에서는 저장이 유지되지 않을 수 있습니다.'},
 {q:'현황의 기간별 실적이 비어 있어요',a:'기간별 집계는 루트카드의 \'작업 일자\'를 기준으로 합니다. 루트카드 용접 전 항목에 일자를 입력해 저장하면 표시됩니다.'},
 {q:'언어를 바꿨는데 일부만 바뀌어요',a:'시작 화면(홈)에서 언어를 바꾸면 모든 화면에 한 번에 적용됩니다. 앱 안에서 바꿨다면 홈으로 나가 다시 선택해 주세요.'}
 ]},
en:{title:'Welding Quantity Manager',sub:'User Guide',troubleTitle:'Troubleshooting (common cases)',
 flow:['Register baseline','Fill Route Card','Status & report'],
 lead:'This program helps you <b>cut waste of welding electrodes and man-hours by comparing the theoretical deposit (electrode demand) against what was actually used on site</b>. You register the design data first, enter the field measurements later, and the Status screen automatically shows how much more (or less) was used.',
 nav:'It has four tools — ① Register Baseline, ② Welding Route Card, ③ Status, and the Calculator (helper). The tabs at the top (Baseline · Calculator · Route Card · Status) let you jump between screens from anywhere, so you never need to return to the home screen.',
 secs:[
 {h:'① Register Baseline — the starting point',
  intro:'\'Baseline\' means the design values from the drawing/WPS (which joint, with what groove, thickness, material and process). The theoretical deposit is calculated from these, and the Route Card and Status both load this baseline — so register it first.',
  items:['<b>One at a time</b> — enter Project, Component, Joint No., groove, thickness, weld length, material and process, then press [Register]. Missing required fields are flagged.','<b>Many at once (bulk)</b> — download the [CSV template], fill rows in Excel and upload to register hundreds at once. Keep the header keys; only add rows.','<b>When duplicates exist</b> — if some joints are already registered you are asked «Register excluding duplicates / Overwrite all / Cancel». A few overlaps never block the whole upload.','<b>First time?</b> — use [Sample data] to load 10 example joints and try the whole flow.','The list is shown as a table; you can edit or delete each row.']},
 {h:'② Welding Route Card — enter field actuals',
  intro:'This is where you record what actually happened on site (measured fit-up, welding conditions, inspection results, actual consumption). Loading the baseline fills the design values automatically, so you only change what differs.',
  items:['First pick a type (Piping / Pressure Vessel / Offshore).','<b>Load baseline</b> — type the project/joint in the search box and select the joint; geometry, dimensions, WPS and efficiency fill in automatically.','<b>Pre-weld</b> — enter measured fit-up (root gap, root face, bevel angle, hi-lo) plus preheat and inspector. If a value matches the auto-filled one, leave it; if not, edit it.','<b>In-process</b> — enter actual welding conditions: current, voltage, speed, passes, arc time. (WPS, process and efficiency come from the baseline.)','<b>Post-weld</b> — enter the actual electrode/wire used (kg), the NDE methods applied and their results (Accept / Not Accept / with comment), and PWHT (whether applied and the temperature).','When done, press [Save]. The saved joint appears in the «Recorded Joints» table below.','In «Recorded Joints», [View] shows that joint\'s summary and Accept/Reject verdict on one screen, and [Export] produces the inspection report as PDF or Word.']},
 {h:'③ Status — totals and reports',
  intro:'It gathers everything by project and shows at a glance how far actual differs from plan (theoretical), so you can quickly spot the processes or components with the most waste.',
  items:['Pick a project at the top to see theoretical vs actual deposit and deviation (%) as a summary and table.','It totals theoretical, actual, electrode demand and man-hours by process and by component.','<b>Performance by period</b> — using the work date from the Route Card, total the actual deposit and man-hours by month/week, or for a specific start–end date range.','Press [Report] to export as PDF or PPT, for all projects or one.']},
 {h:'Helper — Calculator',
  intro:'The Calculator works on its own without any baseline — handy for drawing reviews or quick estimates.',
  items:['Enter geometry, thickness and length to compute the theoretical deposit (electrode demand) instantly. You can also load a baseline to calculate with registered values.']},
 {h:'Export and language',
  intro:'',
  items:['<b>Inspection report</b> (Route Card) — [Export] → choose PDF or Word. For PDF, choose «Save as PDF» in the print dialog; the file is named after the report number. Word (.doc) can be opened and edited in Word.','<b>Status report</b> — export as PDF or PPT.','<b>Language</b> — changing the language on the home screen switches all menus, reports and this guide (Korean / English / Japanese / Chinese / Spanish).']}
 ],
 trouble:[
 {q:'After loading the baseline, the In-process / Post-weld fields are empty',a:'That is normal. Baseline holds only design values, so only geometry, WPS and efficiency fill automatically. Current, inspection results and actual consumption are measured on site, so they are meant to be blank until you enter them.'},
 {q:'A bulk (CSV) upload is blocked by duplicates',a:'In the dialog, choose «Register excluding duplicates» to register the new items and skip the ones already present. To replace existing values, choose «Overwrite all».'},
 {q:'The inspection report prints on two pages',a:'In the print dialog set margins to «Minimum» and reduce the scale a little or choose «Fit to page».'},
 {q:'My registered data is gone',a:'Data is saved in the browser you use, not on a server. It will not appear on another device or browser, so open it on the same one you worked on. Private/Incognito windows may not keep the data.'},
 {q:'Performance-by-period in Status is empty',a:'Period totals use the work date from the Route Card. Enter a date in the Route Card pre-weld section and save, and it will appear.'},
 {q:'Only part of the screen changes language',a:'Change the language on the home screen and it applies everywhere at once. If you changed it inside an app, go home and select again.'}
 ]},
ja:{title:'Welding Quantity Manager',sub:'ユーザーガイド',troubleTitle:'トラブル対応（よくある場合）',
 flow:['基準登録','ルートカード作成','状況・報告書'],
 lead:'本プログラムは、<b>理論上必要な溶着量（溶接棒所要量）と現場で実際に使われた量・工数を比較</b>し、溶接棒と工数の無駄を減らすためのツールです。まず図面基準の情報を登録し、現場で実測値を入力すると、状況画面で「どれだけ多く（または少なく）使われたか」が自動集計されます。',
 nav:'四つのツールで構成されます — ① 基準登録、② ルートカード、③ 状況、そして補助の計算機です。画面上部のタブ（基準登録・計算機・ルートカード・状況）でどの画面からでも移動でき、開始画面に戻る必要はありません。',
 secs:[
 {h:'① 基準情報の登録 — すべての出発点',
  intro:'「基準情報」とは図面・WPS基準の設計値（どの継手を、どの開先・板厚・材質・プロセスで溶接するか）です。この値から理論溶着量が計算され、以後ルートカードと状況がこの基準を読み込むため、最初に登録します。',
  items:['<b>単件登録</b> — プロジェクト・部材・継手番号・開先・板厚・溶接長・材質・プロセスを入力し［登録］。必須項目が空だと通知します。','<b>大量登録</b> — ［CSVテンプレート］を取得し、Excelで行を埋めてアップロードすると一度に数百件登録できます。ヘッダー（英字キー）はそのままで行だけ追加します。','<b>重複がある場合</b> — 既存の継手が混ざると「重複を除いて登録／全て上書き／キャンセル」を確認します。数件重複しても全体は止まりません。','<b>初めての場合</b> — ［サンプルデータ］で例10件を読み込み、流れを体験できます。','登録した一覧は表で表示され、各行で修正・削除できます。']},
 {h:'② ルートカード — 現場実測の入力',
  intro:'現場で実際に溶接した結果（開先実測、溶接条件、検査結果、実際使用量）を記録する画面です。基準情報を読み込むと設計値が自動入力されるので、異なる値だけ直します。',
  items:['まず種類（配管／圧力容器／海洋構造物）を選びます。','<b>基準情報の読込</b> — 検索欄にプロジェクト・継手などを入力して選ぶと、形状・寸法・WPS・効率が自動入力されます。','<b>溶接前</b> — 開先の実測値（ルート間隔・ルート面・開先角・段差）と予熱・検査者を入力。自動値と同じならそのまま、異なれば修正します。','<b>溶接中</b> — 電流・電圧・速度・パス数・アークタイムなど実際の条件を入力します。（WPS・プロセス・効率は基準から入ります。）','<b>溶接後</b> — 実際に使用した溶接棒/ワイヤ量(kg)、適用したNDEとその結果（合格/不合格/条件付）、PWHTの適用可否・温度を入力します。','入力後［保存］を押します。保存した継手は下の「記録された継手」表に表示されます。','「記録された継手」で［照会］を押すと要約と判定を一画面で確認でき、［出力］で検査報告書をPDFまたはWordで取得できます。']},
 {h:'③ 状況 — 集計と報告書',
  intro:'登録・入力した内容をプロジェクト単位でまとめ、計画（理論）と実際の差を一目で示します。無駄の大きいプロセスや部材を素早く見つけられます。',
  items:['上部でプロジェクトを選ぶと、理論と実際の溶着量・差異(%)が要約と表で表示されます。','プロセス別・部材別に理論・実際・必要溶接棒・投入工数を集計します。','<b>期間別実績</b> — ルートカードの作業日を基準に、月別/週別、または開始〜終了日を指定して、その期間の実際溶着量と工数を集計します。','［報告書］でPDFまたはPPT出力。全体または特定プロジェクトを選べます。']},
 {h:'補助 — 計算機',
  intro:'計算機は基準情報がなくても単独で使えます。図面検討や簡単な見積りにそのまま活用できます。',
  items:['形状・板厚・長さを入力すると理論溶着量（溶接棒所要量）を即時計算します。基準情報を読み込んで登録値で計算することもできます。']},
 {h:'出力と言語',
  intro:'',
  items:['<b>検査報告書</b>（ルートカード）— ［出力］→PDFまたはWordを選択。PDFは印刷画面で「PDFで保存」を選びます。ファイル名は報告書番号になります。Word(.doc)は受け取り後にWordで編集できます。','<b>状況報告書</b> — PDFまたはPPT。','<b>言語</b> — 開始画面の言語を変えると、全メニュー・報告書・本ガイドが選択言語（韓・英・日・中・西）に変わります。']}
 ],
 trouble:[
 {q:'基準情報を読み込んだのに「溶接中／後」が空欄です',a:'正常です。基準情報は図面基準の設計値のみで、形状・WPS・効率だけ自動入力されます。電流・検査結果・実際使用量などは現場で測定して入力する値のため空欄が正しいです。'},
 {q:'大量(CSV)アップロードが重複で進みません',a:'表示されるダイアログで「重複を除いて登録」を選ぶと、既存以外の新規項目が登録されます。既存値を置き換えるなら「全て上書き」を選びます。'},
 {q:'検査報告書が2ページになります',a:'印刷画面で余白を「最小」、倍率を少し下げるか「用紙に合わせる」を選ぶと1ページに収まります。'},
 {q:'登録したデータが見えません',a:'データはサーバーではなく「使用中のブラウザ」に保存されます。別の端末・ブラウザでは表示されないので、作業した同じ環境で開いてください。シークレット窓では保持されない場合があります。'},
 {q:'状況の期間別実績が空です',a:'期間集計はルートカードの「作業日」を基準にします。溶接前の項目に日付を入力して保存すると表示されます。'},
 {q:'言語を変えたのに一部しか変わりません',a:'開始画面（ホーム）で変えると全画面に一度で適用されます。アプリ内で変えた場合はホームで再選択してください。'}
 ]},
zh:{title:'Welding Quantity Manager',sub:'用户指南',troubleTitle:'问题处理（常见情况）',
 flow:['登记基准','填写路线卡','状况与报告'],
 lead:'本程序通过<b>对比理论所需熔敷量（焊条需求）与现场实际用量·工时</b>，帮助减少焊条与工时的浪费。先登记图纸基准信息，现场再录入实测值，状况界面便自动汇总"多用或少用了多少"。',
 nav:'由四个工具组成 — ① 登记基准、② 路线卡、③ 状况，以及辅助的计算器。顶部标签（基准·计算器·路线卡·状况）可在任意界面间直接切换，无需返回起始界面。',
 secs:[
 {h:'① 登记基准信息 — 一切的起点',
  intro:'"基准信息"指图纸/WPS的设计值（哪个接头，采用何种坡口·板厚·材质·工艺）。理论熔敷量由此计算，路线卡与状况都会载入该基准，因此最先登记。',
  items:['<b>逐条登记</b> — 输入项目·部件·接头号·坡口·板厚·焊缝长·材质·工艺，点击［登记］。缺少必填项会提示。','<b>批量登记</b> — 下载［CSV模板］，在Excel中填行后上传，可一次登记数百条。保留表头键，仅添加行。','<b>存在重复时</b> — 若混有已登记接头，会询问"排除重复后登记／全部覆盖／取消"。少量重复不会阻断整体上传。','<b>初次使用</b> — 用［示例数据］载入10条示例体验流程。','登记列表以表格显示，可逐行编辑·删除。']},
 {h:'② 路线卡 — 录入现场实测',
  intro:'此界面记录现场实际焊接结果（坡口实测、焊接条件、检验结果、实际用量）。载入基准后设计值自动填入，只需修改不同之处。',
  items:['先选择类型（管道／压力容器／海洋结构）。','<b>载入基准</b> — 在搜索框输入项目·接头等并选择，形状·尺寸·WPS·效率自动填入。','<b>焊前</b> — 录入坡口实测（根部间隙·钝边·坡口角·错边）以及预热·检验员。与自动值相同则保留，不同则修改。','<b>焊中</b> — 录入实际条件：电流·电压·速度·道数·电弧时间。（WPS·工艺·效率来自基准。）','<b>焊后</b> — 录入实际所用焊条/焊丝量(kg)、所采用的NDE及其结果（合格/不合格/有条件）、PWHT是否实施及温度。','完成后点击［保存］。已保存接头出现在下方"已记录接头"表中。','在"已记录接头"中，［查看］可在一屏看到该接头摘要与合格/不合格判定，［输出］可将检验报告导出为PDF或Word。']},
 {h:'③ 状况 — 汇总与报告',
  intro:'按项目汇总已登记·录入内容，一目了然显示实际与计划（理论）的差距，便于快速找出浪费最大的工艺或部件。',
  items:['在上方选择项目，理论与实际熔敷量及偏差(%)以摘要和表格显示。','按工艺·部件汇总理论·实际·所需焊条·投入工时。','<b>按周期实绩</b> — 以路线卡的作业日期为准，按月/周或指定起止日期，汇总该期间的实际熔敷量与工时。','点击［报告］导出为PDF或PPT，可选全部或单个项目。']},
 {h:'辅助 — 计算器',
  intro:'计算器无需基准信息也可单独使用，适合图纸审查或快速估算。',
  items:['输入形状·板厚·长度即可即时计算理论熔敷量（焊条需求）。也可载入基准用登记值计算。']},
 {h:'输出与语言',
  intro:'',
  items:['<b>检验报告</b>（路线卡）— ［输出］→选择PDF或Word。PDF在打印窗口选"另存为PDF"，文件名为报告编号。Word(.doc)可在Word中打开编辑。','<b>状况报告</b> — 导出为PDF或PPT。','<b>语言</b> — 在起始界面切换语言，所有菜单·报告·本指南都会随之改变（韩·英·日·中·西）。']}
 ],
 trouble:[
 {q:'载入基准后"焊中／焊后"是空的',a:'属正常。基准信息仅含图纸设计值，只自动填入形状·WPS·效率。电流·检验结果·实际用量等为现场测量录入项，故应为空。'},
 {q:'批量(CSV)上传因重复无法进行',a:'在弹出对话框中选择"排除重复后登记"，即可登记新项目并跳过已存在的。要替换原值则选"全部覆盖"。'},
 {q:'检验报告打印成两页',a:'在打印窗口将边距设为"最小"，略微缩小比例或选择"适合页面"。'},
 {q:'登记的数据不见了',a:'数据保存在所用浏览器中，而非服务器。在其他设备或浏览器中不会显示，请在原环境打开。隐身窗口可能不保留数据。'},
 {q:'状况的按周期实绩为空',a:'周期汇总以路线卡的"作业日期"为准。在焊前项目录入日期并保存即会显示。'},
 {q:'语言只变了一部分',a:'在起始界面切换语言即可一次应用到全部。若在应用内更改，请回到起始界面重新选择。'}
 ]},
es:{title:'Welding Quantity Manager',sub:'Guía de uso',troubleTitle:'Solución de problemas (casos comunes)',
 flow:['Registrar base','Completar Route Card','Estado e informe'],
 lead:'Este programa ayuda a <b>reducir el desperdicio de electrodos y de horas-hombre comparando el depósito teórico (demanda de electrodo) con lo realmente usado en obra</b>. Primero registra los datos de diseño, luego introduce las mediciones de obra, y la pantalla de Estado muestra automáticamente cuánto más (o menos) se usó.',
 nav:'Consta de cuatro herramientas — ① Registrar base, ② Route Card, ③ Estado, y la Calculadora (auxiliar). Las pestañas superiores (Base · Calculadora · Route Card · Estado) permiten moverse entre pantallas desde cualquier sitio, sin volver al inicio.',
 secs:[
 {h:'① Registrar datos base — el punto de partida',
  intro:'Los \'datos base\' son los valores de diseño del plano/WPS (qué junta, con qué bisel, espesor, material y proceso). De ahí se calcula el depósito teórico, y tanto la Route Card como el Estado cargan esta base, por eso se registra primero.',
  items:['<b>Uno a uno</b> — introduzca Proyecto, Componente, N.º de junta, bisel, espesor, longitud, material y proceso, y pulse [Registrar]. Se avisa si falta un campo obligatorio.','<b>Carga masiva</b> — descargue la [plantilla CSV], rellene filas en Excel y súbala para registrar cientos a la vez. Conserve las claves de cabecera; solo añada filas.','<b>Si hay duplicados</b> — si ya existen algunas juntas se pregunta «Registrar excluyendo duplicados / Sobrescribir todo / Cancelar». Unos pocos solapes no bloquean la carga.','<b>¿Primera vez?</b> — use [Datos de ejemplo] para cargar 10 juntas y probar el flujo.','La lista se muestra en tabla; puede editar o eliminar cada fila.']},
 {h:'② Route Card — datos reales de obra',
  intro:'Aquí registra lo que ocurrió en obra (ajuste medido, condiciones de soldadura, resultados de inspección, consumo real). Al cargar la base, los valores de diseño se rellenan solos; solo cambia lo que difiera.',
  items:['Elija primero un tipo (Tubería / Recipiente / Estructura marina).','<b>Cargar base</b> — escriba el proyecto/junta en el buscador y selecciónela; geometría, dimensiones, WPS y eficiencia se rellenan solos.','<b>Antes</b> — introduzca el ajuste medido (separación de raíz, talón, ángulo de bisel, desalineación) más precalentamiento e inspector. Si coincide con el valor automático, déjelo; si no, edítelo.','<b>Durante</b> — introduzca las condiciones reales: corriente, voltaje, velocidad, pasadas, tiempo de arco. (WPS, proceso y eficiencia vienen de la base.)','<b>Después</b> — introduzca el electrodo/alambre realmente usado (kg), los métodos de END aplicados y sus resultados (Aceptar / No aceptar / con observación), y el PWHT (si aplica y la temperatura).','Al terminar pulse [Guardar]. La junta aparece en la tabla «Juntas registradas».','Allí, [Ver] muestra el resumen y el veredicto en una pantalla, y [Exportar] genera el informe de inspección en PDF o Word.']},
 {h:'③ Estado — totales e informes',
  intro:'Reúne todo por proyecto y muestra de un vistazo cuánto difiere lo real de lo planeado (teórico), para localizar rápido los procesos o componentes con más desperdicio.',
  items:['Elija un proyecto arriba para ver depósito teórico vs real y desviación (%) en resumen y tabla.','Totaliza teórico, real, demanda de electrodo y horas-hombre por proceso y por componente.','<b>Rendimiento por periodo</b> — con la fecha de trabajo de la Route Card, totalice depósito real y horas-hombre por mes/semana o por un rango de fechas.','Pulse [Informe] para exportar en PDF o PPT, para todos los proyectos o uno.']},
 {h:'Auxiliar — Calculadora',
  intro:'La Calculadora funciona sola sin ninguna base — útil para revisar planos o estimaciones rápidas.',
  items:['Introduzca geometría, espesor y longitud para calcular al instante el depósito teórico (demanda de electrodo). También puede cargar una base para calcular con valores registrados.']},
 {h:'Exportar e idioma',
  intro:'',
  items:['<b>Informe de inspección</b> (Route Card) — [Exportar] → elija PDF o Word. Para PDF elija «Guardar como PDF» en el diálogo de impresión; el archivo se nombra con el número de informe. Word (.doc) se abre y edita en Word.','<b>Informe de estado</b> — exporte en PDF o PPT.','<b>Idioma</b> — al cambiar el idioma en el inicio cambian todos los menús, informes y esta guía (coreano / inglés / japonés / chino / español).']}
 ],
 trouble:[
 {q:'Tras cargar la base, los campos Durante/Después están vacíos',a:'Es normal. La base solo tiene valores de diseño, así que solo se rellenan geometría, WPS y eficiencia. Corriente, resultados de inspección y consumo real se miden en obra, por eso quedan vacíos hasta completarlos.'},
 {q:'Una carga masiva (CSV) se bloquea por duplicados',a:'En el cuadro, elija «Registrar excluyendo duplicados» para registrar los nuevos y omitir los ya existentes. Para reemplazar valores, elija «Sobrescribir todo».'},
 {q:'El informe sale en dos páginas',a:'En el diálogo de impresión ponga márgenes «Mínimo» y reduzca un poco la escala o elija «Ajustar a la página».'},
 {q:'Mis datos registrados desaparecieron',a:'Los datos se guardan en el navegador que usa, no en un servidor. No aparecerán en otro dispositivo o navegador; ábralo en el mismo. Las ventanas privadas/incógnito pueden no conservarlos.'},
 {q:'El rendimiento por periodo está vacío',a:'Los totales por periodo usan la fecha de trabajo de la Route Card. Introduzca una fecha en la sección Antes y guarde, y aparecerá.'},
 {q:'Solo cambia parte del idioma',a:'Cambie el idioma en la pantalla de inicio y se aplica en todo a la vez. Si lo cambió dentro de una app, vuelva al inicio y selecciónelo de nuevo.'}
 ]}
};
function buildMan(l){var m=MAN[l]||MAN.ko;
 var h='<div class="cover"><h1>'+m.title+'</h1><div class="sub">'+m.sub+'</div></div><div class="wrap">';
 h+='<div class="flow">'+m.flow.map(function(f,i){return (i?'<span class="flow-arr">→</span>':'')+'<span class="flow-step">'+f+'</span>';}).join('')+'</div>';
 if(m.lead) h+='<p style="font-size:14px;line-height:1.7;margin:4px 0 12px">'+m.lead+'</p>';
 h+='<div class="box green">'+m.nav+'</div>';
 m.secs.forEach(function(s){ h+='<section><h2 class="sec">'+s.h+'</h2>'; if(s.intro) h+='<p style="margin:6px 0 9px;color:var(--text2);line-height:1.65">'+s.intro+'</p>'; h+='<ul>'+s.items.map(function(it){return '<li style="margin-bottom:5px;line-height:1.6">'+it+'</li>';}).join('')+'</ul></section>'; });
 h+='<section><h2 class="sec">'+m.troubleTitle+'</h2>'+m.trouble.map(function(t){return '<div class="box warn"><b>'+t.q+'</b><br>'+t.a+'</div>';}).join('')+'</section>';
 return h+'</div>';
}
function renderM(l){var _lbl={ko:'사용 설명서',en:'User Guide',ja:'マニュアル',zh:'用户指南',es:'Guía de uso'};var _t=document.querySelector('.mtoolbar .t span');if(_t)_t.textContent=_lbl[l]||_lbl.ko;document.getElementById("manual-doc").innerHTML=buildMan(l);window.scrollTo(0,0);}
(function(){var L='ko';try{L=(window.parent&&window.parent.WDC&&window.parent.WDC.lang&&window.parent.WDC.lang())||'ko';}catch(e){}var sel=document.getElementById('mlang');if(sel&&[].some.call(sel.options,function(o){return o.value===L;}))sel.value=L;renderM(MAN[L]?L:'ko');})();<\/script>

<script>
(function(){try{var P=Storage.prototype;if(P.__wdcNS)return;P.__wdcNS=1;var _g=P.getItem,_s=P.setItem,_r=P.removeItem;var G={wdc_lang:1,wdc_accounts:1,wdc_session:1};function NS(){try{return (window.parent&&window.parent!==window&&window.parent.__WDC_NS)||window.__WDC_NS||'';}catch(e){return window.__WDC_NS||'';}}function K(k){if(typeof k==='string'&&!G[k]&&(k.indexOf('wdc_')===0||k.indexOf('wrc_')===0)){var n=NS();if(n)return 'u_'+n+'__'+k;}return k;}P.getItem=function(k){return _g.call(this,K(k));};P.setItem=function(k,v){return _s.call(this,K(k),v);};P.removeItem=function(k){return _r.call(this,K(k));};}catch(e){}})();
const APPS={
  routecard:{name:'Welding Route Card', src:'src-routecard'},
  calc:{name:'Welding Deposit Calculator', src:'src-calc'},
  manual:{name:'사용 설명서', src:'src-manual'},
  baseline:{name:'기준 정보 등록', src:'src-baseline'},
  status:{name:'현황 보기', src:'src-status'}
};
const frames={};
/* 부모 창 공유 저장소 + postMessage 브리지 — srcdoc iframe 데이터 공유(file:// localStorage 비공유/opaque-origin 우회) */
window.WDC=window.WDC||{};
window.WDC._b=null;
window.WDC._get=function(){ if(this._b) return this._b; try{this._b=JSON.parse(localStorage.getItem('wdc_baseline'))||[];}catch(e){this._b=[];} return this._b; };
window.WDC._set=function(a){ this._b=a||[]; try{localStorage.setItem('wdc_baseline',JSON.stringify(this._b));}catch(e){} this._bcast(); };
window.WDC._bcast=function(){ var d=JSON.stringify(this._get()); for(var k in frames){ try{ frames[k].contentWindow.postMessage({__wdc:'data',data:d},'*'); }catch(e){} } };
window.WDC.getBaseline=function(){ return this._get(); };

function unesc(s){ return s.replace(/<\\\/script/gi,'<\/script'); }
function openApp(key){

function WDCt(s){ try{ var L=localStorage.getItem('wdc_lang')||'ko'; if(L!=='ko'&&window.WDC&&window.WDC.DICT&&window.WDC.DICT[s]&&window.WDC.DICT[s][L]!=null) return window.WDC.DICT[s][L]; }catch(e){} return s; }
function _agAccts(){ try{ return JSON.parse(localStorage.getItem('wdc_accounts'))||{}; }catch(e){ return {}; } }
function _agSaveAccts(a){ try{ localStorage.setItem('wdc_accounts', JSON.stringify(a)); }catch(e){} }
function _agHex(buf){ return Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0'+b.toString(16)).slice(-2); }).join(''); }
function _agSalt(){ var a=new Uint8Array(16); try{ crypto.getRandomValues(a); }catch(e){ for(var i=0;i<16;i++)a[i]=Math.floor(Math.random()*256); } return _agHex(a.buffer); }
async function _agHash(pw,salt){
  try{ if(window.crypto&&crypto.subtle){ var d=new TextEncoder().encode(salt+'|'+pw); var hb=await crypto.subtle.digest('SHA-256',d); return _agHex(hb); } }catch(e){}
  var s=salt+'|'+pw,hh=5381; for(var i=0;i<s.length;i++){ hh=((hh<<5)+hh+s.charCodeAt(i))>>>0; } return 'f'+hh.toString(16);
}
var _agMode='login';
function authTab(m){ _agMode=m;
  var tl=document.getElementById('agTabLogin'), tr=document.getElementById('agTabReg');
  if(tl)tl.classList.toggle('active',m==='login'); if(tr)tr.classList.toggle('active',m==='register');

  var sb=document.getElementById('agSubmit'); if(sb)sb.textContent=(m==='register'?'등록하고 시작':'시작하기');
  var er=document.getElementById('agErr'); if(er)er.textContent='';
  var up=document.getElementById('agPass'); if(up)up.setAttribute('autocomplete', m==='register'?'new-password':'current-password');
  try{ if(window.wdcApplyI18N) window.wdcApplyI18N(); }catch(e){}
}
async function authSubmit(){
  var uE=document.getElementById('agUser'), pE=document.getElementById('agPass'), er=document.getElementById('agErr');
  var u=(uE&&uE.value||'').trim(), p=(pE&&pE.value||''); if(er)er.textContent='';
  function fail(msg){ if(er)er.textContent=WDCt(msg); }
  if(!u||!p){ return fail('아이디와 비밀번호를 입력하세요'); }
  var accts=_agAccts();
  if(_agMode==='register'){
    var p2=(document.getElementById('agPass2')||{}).value||'';
    if(u.length<3){ return fail('아이디는 3자 이상이어야 합니다'); }
    if(p.length<4){ return fail('비밀번호는 4자 이상이어야 합니다'); }
    if(p!==p2){ return fail('비밀번호가 일치하지 않습니다'); }
    if(accts[u]){ return fail('이미 존재하는 아이디입니다'); }
    var salt=_agSalt(), hash=await _agHash(p,salt);
    accts[u]={salt:salt,hash:hash,created:Date.now()}; _agSaveAccts(accts); _agEnter(u);
  } else {
    if(!accts[u]){ return fail('존재하지 않는 아이디입니다'); }
    var h2=await _agHash(p,accts[u].salt);
    if(h2!==accts[u].hash){ return fail('비밀번호가 올바르지 않습니다'); }
    _agEnter(u);
  }
}
function _agEnter(u){
  try{ localStorage.setItem('wdc_session',u); }catch(e){}
  try{ window.WDC.setUser(u); }catch(e){}
  var g=document.getElementById('authGate'); if(g)g.style.display='none';
  var w=document.getElementById('agWho'); if(w)w.textContent=u;
  var w2=document.getElementById('agWho2'); if(w2)w2.textContent=u;
  var pE=document.getElementById('agPass'); if(pE)pE.value=''; var p2=document.getElementById('agPass2'); if(p2)p2.value='';
  try{ if(window.wdcApplyI18N) window.wdcApplyI18N(); }catch(e){}
}
function authLogout(){
  try{ localStorage.removeItem('wdc_session'); }catch(e){}
  try{ window.WDC.setUser(null); }catch(e){}
  Object.keys(frames).forEach(function(k){ try{frames[k].remove();}catch(e){} delete frames[k]; });

}
