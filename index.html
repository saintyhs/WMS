    <select id="preset-sel" onchange="presetLoad()" style="flex:1;min-width:120px;padding:5px 8px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--card);color:var(--text)"></select>
    <button type="button" onclick="presetSave()" style="font-size:11px;font-weight:700;padding:5px 10px;border:1px solid var(--accent-bd);border-radius:8px;background:var(--bg2);color:var(--accent2);cursor:pointer" title="현재 입력을 프리셋으로 저장">💾 저장</button>
    <button type="button" onclick="presetDelete()" style="font-size:11px;padding:5px 9px;border:1px solid var(--border2);border-radius:8px;background:var(--card);color:var(--text3);cursor:pointer" title="선택한 프리셋 삭제">🗑</button>
  </div>

  <!-- ISO badge -->
  <div class="iso-badge" id="iso-badge"></div>

  <!-- 관 맞대기(거스) 둘레 헬퍼 — Tubular+Butt 전용 -->
  <div id="girth-block" class="hidden" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin:.25rem 0 .6rem;padding:.625rem .875rem;background:var(--field);border:1px solid var(--border);border-radius:var(--rs)">
    <div class="fld" style="max-width:160px">
      <label>관 외경 OD (mm)</label>
      <input type="number" id="pipeD" value="508" step="1" min="10" oninput="updateGirth()">
    </div>
    <div style="font-size:12px;color:var(--text2);padding-bottom:8px">거스 둘레 π·D = <b id="girth-len" style="color:var(--accent)">1596</b> mm</div>
    <button class="btn pri" type="button" onclick="applyGirth()" style="margin-bottom:2px">둘레를 용접 길이로 적용</button>
  </div>

  <!-- ─ ButtSquare ─ -->
  <div id="panel-ButtSquare">

<script>
(function(){try{var P=Storage.prototype;if(P.__wdcNS)return;P.__wdcNS=1;var _g=P.getItem,_s=P.setItem,_r=P.removeItem;var G={wdc_lang:1,wdc_accounts:1,wdc_session:1};function NS(){try{return (window.parent&&window.parent!==window&&window.parent.__WDC_NS)||window.__WDC_NS||'';}catch(e){return window.__WDC_NS||'';}}function K(k){if(typeof k==='string'&&!G[k]&&(k.indexOf('wdc_')===0||k.indexOf('wrc_')===0)){var n=NS();if(n)return 'u_'+n+'__'+k;}return k;}P.getItem=function(k){return _g.call(this,K(k));};P.setItem=function(k,v){return _s.call(this,K(k),v);};P.removeItem=function(k){return _r.call(this,K(k));};}catch(e){}})();

'use strict';

// ════════════════════════════════════════
//  EMBEDDED MINI-XLSX (no external dependency)
// ════════════════════════════════════════
// ── Minimal pure-JS XLSX writer (stored/uncompressed ZIP) + CSV utilities ──
const MiniXLSX=(function(){
  // 셀 스타일: 0=기본, 1=필수헤더(BP그린/흰글씨), 2=선택헤더(회색), 3=설명행(연녹/회색글씨), 4=일반헤더(진회색)
  const STYLES_XML=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<fonts count="5">
<font><sz val="11"/><name val="Calibri"/></font>
<font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>
<font><sz val="9"/><color rgb="FF6B6B6B"/><i/><name val="Calibri"/></font>
<font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>
<font><b/><sz val="10"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>
</fonts>
<fills count="6">
<fill><patternFill patternType="none"/></fill>
<fill><patternFill patternType="gray125"/></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF00843D"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF8C8C8C"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFE9F6EE"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF006B33"/></patternFill></fill>
</fills>
<borders count="2">
<border><left/><right/><top/><bottom/><diagonal/></border>
<border><left style="thin"><color rgb="FFD0D0D0"/></left><right style="thin"><color rgb="FFD0D0D0"/></right><top style="thin"><color rgb="FFD0D0D0"/></top><bottom style="thin"><color rgb="FFD0D0D0"/></bottom></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="6">
<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
<xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>
<xf numFmtId="0" fontId="1" fillId="3" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>
<xf numFmtId="0" fontId="2" fillId="4" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>
<xf numFmtId="0" fontId="3" fillId="2" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"><alignment horizontal="center" vertical="center"/></xf>
<xf numFmtId="0" fontId="4" fillId="5" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"><alignment horizontal="left" vertical="center"/></xf>
</cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;
  // CRC32
  const crcTable=(()=>{const t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
  function crc32(bytes){let c=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)c=crcTable[(c^bytes[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
  function strBytes(s){const u=unescape(encodeURIComponent(s));const b=new Uint8Array(u.length);for(let i=0;i<u.length;i++)b[i]=u.charCodeAt(i);return b;}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function colName(n){let s='';n++;while(n>0){const m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;}

  // build one worksheet XML from array-of-arrays
  function sheetXML(rows, styleMap, cols, validations){
    let body='';
    rows.forEach((row,ri)=>{
      let cells='';
      row.forEach((val,ci)=>{
        const sIdx=styleMap&&styleMap[ri]&&styleMap[ri][ci]; 
        const sAttr=sIdx?` s="${sIdx}"`:'';
        if(val===''||val===null||val===undefined){ if(sIdx) cells+=`<c r="${colName(ci)+(ri+1)}"${sAttr}/>`; return; }
        const ref=colName(ci)+(ri+1);
        if(typeof val==='number'&&isFinite(val)){
          cells+=`<c r="${ref}"${sAttr}><v>${val}</v></c>`;
        }else{
          cells+=`<c r="${ref}"${sAttr} t="inlineStr"><is><t xml:space="preserve">${esc(val)}</t></is></c>`;
        }
      });
      body+=`<row r="${ri+1}">${cells}</row>`;
    });
    let colsXML='';
    if(cols&&cols.length){ colsXML='<cols>'+cols.map((w,i)=>`<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`).join('')+'</cols>'; }
    let dvXML='';
    if(validations&&validations.length){
      dvXML='<dataValidations count="'+validations.length+'">'+validations.map(v=>{
        const f1 = v.formula ? esc(v.formula) : '"'+v.list.join(',')+'"';
        return `<dataValidation type="list" allowBlank="1" showInputMessage="1" showErrorMessage="1" sqref="${v.sqref}"><formula1>${f1}</formula1></dataValidation>`;
      }).join('')+'</dataValidations>';
    }
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">${colsXML}<sheetData>${body}</sheetData>${dvXML}</worksheet>`;
  }

  // write workbook: sheets = [{name, rows}]
  function writeFile(sheets, filename, definedNames){
    const files=[];
    files.push({name:'[Content_Types].xml',data:
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>${sheets.map((s,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')}</Types>`});
    files.push({name:'_rels/.rels',data:
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`});
    files.push({name:'xl/workbook.xml',data:
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheets.map((s,i)=>`<sheet name="${esc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('')}</sheets>${definedNames&&definedNames.length?'<definedNames>'+definedNames.map(d=>`<definedName name="${d.name}">${d.ref}</definedName>`).join('')+'</definedNames>':''}</workbook>`});
    files.push({name:'xl/_rels/workbook.xml.rels',data:
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')}<Relationship Id="rIdStyles" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`});
    files.push({name:'xl/styles.xml',data:STYLES_XML});
    sheets.forEach((s,i)=>files.push({name:`xl/worksheets/sheet${i+1}.xml`,data:sheetXML(s.rows,s.styleMap,s.cols,s.validations)}));

    // build stored ZIP
    const enc=files.map(f=>({name:f.name,bytes:strBytes(f.data)}));
    let offset=0; const localParts=[]; const central=[];
    enc.forEach(f=>{
      const nameB=strBytes(f.name); const crc=crc32(f.bytes); const sz=f.bytes.length;
      const local=new Uint8Array(30+nameB.length+sz); const dv=new DataView(local.buffer);
      dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0,true);
      dv.setUint16(8,0,true); dv.setUint16(10,0,true); dv.setUint16(12,0,true);
      dv.setUint32(14,crc,true); dv.setUint32(18,sz,true); dv.setUint32(22,sz,true);
      dv.setUint16(26,nameB.length,true); dv.setUint16(28,0,true);
      local.set(nameB,30); local.set(f.bytes,30+nameB.length);
      localParts.push(local);
      const cen=new Uint8Array(46+nameB.length); const cv=new DataView(cen.buffer);
      cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true);
      cv.setUint16(8,0,true); cv.setUint16(10,0,true); cv.setUint16(12,0,true); cv.setUint16(14,0,true);
      cv.setUint32(16,crc,true); cv.setUint32(20,sz,true); cv.setUint32(24,sz,true);
      cv.setUint16(28,nameB.length,true); cv.setUint16(30,0,true); cv.setUint16(32,0,true);
      cv.setUint16(34,0,true); cv.setUint16(36,0,true); cv.setUint32(38,0,true); cv.setUint32(42,offset,true);
      cen.set(nameB,46);
      central.push(cen);
      offset+=local.length;
    });
    const centralSize=central.reduce((a,c)=>a+c.length,0); const centralOffset=offset;
    const end=new Uint8Array(22); const ev=new DataView(end.buffer);
    ev.setUint32(0,0x06054b50,true); ev.setUint16(8,enc.length,true); ev.setUint16(10,enc.length,true);
    ev.setUint32(12,centralSize,true); ev.setUint32(16,centralOffset,true);
    const total=offset+centralSize+22; const out=new Uint8Array(total); let p=0;
    localParts.forEach(b=>{out.set(b,p);p+=b.length;});
    central.forEach(b=>{out.set(b,p);p+=b.length;});
    out.set(end,p);
    return out; // Uint8Array; in browser wrap in Blob
  }

  // CSV parse → array of objects keyed by header row
  function parseCSV(text){
    text=text.replace(/^\uFEFF/,'');
    const rows=[]; let i=0,field='',row=[],inQ=false;
    while(i<text.length){
      const ch=text[i];
      if(inQ){
        if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
        field+=ch;i++;continue;
      }
      if(ch==='"'){inQ=true;i++;continue;}
      if(ch===','){row.push(field);field='';i++;continue;}
      if(ch==='\r'){i++;continue;}
      if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
      field+=ch;i++;
    }
    if(field!==''||row.length){row.push(field);rows.push(row);}
    if(!rows.length)return [];
    const hdr=rows[0];
    return rows.slice(1).filter(r=>r.some(c=>c!=='')).map(r=>{const o={};hdr.forEach((h,j)=>o[h.trim()]=(r[j]!==undefined?r[j]:''));return o;});
  }

  function toCSV(rows){
    return rows.map(r=>r.map(c=>{
      const s=(c===null||c===undefined)?'':String(c);
      return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(',')).join('\r\n');
  }

  return {writeFile,parseCSV,toCSV};
})();

// 맨파워 파라미터(사용자 조정 가능, localStorage 저장). dr=용착속도 kg/h, of=작업률 %
let MANPOWER = (function(){ try{ const s=JSON.parse(localStorage.getItem('wdc_manpower')||'null'); if(s) return s; }catch(e){}
  const m={}; Object.keys(PROC).forEach(k=>{ m[k]={dr:PROC[k].dr, of:PROC[k].of}; }); return m; })();
function manpowerStore(){ try{ localStorage.setItem('wdc_manpower', JSON.stringify(MANPOWER)); }catch(e){} }
// 프로세스별 사용자 지정 용접 효율(%) — 설정하면 저장되어 다음 사용 시 자동 적용
let USER_EFF = (function(){ try{ const s=JSON.parse(localStorage.getItem('wdc_eff')||'null'); if(s) return s; }catch(e){} return {}; })();
function userEffStore(){ try{ localStorage.setItem('wdc_eff', JSON.stringify(USER_EFF)); }catch(e){} }
function effForProc(k){ return (USER_EFF[k]!=null) ? USER_EFF[k] : (PROC[k]?PROC[k].iiw:80); }
// 맨파워 슬라이더 렌더 (프로세스별 용착속도 dr·작업률 of)
function renderMpSliders(){

  const procs=['SMAW','GMAW','FCAW','SAW','GTAW'];
  let h='';
  procs.forEach(k=>{
    const mp=MANPOWER[k]||{dr:PROC[k].dr,of:PROC[k].of};
    h+=`<div style="margin-bottom:.7rem">
      <div style="font-size:12.5px;font-weight:800;margin-bottom:.25rem">${tr(PROC[k].n)}</div>
      <div style="display:grid;grid-template-columns:auto 1fr auto;gap:.5rem;align-items:center;font-size:11.5px">
        <span style="color:var(--text3);min-width:74px">${tr('용착속도')}</span>
        <input type="range" min="0.2" max="12" step="0.1" value="${mp.dr}" oninput="manpowerSet('${k}','dr',this.value)">
        <span id="mp-${k}-dr" style="font-weight:700;min-width:58px;text-align:right">${mp.dr} kg/h</span>
        <span style="color:var(--text3);min-width:74px">${tr('작업률')}</span>
        <input type="range" min="10" max="80" step="1" value="${mp.of}" oninput="manpowerSet('${k}','of',this.value)">
        <span id="mp-${k}-of" style="font-weight:700;min-width:58px;text-align:right">${mp.of} %</span>
      </div></div>`;
  });
  host.innerHTML=h;
}
function manpowerSet(proc,key,val){
  if(!MANPOWER[proc]) MANPOWER[proc]={dr:PROC[proc].dr,of:PROC[proc].of};
  MANPOWER[proc][key]=parseFloat(val);
  const lbl=document.getElementById('mp-'+proc+'-'+key);
  if(lbl) lbl.textContent=val+(key==='dr'?' kg/h':' %');
  manpowerStore();
  renderPrj();
}
function manpowerReset(){
  MANPOWER={}; Object.keys(PROC).forEach(k=>{ MANPOWER[k]={dr:PROC[k].dr,of:PROC[k].of}; });
  manpowerStore(); renderMpSliders(); renderPrj(); toast(tr('기본값으로 복원됨'));
}
// 한 행의 용접사 투입 시수(h) = (용착량kg ÷ 용착속도) ÷ 작업률
function rowManHours(r){
  const proc=r.process||'SMAW';
  const mp=MANPOWER[proc]||MANPOWER.CUSTOM||{dr:3,of:35};
  const dr=parseFloat(mp.dr)||3, of=(parseFloat(mp.of)||35)/100;
  const dep=(r._r?.mass||0)*(r.qty||1);
  if(dr<=0||of<=0) return 0;
  return dep/dr/of;
}

//  ISO 2553 elementary weld symbols (inline SVG glyphs)
//  Orientation per ISO 2553:2019 Table 1 (symbol sits on the reference line at the bottom).
// ════════════════════════════════════════
function isoSVG(paths){
  return `<svg viewBox="0 0 22 18" width="22" height="18" style="vertical-align:middle" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">${paths}</svg>`;
}
const ISOSYM = {
  // Square butt: two parallel vertical lines on the reference line
  ButtSquare: isoSVG('<line x1="8" y1="3" x2="8" y2="15"/><line x1="14" y1="3" x2="14" y2="15"/>'),
  // Single-V butt: V with apex pointing DOWN (sits on reference line, opens upward)
  ButtV:      isoSVG('<path d="M5 4 L11 15 L17 4"/>'),
  // Double-V (X): two V's — apex-down over apex-up (hourglass)
  ButtX:      isoSVG('<path d="M5 2 L11 9 L17 2"/><path d="M5 16 L11 9 L17 16"/>'),
  // Single-bevel: perpendicular (vertical) leg on the LEFT, bevel face slopes to it from the right; apex down
  ButtBevel:  isoSVG('<line x1="8" y1="4" x2="8" y2="15"/><path d="M8 15 L15 4"/>'),
  // Double-bevel (K): vertical leg on left + two bevel faces (up & down) meeting it
  ButtK:      isoSVG('<line x1="7" y1="2" x2="7" y2="16"/><path d="M7 9 L15 2"/><path d="M7 9 L15 16"/>'),
  // Single-U: parallel sides curving to a flat round bottom (opens upward)
  ButtU:      isoSVG('<path d="M6 3 L6 9 Q6 14 11 14 Q16 14 16 9 L16 3"/>'),
  // Single-J: perpendicular leg (LEFT, full height) + right side with radius at its BOTTOM
  ButtJ:      isoSVG('<line x1="7" y1="3" x2="7" y2="15"/><path d="M16 3 L16 8 Q16 15 9 15 L7 15"/>'),
  // Fillet: right-angle triangle, perpendicular leg on the LEFT
  Fillet:     isoSVG('<path d="M6 3 L6 15 L16 15 Z"/>'),
};
// map T-Joint groove keys & TKY to the matching elementary glyph
ISOSYM.TJoint=ISOSYM.Fillet;
ISOSYM.TJointBevel=ISOSYM.ButtBevel;
ISOSYM.TJointK=ISOSYM.ButtK;
ISOSYM.TKY=ISOSYM.ButtBevel;
ISOSYM.TKYDB=ISOSYM.ButtK;

  document.getElementById('f-heel').textContent=rnd(fh,3);

// ════════════════════════════════════════
//  CALCULATION ENGINE
// ════════════════════════════════════════
function computeDeposit(s){
  const nz=(v,d)=>{ const x=parseFloat(v); return isNaN(x)?d:x; };
  const ui=!s;
  const rho=ui?gv('density'):(parseFloat(s.rho)||7.85);
  const L=ui?gv('weldLength'):(parseFloat(s.weldLength)||1000);
  const eta=ui?gv('efficiency')/100:(parseFloat(s.efficiency)||80)/100;
  const jt=ui?curJoint:(s.jointType||'ButtV');
  let area=0, adjFactor=1, breakdown=[], _tkyK=null;

  // ── Butt joints ──
  if(jt==='ButtSquare'){
    const T=ui?gv('sqT'):(parseFloat(s.T)||6);
    const gap=ui?gv('sqGap'):(nz(s.gap,2));
    const cap=ui?gvz('sqCap',1):(nz(s.cap,1));
    // 보강 비드 폭 ≈ gap + 2×cap (양쪽 toe가 cap 높이만큼 퍼짐), 삼각 근사 ½·폭·cap
    const capW=gap+2*cap;
    const capA=capW*cap*0.5;
    area=gap*T+capA;
    breakdown.push({l:'Gap 기여 면적 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtV'){
    const T=ui?gv('vT'):(parseFloat(s.T)||16);
    const ang=ui?gv('vAng'):(parseFloat(s.ang)||60);
    const root=ui?gv('vRoot'):(nz(s.root,0));
    const gap=ui?gv('vGap'):(nz(s.gap,2));
    const cap=ui?gv('vCap'):(nz(s.cap,1.5));
    const h=T-root; const ha=deg2rad(ang/2);
    const wTop=2*h*Math.tan(ha)+gap;
    const grooveV=h*h*Math.tan(ha);            // V 삼각부 (양측 베벨)
    const capA=wTop*cap*0.5;
    area=grooveV+gap*T+capA;                   // gap 기둥은 전체 두께 g×T
    breakdown.push({l:'V 개선부',v:rnd(grooveV,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtBevel'){
    const T=ui?gv('bevT'):(parseFloat(s.T)||16);
    const ang=ui?gv('bevAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('bevRoot'):(nz(s.root,0));
    const gap=ui?gv('bevGap'):(nz(s.gap,2));
    const cap=ui?gvz('bevCap',1.5):(nz(s.cap,1.5));
    const h=T-root; const ha=deg2rad(ang);
    const grooveA=h*h*Math.tan(ha)/2;
    const wTop=h*Math.tan(ha)+gap;             // 상부 개선 폭 (단면 bevel + gap)
    const capA=Math.max(0,wTop)*cap*0.5;
    area=grooveA+gap*T+capA;
    breakdown.push({l:'Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtU'){
    const T=ui?gv('uT'):(parseFloat(s.T)||25);
    const R=ui?gv('uR'):(parseFloat(s.R)||6);
    const ang=ui?gv('uAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('uRoot'):(nz(s.root,0));
    const gap=ui?gv('uGap'):(nz(s.gap,2));
    const cap=ui?gvz('uCap',1.5):(nz(s.cap,1.5));
    const h=Math.max(0,T-root-R); const ha=deg2rad(ang);
    const wTop=gap+2*(R+h*Math.tan(ha));       // 상부 개선 폭
    const capA=Math.max(0,wTop)*cap*0.5;
    area=Math.PI*R*R/2+h*(2*R+2*(R+h*Math.tan(ha)))/2+gap*T+capA;
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtJ'){
    const T=ui?gv('jT'):(parseFloat(s.T)||20);
    const R=ui?gv('jR'):(parseFloat(s.R)||5);
    const ang=ui?gv('jAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('jRoot'):(nz(s.root,0));
    const gap=ui?gv('jGap'):(nz(s.gap,2));
    const cap=ui?gvz('jCap',1.5):(nz(s.cap,1.5));
    const h=Math.max(0,T-root-R); const ha=deg2rad(ang);
    const wTop=gap+R+h*Math.tan(ha);           // 상부 개선 폭 (편측 J)
    const capA=Math.max(0,wTop)*cap*0.5;
    area=Math.PI*R*R/4+h*(R+R+h*Math.tan(ha))/2+gap*T+capA;
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtX'){
    const T=ui?gv('xT'):(parseFloat(s.T)||30);
    const ang=ui?gv('xAng'):(parseFloat(s.ang)||60);
    const root=ui?gv('xRoot'):(nz(s.root,0));
    const gap=ui?gv('xGap'):(nz(s.gap,2));
    const cap=ui?gvz('xCap',1.5):(nz(s.cap,1.5));
    const ratio=(ui?gv('xRatio'):(parseFloat(s.ratio)||50))/100;
    const ha=deg2rad(ang/2);
    const h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
    const grooveX=(h1*h1+h2*h2)*Math.tan(ha);
    const wTop1=2*h1*Math.tan(ha)+gap, wTop2=2*h2*Math.tan(ha)+gap;  // 앞면·뒷면 개선 폭
    const capA=(Math.max(0,wTop1)+Math.max(0,wTop2))*cap*0.5;        // 양면 보강
    area=grooveX+gap*T+capA;
    breakdown.push({l:'상·하 개선부',v:rnd(grooveX,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적 (양면)',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtK'){
    const T=ui?gv('kT'):(parseFloat(s.T)||30);
    const ang=ui?gv('kAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('kRoot'):(nz(s.root,0));
    const gap=ui?gv('kGap'):(nz(s.gap,2));
    const cap=ui?gvz('kCap',1.5):(nz(s.cap,1.5));
    const ratio=(ui?gv('kRatio'):(parseFloat(s.ratio)||50))/100;
    const ha=deg2rad(ang);
    const h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
    const grooveK=(h1*h1+h2*h2)*Math.tan(ha)/2;
    const wTop1=h1*Math.tan(ha)+gap, wTop2=h2*Math.tan(ha)+gap;     // 앞면·뒷면 개선 폭 (편측 bevel)
    const capA=(Math.max(0,wTop1)+Math.max(0,wTop2))*cap*0.5;        // 양면 보강
    area=grooveK+gap*T+capA;
    breakdown.push({l:'상·하 개선부',v:rnd(grooveK,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적 (양면)',v:rnd(capA,2),u:'mm²'});
  }
  // ── Fillet ──
  else if(jt==='Fillet'){
    const side=ui?curFilSide:(s.filSide||'single');
    const z1=ui?gv('filZ1'):(nz(s.z1,8));
    const z2=(side==='double')?(ui?gv('filZ2'):(parseFloat(s.z2)||z1)):0;
    const k=ui?gv('filK'):(parseFloat(s.filK)||0.707);
    const gap=ui?gv('filGap'):(nz(s.gap,0));
    const a1=z1, a2=z2;
    const throat1=a1*k, throat2=a2*k;
    const areaF1=0.5*a1*a1+gap*a1;
    const areaF2=side==='double'?(0.5*a2*a2+gap*a2):0;
    area=areaF1+areaF2;
    breakdown.push({l:'목두께 throat₁',v:rnd(throat1,2),u:'mm'});
    breakdown.push({l:'앞면 단면적 A₁',v:rnd(areaF1,2),u:'mm²'});
    if(side==='double'){
      breakdown.push({l:'목두께 throat₂',v:rnd(throat2,2),u:'mm'});
      breakdown.push({l:'뒷면 단면적 A₂',v:rnd(areaF2,2),u:'mm²'});
    }
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*(a1+(side==='double'?a2:0)),2),u:'mm²',type:'gap'});
  }
  // ── T-Joint (Fillet) ──
  else if(jt==='TJoint'){
    const side=ui?curTSub:(s.tSubtype||'double');
    const z1=ui?gv('tFilZ1'):(nz(s.z1,8));
    const z2=(side!=='single')?(ui?gv('tFilZ2'):(parseFloat(s.z2)||z1)):0;
    const gap=ui?gv('tGap'):(nz(s.tGap,0));
    const cap=ui?gvz('tCap',0):(nz(s.cap,0));
    const theta=ui?gv('tAngle'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let baseArea=0;
    if(side==='single') baseArea=0.5*z1*z1+gap*z1;
    else{
      const a1=0.5*z1*z1+gap*z1;
      const a2=0.5*z2*z2+gap*z2;
      baseArea=a1+a2;
      breakdown.push({l:'앞면 A₁',v:rnd(a1,2),u:'mm²'});
      breakdown.push({l:'뒷면 A₂',v:rnd(a2,2),u:'mm²'});
    }
    // 덧살: 용접면(빗변) 볼록(+)/오목(−) 보강. 면폭 = z×√2, 용접면마다 적용. 음수 가능.
    const faceW=z1*Math.SQRT2+(side!=='single'?z2*Math.SQRT2:0);
    const capA=0.5*faceW*cap;
    area=baseArea+capA;
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*z1,2),u:'mm²',type:'gap'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── T-Joint with groove prep (V / X / Bevel / K) ──
  else if(jt==='TJointBevel'||jt==='TJointK'){
    const T=ui?gv('tgT'):(parseFloat(s.T)||16);
    const ang=ui?gv('tgAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('tgRoot'):(nz(s.root,0));
    const gap=ui?gv('tgGap'):(nz(s.gap,2));
    const ratio=(ui?gv('tgRatio'):(parseFloat(s.ratio)||50))/100;
    const fil1=ui?gv('tgFil'):(nz(s.z1,0));
    const fil2=ui?gv('tgFil2'):(nz(s.z2,0));
    const cap=ui?gvz('tgCap',0):(nz(s.cap,0));
    const theta=ui?gv('tgTheta'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let grooveA=0, wFace=0;
    if(jt==='TJointBevel'){           // single bevel (HV): notch through thickness
      const h=T-root, ha=deg2rad(ang);
      grooveA=h*h*Math.tan(ha)/2+gap*T;            // gap은 부재 전체 두께 아래
      wFace=h*Math.tan(ha)+gap;                    // 용접면 폭 (개선 상부)
    } else {                          // TJointK double bevel: notches both sides
      const ha=deg2rad(ang), h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
      grooveA=(h1*h1+h2*h2)*Math.tan(ha)/2+gap*T;
      wFace=(h1+h2)*Math.tan(ha)+gap;              // 양면 용접면 폭 합
    }
    // 보강 fillet: 앞면 z₁ + (양면 용접 시) 뒷면 z₂
    const filA=0.5*fil1*fil1+0.5*fil2*fil2;
    // 덧살: 용접면 볼록(+)/오목(−) 보강. 음수 가능.
    const capA=0.5*Math.max(0,wFace)*cap;
    area=grooveA+filA+capA;
    breakdown.push({l:'Groove 단면적',v:rnd(grooveA,2),u:'mm²'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (앞면 z₁)'),v:rnd(filA,2),u:'mm²'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    if(gap>0) breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── TKY ──
  else if(jt==='TKY'||jt==='TKYDB'){
    const D=ui?gv('tkyD'):(parseFloat(s.tkyD)||508);
    const d=ui?gv('tkyd'):(parseFloat(s.tkyd)||219);
    const tw=ui?gv('tkyt'):(parseFloat(s.tkyt)||parseFloat(s.T)||12);  // brace 벽두께 (업로드: 모재1 T 사용)
    const ang=ui?gv('tkyAng'):(parseFloat(s.ang)||45);               // 개선각 α
    const root=ui?gv('tkyRoot'):(nz(s.root,0));                      // 미입력 시 0
    const gap=ui?gv('tkyGap'):(nz(s.gap,3));
    const fil1=ui?gv('tkyFil'):(nz(s.z1,8));
    const fil2=ui?gv('tkyFil2'):(nz(s.z2,0));
    const theta=ui?gv('tkyAngle'):(parseFloat(s.tkyAngle)||parseFloat(s.tAngle)||45);  // 업로드: T 경사각 사용
    const ttype=ui?document.getElementById('tkyType').value:(s.tkyType||'Y');
    const dbl=(jt==='TKYDB');
    const sv=Math.sin(deg2rad(theta));
    // ── 기준 단면 A₀ (Ψ=90°): brace 끝단 bevel 개선 + root gap + 보강 fillet ──
    const hb=Math.max(0,tw-root), ha=deg2rad(ang);
    let grooveA, filA;
    if(!dbl){ grooveA=hb*hb*Math.tan(ha)/2; }
    else    { grooveA=2*(hb/2)*(hb/2)*Math.tan(ha)/2; }   // 양면 bevel 50/50
    filA=0.5*fil1*fil1+0.5*fil2*fil2;                     // 앞면 z₁ + 뒷면 z₂(양면 용접 시)
    const aBase=grooveA+gap*tw+filA;
    // ── 단면(둘레) 방향 국부 이면각 Ψ ──
    //   Toe Ψ=180°−θ (둔각→tan(Ψ/2)), Saddle Ψ=90°+asin(β) (코드 곡률, β=d/D), Heel Ψ=θ (1/sinθ 용입 요구)
    const beta=Math.min(0.99, D>0?d/D:0);
    const psiS=Math.PI/2+Math.asin(beta);
    const psiT=Math.PI-deg2rad(theta);
    const fs=Math.tan(psiS/2);
    const fc=Math.tan(psiT/2);
    const fh=1/sv;
    const favg=(fc+fs*2+fh)/4;
    // 경사 교차선 실제 둘레 (타원 근사: a=d/(2sinθ), b=d/2, Ramanujan)
    const ea=d/(2*sv), eb=d/2, eh=Math.pow((ea-eb)/(ea+eb),2);
    const perimIncl=Math.PI*(ea+eb)*(1+3*eh/(10+Math.sqrt(4-3*eh)));
    let favgEff=favg;
    // K-Joint: 단일 brace(Y) 계산을 2개분으로. brace 간격 g<0이면 겹침 → 중복 용착 차감
    if(ttype==='K'){
      const bgap=ui?gvz('tkyBraceGap',0):(parseFloat(s.tkyBraceGap)||0);
      const ovl=bgap<0?Math.min(-bgap, perimIncl):0; // 겹침 길이 (mm), 둘레 초과 방지
      _tkyK={count:2, overlapLen:ovl};
    }
    area=aBase; adjFactor=favgEff;         // 팩터는 adjFactor에서 1회만 적용
    breakdown.push({l:(dbl?'양면':'단면')+' Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×t)',v:rnd(gap*tw,2),u:'mm²',type:'gap'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (z₁)'),v:rnd(filA,2),u:'mm²'});
    breakdown.push({l:'β = d/D',v:rnd(beta,3),u:''});
    breakdown.push({l:`Toe Ψ=${rnd(180-theta,0)}°`,v:rnd(fc,3),u:'×'});
    breakdown.push({l:`Saddle Ψ=${rnd(psiS*180/Math.PI,1)}° (90°+asin β)`,v:rnd(fs,3),u:'×'});
    breakdown.push({l:`Heel Ψ=${rnd(theta,0)}° (1/sinθ)`,v:rnd(fh,3),u:'×'});
    breakdown.push({l:'가중평균 (Toe:Saddle:Heel=1:2:1)',v:rnd(favgEff,4),u:'×'});
    breakdown.push({l:'교차선 둘레 (π·d 단순)',v:rnd(Math.PI*d,1),u:'mm'});
    breakdown.push({l:'교차선 둘레 (θ 경사 보정)',v:rnd(perimIncl,1),u:'mm — '+tr('용접 길이로 권장')});
  }

  // ── 이종 두께 맞대기: 단차 천이 필릿 (Butt 전용) ──
  if(jt.startsWith('Butt')){
    const tFieldMap={ButtSquare:'sqT',ButtV:'vT',ButtBevel:'bevT',ButtU:'uT',ButtJ:'jT',ButtX:'xT',ButtK:'kT'};
    const T1 = ui ? gv(tFieldMap[jt]) : (parseFloat(s.T)||0);
    const T2 = ui ? gv('buttT2') : (parseFloat(s.T2)||0);
    // 배치(업로드): diffAlign='Y'면 이종두께 적용. (하위호환: T₂가 T와 다르면 자동) UI는 체크박스 유지.
    const daFlag = !ui ? String(s.diffAlign||'').trim().toUpperCase() : '';
    const dOn = ui ? document.getElementById('buttDiff')?.checked
                   : ( daFlag==='Y' || (daFlag!=='N' && isFinite(T2) && T2>0 && Math.abs(T2-T1)>1e-9) );
    if(dOn){
      // 정렬: UI는 선택 유지, 배치는 flush 고정(이종두께 여부만 Y/N로 입력)
      const align = ui ? (document.getElementById('buttDiffAlign')?.value||'flush') : 'flush';
      const dT = Math.abs(T2-T1);
      if(dT>0){
        let stepA;
        if(align==='center'){
          stepA = 2*0.5*(dT/2)*(dT/2);   // 양면 단차 ΔT/2 → 필릿 2개 = ΔT²/4
          breakdown.push({l:tr('단차 필릿 양면')+` (ΔT/2=${rnd(dT/2,1)}×2)`,v:rnd(stepA,2),u:'mm²'});
        } else {
          stepA = 0.5*dT*dT;             // 일면 단차 ΔT → 필릿 1개 = ½ΔT²
          breakdown.push({l:tr('단차 필릿 일면')+` (ΔT=${rnd(dT,1)})`,v:rnd(stepA,2),u:'mm²'});
        }
        area += stepA;
      }
    }
  }

  // K-Joint: brace 2개분 면적 + 겹침(brace gap<0) 중복 용착 차감
  if((jt==='TKY'||jt==='TKYDB') && _tkyK){
    const perBrace=area;                       // 단일 brace 단면적
    let kArea=perBrace*_tkyK.count;            // 2개분
    if(_tkyK.overlapLen>0 && L>0){
      // 겹친 둘레 길이만큼 단면적 1개분 차감 (L 기준 비율 환산)
      const dedFrac=Math.min(1, _tkyK.overlapLen/L);
      kArea-=perBrace*dedFrac;
      breakdown.push({l:tr('K 겹침 차감')+` (overlap ${rnd(_tkyK.overlapLen,0)}mm)`,v:'−'+rnd(perBrace*dedFrac,2),u:'mm²',type:'pjp'});
      breakdown.push({l:'⚠ 겹침부 용착량은 별도 상세도·PQR로 산정',v:'',u:'',type:'pjp'});
    }
    breakdown.push({l:`K-Joint brace ×${_tkyK.count}`,v:rnd(kArea,2),u:'mm² (유효)'});
    area=kArea;
  }

  const adjArea=area*adjFactor;
  // Back gouging: extra deposit as % of total
  const gouge = ui ? (document.getElementById('backGouge')?.checked ? gv('gougePctNum') : 0)
                   : (s.backGouge===true||s.backGouge==='Y' ? (nz(s.gougePct,10)) : 0);
  const gougeFactor = 1 + gouge/100;
  const vol=adjArea*L/1000*gougeFactor;
  const mass=vol*rho/1000;
  const rod=mass/eta;
  if(gouge>0) breakdown.push({l:'Back Gouging 추가',v:'+'+rnd(gouge,0),u:'%',type:'pjp'});
  return {area:rnd(area,3),adjFactor:rnd(adjFactor,4),adjArea:rnd(adjArea,3),gouge:rnd(gouge,0),vol:rnd(vol,3),mass:rnd(mass,4),rod:rnd(rod,4),perM:rnd(mass*1000/L,4),rho,breakdown};
}

// ════════════════════════════════════════
//  DISPLAY
// ════════════════════════════════════════
function calc(){
  const res=computeDeposit(null);
  const eta=gv('efficiency');
  const pKey=document.getElementById('process')?.value||'SMAW';
  const pName=PROC[pKey]?.n||pKey;
  // highlights
  document.getElementById('res-hi').innerHTML=[
    {l:tr('보정 단면적'),v:res.adjArea,u:'mm²'},
    {l:tr('이론 용착량'),v:res.mass,u:'kg'},
    {l:tr('소모 용가재')+` (η=${eta}%)`,v:res.rod,u:'kg',w:true}
  ].map(i=>`<div class="rc${i.w?' warn':''}"><div class="rl">${i.l}</div><div class="rv">${i.v}</div><div class="ru">${i.u}</div></div>`).join('');
  // detail
  const rows=[
    {l:tr('Joint 형상'),v:tr(ISO[curJoint]?.name||curJoint),u:''},
    {l:tr('용접 프로세스'),v:tr(pName),u:''},
    {l:'Deposition Eff. η',v:eta,u:'%'},
    {l:tr('기준 단면적'),v:res.area,u:'mm²'},
    {l:tr('각도/위치 팩터'),v:res.adjFactor,u:''},
    {l:tr('체적'),v:res.vol,u:'cm³'},
    {l:tr('밀도 ρ'),v:res.rho,u:'g/cm³'},
    {l:tr('1m당 용착량'),v:res.perM,u:'kg/m'},
    ...res.breakdown.map(b=>({...b,l:tr(b.l),u:tr(b.u||'')}))
  ];
  document.getElementById('res-detail').innerHTML=rows.map(r=>{
    const cls=r.type==='gap'?'gap':r.type==='pjp'?'pjp':'';
    return `<div class="dr"><span>${r.l}</span><span class="dv ${cls}">${r.v}<span class="du">${r.u}</span></span></div>`;
  }).join('');
  document.getElementById('result-card').style.display='';
  _validateInputs();
  // 결과 복사용 텍스트 저장
  window.__lastResultText=[
    tr('Joint 형상')+': '+tr(ISO[curJoint]?.name||curJoint),
    tr('용접 프로세스')+': '+tr(pName)+' (η='+eta+'%)',
    tr('보정 단면적')+': '+res.adjArea+' mm²',
    tr('이론 용착량')+': '+res.mass+' kg',
    tr('소모 용가재')+': '+res.rod+' kg',
    tr('1m당 용착량')+': '+res.perM+' kg/m'
  ].join('\n');
  if(!userImages[curJoint]) drawPreview();
}
// ── 입력 프리셋 (자주 쓰는 입력 조합 저장/불러오기) ──
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
let PRESETS = (function(){ try{ return JSON.parse(localStorage.getItem('wdc_presets')||'[]'); }catch(e){ return []; } })();
function presetStore(){ try{ localStorage.setItem('wdc_presets', JSON.stringify(PRESETS)); }catch(e){} }
// 현재 화면의 주요 입력값을 캡처 (형상 + 모든 패널 입력 + 재질/프로세스/길이)
function _capturePreset(){
  const ids=['material','density','process','efficiency','weldLength','gT','gT2','buttDiff',
    'sqT','sqGap','sqCap','vT','vAng','vRoot','vGap','vCap','bevT','bevAng','bevRoot','bevGap','bevCap',
    'uT','uAng','uRoot','uGap','uR','uCap','jT','jAng','jRoot','jGap','jR','jCap',
    'xT','xAng','xRoot','xGap','xRatio','xCap','kT','kAng','kRoot','kGap','kRatio','kCap',
    'tgT','tgAng','tgRoot','tgGap','tgZ1','tgZ2','tgFil','tgFil2','tgTheta','tgCap','tFilZ1','tFilZ2','tGap','tCap','filZ1','filZ2','tjTheta',
    'tkyD','tkyd','tkyt','tkyAng','tkyRoot','tkyGap','tkyFil','tkyAngle','tkyType','tkyBraceGap'];
  const vals={};
  ids.forEach(id=>{ const el=document.getElementById(id); if(el&&el.value!=='') vals[id]=el.value; });
  return {cat:curCat, family:curFamily, joint:curJoint, vals};
}
function _applyPreset(p){
  if(!p) return;
  try{ if(p.cat&&typeof selCat==='function') selCat(p.cat); }catch(e){}
  try{ if(p.family&&typeof selFamily==='function') selFamily(p.family); }catch(e){}
  try{ if(p.joint&&typeof selGroove==='function') selGroove(p.joint); }catch(e){}
  Object.entries(p.vals||{}).forEach(([id,v])=>{ const el=document.getElementById(id); if(el){ el.value=v; } });
  try{ if(typeof onMaterial==='function') onMaterial(); }catch(e){}
  try{ if(typeof onProcess==='function') onProcess(); }catch(e){}
  try{ if(typeof syncT==='function') syncT(); }catch(e){}
  calc();
}
function presetSave(){
  const name=(prompt(tr('프리셋 이름을 입력하세요'))||'').trim();
  if(!name) return;
  const p=_capturePreset(); p.name=name;
  const ex=PRESETS.findIndex(x=>x.name===name);
  if(ex>=0) PRESETS[ex]=p; else PRESETS.push(p);
  presetStore(); renderPresetSelect();
  toast('💾 '+tr('프리셋 저장됨')+': '+name);
}
function presetLoad(){
  const sel=document.getElementById('preset-sel'); if(!sel) return;
  const i=parseInt(sel.value); if(isNaN(i)||!PRESETS[i]) return;
  _applyPreset(PRESETS[i]);
  toast('📂 '+PRESETS[i].name);
}
function presetDelete(){
  const sel=document.getElementById('preset-sel'); if(!sel) return;
  const i=parseInt(sel.value); if(isNaN(i)||!PRESETS[i]) return;
  if(!confirm(tr('이 프리셋을 삭제할까요?')+' ('+PRESETS[i].name+')')) return;
  PRESETS.splice(i,1); presetStore(); renderPresetSelect();
  toast('🗑 '+tr('프리셋 삭제됨'));
}
function renderPresetSelect(){
  const sel=document.getElementById('preset-sel'); if(!sel) return;
  sel.innerHTML='<option value="">'+tr('저장된 프리셋')+'…</option>'+
    PRESETS.map((p,i)=>`<option value="${i}">${escHtml(p.name)}</option>`).join('');
}
function copyResult(){
  const t=window.__lastResultText||'';
  if(!t){ return; }
  const done=()=>toast('📋 '+tr('결과가 복사되었습니다'));
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>_fallbackCopy(t,done));
  } else _fallbackCopy(t,done);
}
function _fallbackCopy(t,done){
  try{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
  catch(e){ toast(tr('복사를 지원하지 않는 환경입니다')); }
}
// 입력값 모순 검사 → 결과 카드 상단에 경고 표시 (계산은 그대로 진행)
function _validateInputs(){
  const box=document.getElementById('res-warn'); if(!box) return;
  const PFX={ButtSquare:'sq',ButtV:'v',ButtBevel:'bev',ButtU:'u',ButtJ:'j',ButtX:'x',ButtK:'k',TKY:'tky',TKYDB:'tky'};
  const pfx=PFX[curJoint];
  const msgs=[];
  const g=(suf)=>{ const el=document.getElementById(pfx+suf); return el?parseFloat(el.value):NaN; };
  if(pfx){
    // 두께: 공통 t₁(gT) 또는 패널 T
    let T=parseFloat(document.getElementById('gT')?.value); if(!isFinite(T)) T=g('T');
    const root=g('Root'), gap=g('Gap'), cap=g('Cap');
    if(isFinite(root)&&isFinite(T)&&root>=T) msgs.push(tr('루트 페이스가 두께 이상입니다'));
    if(isFinite(gap)&&gap<0) msgs.push(tr('루트 갭이 음수입니다'));
    if(isFinite(cap)&&cap<0) msgs.push(tr('덧살이 음수입니다'));
    // TKY: 지관경 ≥ 주관경
    if(curJoint==='TKY'||curJoint==='TKYDB'){
      const D=parseFloat(document.getElementById('tkyD')?.value), dd=parseFloat(document.getElementById('tkyd')?.value);
      if(isFinite(D)&&isFinite(dd)&&dd>=D) msgs.push(tr('지관 외경이 주관 외경 이상입니다'));
    }
    // 이종두께: 단차가 과도 (T2가 T의 2배 초과 등은 단순 경고)
  }
  if(msgs.length){ box.style.display=''; box.innerHTML='⚠ '+msgs.join('<br>⚠ '); }
  else box.style.display='none';
}

//  CANVAS PREVIEW (fallback)

let __hatchCache={};
function mkHatch(dk){
  const key=dk?'d':'l';
  if(__hatchCache[key]) return __hatchCache[key];
  const fallback=dk?'#2b3a57':'#eef2f8';
  try{
    const c=document.createElement('canvas'); c.width=8; c.height=8;
    const x=c.getContext('2d'); if(!x) return fallback;
    x.fillStyle=dk?'#202d47':'#f5f8fc'; x.fillRect(0,0,8,8);
    x.strokeStyle=dk?'#4a5d83':'#aebdd2'; x.lineWidth=1;
    x.beginPath();
    x.moveTo(-2,10); x.lineTo(10,-2);     // 45° 단면 해칭선
    x.moveTo(-2,2);  x.lineTo(2,-2);
    x.moveTo(6,10);  x.lineTo(10,6);
    x.stroke();
    const ctx2=c.getContext('2d');
    const p=ctx2&&ctx2.createPattern?ctx2.createPattern(c,'repeat'):null;
    if(p){ __hatchCache[key]=p; return p; }
  }catch(e){}
  return fallback;
}
function getC(){
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  return {
    plate:dk?'#2b3a57':'#e9eef6', plateS:dk?'#5b6f96':'#8fa1ba',   // 외형선 (가는 잉크)
    hatch:mkHatch(dk),                                              // 절단면 45° 해칭
    wF:dk?'rgba(43,178,76,.32)':'rgba(0,132,61,.22)', wS:dk?'#2bb24c':'#00843D',
    gF:dk?'rgba(230,194,10,.4)':'rgba(202,168,0,.35)',
    pF:dk?'rgba(191,138,255,.25)':'rgba(124,58,237,.18)', pS:dk?'#bf8aff':'#7c3aed',
    dim:dk?'#4ecb6f':'#00843D', txt:dk?'#aeaeb2':'#515154',
    warn:dk?'#e6b800':'#c77d11', warnBg:dk?'rgba(230,184,0,.12)':'rgba(230,150,30,.10)', text:dk?'#e6e6eb':'#1d1d1f',
    frame:dk?'#3a3a3c':'#d2d2d7'
  };
}
function drawPreview(){
  const cv=document.getElementById('preview'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
  const C=getC(), cx=W/2, cy=H/2;

  // 도면 외곽 프레임 (제도 시트 느낌)
  ctx.strokeStyle=C.frame; ctx.lineWidth=1;
  ctx.strokeRect(4.5,4.5,W-9,H-9);

  // helpers
  function fillStroke(fill,stroke){ ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=1.6; ctx.fill(); ctx.stroke(); }
  function lbl(t,x,y,col){ ctx.fillStyle=col||C.txt; ctx.font='10.5px ui-monospace,SFMono-Regular,Consolas,monospace'; ctx.fillText(t,x,y); }
  function tag(t){
    // 생산도면 타이틀 블록 (하단 스트립): DETAIL — 명칭 | N.T.S.
    ctx.strokeStyle=C.frame; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(4.5,H-24.5); ctx.lineTo(W-4.5,H-24.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-56,H-24.5); ctx.lineTo(W-56,H-4.5); ctx.stroke();
    ctx.fillStyle=C.dim; ctx.font='700 10px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText('DETAIL',12,H-10);
    ctx.fillStyle=C.txt; ctx.font='10.5px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText(t,58,H-10);
    ctx.fillStyle=C.txt; ctx.font='10px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText('N.T.S.',W-48,H-10);
  }
  function info(t){ lbl(t,10,H-32); }

  // 덧살을 weld 외곽선에 합치기 위한 보조: p→q 면의 2차 베지어 제어점을 반환.
  // capS>0 이면 interior 반대(바깥)로 볼록, capS<0 이면 안쪽(오목)으로. SV처럼 경계선 없이 합쳐짐.
  function faceCtrl(p,q,interior,capS){
    const mx=(p.x+q.x)/2, my=(p.y+q.y)/2;
    if(!capS) return {x:mx,y:my};
    let nx=-(q.y-p.y), ny=(q.x-p.x);
    const L=Math.hypot(nx,ny)||1; nx/=L; ny/=L;
    if((mx-interior.x)*nx+(my-interior.y)*ny<0){ nx=-nx; ny=-ny; }
    return {x:mx+nx*capS, y:my+ny*capS};
  }

  // Compute a scale that fits thickness T into the canvas vertical budget.
  // Returns {sc, ht, top, bot} where top/bot are y-coords of plate inner faces.
  function vScale(T,frac){
    frac = frac||0.56;
    const sc = Math.min((H*frac)/T, 11);
    const ht = T*sc;
    return { sc, ht, top: cy-ht/2, bot: cy+ht/2 };
  }
  // Draw the two horizontal plates (butt joint, gap centered on cx)
  function buttPlates(top,bot,gS){
    const pW=(W*0.78)/2 - gS;          // each plate width
    const pLx=cx-gS-pW, pRx=cx+gS;
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=0.9;
    // left/right are actually upper/lower halves in a cross-section view → draw as left & right blocks
    // We draw plates to LEFT and RIGHT of the weld centerline (standard butt cross-section is horizontal plates meeting vertically)
  }

  const jt=curJoint;

  // ════════════════════════════════════════════════
  //  BUTT JOINTS  (cross-section: two plates meet at a
  //  vertical seam centred on cx; thickness is vertical)
  //  Plates drawn as filled rectangles left & right;
  //  groove is the void between them, weld fills it.
  // ════════════════════════════════════════════════
  // Standard model: plate spans full width, thickness vertical.
  // Weld prep removes material symmetric about cx.
  // top = upper face, bot = lower face.

  function drawButtPlatesV(top,bot,leftEdgeFn,rightEdgeFn,sc){
    // leftEdgeFn(y) -> x of the right boundary of the LEFT plate at height y
    // rightEdgeFn(y) -> x of the left boundary of the RIGHT plate at height y
    // sc (optional): px-per-mm; enables dissimilar-thickness rendering (right plate thicker by ΔT)
    const pad=W*0.10;
    let dTop=0, dBot=0;
    if(sc && document.getElementById('buttDiff')?.checked){
      const T1=(bot-top)/sc, T2=gv('buttT2')||T1;
      const center=(document.getElementById('buttDiffAlign')?.value==='center');
      const dS=Math.abs(T2-T1)*sc;
      if(center){ dTop=Math.min(dS/2, Math.max(0,top-10)); dBot=Math.min(dS/2, Math.max(0,H-30-bot)); }
      else      { dTop=Math.min(dS,   Math.max(0,top-10)); }
    }
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    // LEFT plate (thinner reference, T₁)
    ctx.beginPath();
    ctx.moveTo(pad, top);
    ctx.lineTo(leftEdgeFn(top), top);
    // walk down the prepared edge
    const steps=24;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(leftEdgeFn(y), y); }
    ctx.lineTo(pad, bot);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // RIGHT plate (top raised by dTop / bottom extended by dBot when 이종 두께)
    const xs=rightEdgeFn(top);
    const xb=rightEdgeFn(bot);
    ctx.beginPath();
    ctx.moveTo(W-pad, top-dTop);
    ctx.lineTo(xs, top-dTop);
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(rightEdgeFn(y), y); }
    if(dBot>0) ctx.lineTo(xb, bot+dBot);
    ctx.lineTo(W-pad, bot+dBot);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // 단차 천이 필릿 (45°)
    ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.6;
    if(dTop>2){
      ctx.beginPath();
      ctx.moveTo(xs, top-dTop);        // step top
      ctx.lineTo(xs, top);             // down the step face
      ctx.lineTo(xs-dTop, top);        // out along the thinner-plate surface
      ctx.closePath(); ctx.fill(); ctx.stroke();
      lbl('ΔT'+(dBot>0?'/2':'')+' '+tr('천이 필릿'), xs+6, top-dTop+4, C.wS);
    }
    if(dBot>2){
      ctx.beginPath();
      ctx.moveTo(xb, bot+dBot);        // step bottom (아랫면)
      ctx.lineTo(xb, bot);             // up the step face
      ctx.lineTo(xb-dBot, bot);        // out along the thinner-plate bottom surface
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }

  // ── Square (I) ──
  if(jt==='ButtSquare'){
    const T=gv('sqT')||6, gap=gvz('sqGap',2), cap=gvz('sqCap',1);
    const {ht,top,bot}=vScale(T,0.5);
    const sc=ht/T, gS=gap>0?Math.max(gap*sc/2,2):0;
    drawButtPlatesV(top,bot, ()=>cx-gS, ()=>cx+gS, sc);
    // weld = gap column + 덧살 보강 비드를 하나의 외곽선으로 합침 (경계선 없음, gap=0이어도 표시)
    const capS=cap>0?Math.max(cap*sc,3):0, halfW=cap>0?Math.max(gS+capS,5):gS;
    ctx.beginPath();
    if(cap>0){
      ctx.moveTo(cx-halfW, top);
      ctx.quadraticCurveTo(cx, top-capS*1.6, cx+halfW, top);  // 상단 보강 곡선
      ctx.lineTo(cx+gS, top);                                  // toe → 기둥 우상단
    } else {
      ctx.moveTo(cx-gS, top);
      ctx.lineTo(cx+gS, top);
    }
    ctx.lineTo(cx+gS, bot);                                    // 우측 기둥
    ctx.lineTo(cx-gS, bot);                                    // 하단
    ctx.lineTo(cx-gS, top);                                    // 좌측 기둥
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    tag(tr('Square Butt (I형)'));
    info(`T=${T}mm  g=${gap}mm  cap=${cap}mm`);
  }

  // ── Single-V ──
  else if(jt==='ButtV'){
    const T=gv('vT')||16, ang=gv('vAng')||60, root=gvz('vRoot',0), gap=gvz('vGap',2), cap=gvz('vCap',1.5);
    const {ht,top,bot}=vScale(T);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, capS=cap*sc, ha=deg2rad(ang/2);
    const bevelDepth=ht-rS;
    const wHalf=bevelDepth*Math.tan(ha);
    const left=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx-gS-wHalf*(1-t);} return cx-gS; };
    const right=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx+gS+wHalf*(1-t);} return cx+gS; };
    drawButtPlatesV(top,bot,left,right,sc);
    ctx.beginPath();
    ctx.moveTo(cx-gS-wHalf, top);
    ctx.lineTo(cx-gS, top+bevelDepth);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    ctx.lineTo(cx+gS, top+bevelDepth);
    ctx.lineTo(cx+gS+wHalf, top);
    ctx.quadraticCurveTo(cx, top-capS, cx-gS-wHalf, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,top+bevelDepth,gS*2,rS); }
    tag(tr('Single-V (V형)')); info(`T=${T}mm  2α=${ang}°  r=${root}  g=${gap}mm`);
  }

  // ── Single Bevel ──
  else if(jt==='ButtBevel'){
    const T=gv('bevT')||16, ang=gv('bevAng')||45, root=gvz('bevRoot',0), gap=gvz('bevGap',2), cap=gvz('bevCap',1.5);
    const {ht,top,bot}=vScale(T,0.52);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const bevelDepth=ht-rS;
    const wRight=bevelDepth*Math.tan(ha);   // only the RIGHT plate is bevelled
    const left=()=>cx-gS;
    const right=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx+gS+wRight*(1-t);} return cx+gS; };
    drawButtPlatesV(top,bot,left,right,sc);
    const bevCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS, top);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    ctx.lineTo(cx+gS, top+bevelDepth);
    ctx.lineTo(cx+gS+wRight, top);              // 상부 우측 toe
    // 덧살: 상부 면을 곡선으로 합침 (양수 볼록 위로, 음수 오목 아래로)
    ctx.quadraticCurveTo((cx-gS+cx+gS+wRight)/2, top-bevCapS, cx-gS, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0 && rS>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,top+bevelDepth,gS*2,rS); }
    tag('Single Bevel'); info(`T=${T}mm  α=${ang}°  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Single-U ──
  else if(jt==='ButtU'){
    const T=gv('uT')||25, R=gv('uR')||6, ang=gv('uAng')||10, root=gvz('uRoot',0), gap=gvz('uGap',2), cap=gvz('uCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, RS=R*sc, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    // U profile: straight slightly-tapered sidewalls from top down to (top + sideH),
    // then quarter-radius curving in to the root face, root face rS tall at bottom.
    const sideH=Math.max(0, ht - rS - RS);
    const topHalf=gS + RS + sideH*Math.tan(ha);   // half-width at the very top face
    const left=(y)=>{
      const yy=y-top;
      if(yy<=sideH){ return cx - (gS+RS+ (sideH-yy)*Math.tan(ha)); }            // tapered sidewall
      if(yy<=sideH+RS){ const dy=yy-sideH; const dx=RS*Math.cos(Math.asin(Math.min(1,dy/RS))); return cx-gS-dx; } // quarter radius (monotonic)
      return cx-gS;                                                              // root face
    };
    const right=(y)=>{ return 2*cx - left(y); };
    drawButtPlatesV(top,bot,left,right,sc);
    // weld fills the void
    const uCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(left(top), top);
    const steps=28;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(left(y), y); }
    ctx.lineTo(cx+gS, bot);
    for(let i=steps;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y), y); }
    // 덧살: 상부 면 곡선으로 합침 (right(top) → left(top))
    ctx.quadraticCurveTo(cx, top-uCapS, left(top), top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,bot-rS,gS*2,rS); }
    tag(tr('Single-U (U형)')); info(`T=${T}  R=${R}  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Single-J ──
  else if(jt==='ButtJ'){
    const T=gv('jT')||20, R=gv('jR')||5, ang=gv('jAng')||10, root=gvz('jRoot',0), gap=gvz('jGap',2), cap=gvz('jCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, RS=R*sc, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const sideH=Math.max(0, ht - rS - RS);
    // J: only RIGHT plate is prepared (curved); LEFT plate straight vertical
    const left=()=>cx-gS;
    const right=(y)=>{
      const yy=y-top;
      if(yy<=sideH){ return cx + (gS+RS+(sideH-yy)*Math.tan(ha)); }
      if(yy<=sideH+RS){ const dy=yy-sideH; const dx=RS*Math.cos(Math.asin(Math.min(1,dy/RS))); return cx+gS+dx; }
      return cx+gS;
    };
    drawButtPlatesV(top,bot,left,right,sc);
    const jCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS, top);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    const steps=28;
    for(let i=steps;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y), y); }
    // 덧살: 상부 면 곡선으로 합침 (right(top) → cx-gS)
    ctx.quadraticCurveTo((cx-gS+right(top))/2, top-jCapS, cx-gS, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,bot-rS,gS*2,rS); }
    tag(tr('Single-J (J형)')); info(`T=${T}  R=${R}  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Double-V (X) ──
  else if(jt==='ButtX'){
    const T=gv('xT')||30, ang=gv('xAng')||60, root=gvz('xRoot',0), gap=gvz('xGap',2), ratio=(gv('xRatio')||60)/100, cap=gvz('xCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang/2);
    // root face centred; upper bevel depth h1, lower bevel depth h2
    const usable=ht-rS;
    const h1=usable*ratio, h2=usable*(1-ratio);
    const rootTop=top+h1, rootBot=rootTop+rS;   // root face band
    const w1=h1*Math.tan(ha), w2=h2*Math.tan(ha);
    const left=(y)=>{
      if(y<rootTop){ const t=(rootTop-y)/h1; return cx-gS-w1*t; }       // upper bevel
      if(y<=rootBot){ return cx-gS; }                                    // root face
      const t=(y-rootBot)/h2; return cx-gS-w2*t;                         // lower bevel
    };
    const right=(y)=>2*cx-left(y);
    drawButtPlatesV(top,bot,left,right,sc);
    // weld = void, 덧살을 상·하부 면에 곡선으로 합침
    const xCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(left(top),top);
    const steps=30;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(left(y),y); }   // 좌측 하강, left(bot)에서 끝
    ctx.quadraticCurveTo(cx, bot+xCapS, right(bot), bot);                                  // 하부 면 (아래로 볼록)
    for(let i=steps-1;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y),y); }  // 우측 상승, right(top)에서 끝
    ctx.quadraticCurveTo(cx, top-xCapS, left(top), top);                                   // 상부 면 (위로 볼록)
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,rootTop,gS*2,rS); }
    tag(tr('Double-V (X형)')); info(`T=${T}mm  2α=${ang}°  ${tr('상부')} ${Math.round(ratio*100)}%  cap=${cap}mm`);
  }

  // ── Double Bevel (K) ──
  else if(jt==='ButtK'){
    const T=gv('kT')||30, ang=gv('kAng')||45, root=gvz('kRoot',0), gap=gvz('kGap',2), ratio=(gv('kRatio')||60)/100, cap=gvz('kCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const usable=ht-rS;
    const h1=usable*ratio, h2=usable*(1-ratio);
    const rootTop=top+h1, rootBot=rootTop+rS;
    const w1=h1*Math.tan(ha), w2=h2*Math.tan(ha);
    // only RIGHT plate bevelled (double bevel = both bevels on one member)
    const left=()=>cx-gS;
    const right=(y)=>{
      if(y<rootTop){ const t=(rootTop-y)/h1; return cx+gS+w1*t; }
      if(y<=rootBot){ return cx+gS; }
      const t=(y-rootBot)/h2; return cx+gS+w2*t;
    };
    drawButtPlatesV(top,bot,left,right,sc);
    const kCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS,top);
    ctx.lineTo(cx-gS,bot);                                                                 // 좌측 직선면, (cx-gS,bot)
    ctx.quadraticCurveTo((cx-gS+cx+gS+w2)/2, bot+kCapS, cx+gS+w2, bot);                     // 하부 면 (아래로 볼록)
    const steps=30;
    for(let i=steps-1;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y),y); }  // 우측 상승, right(top)=cx+gS+w1
    ctx.quadraticCurveTo((cx-gS+cx+gS+w1)/2, top-kCapS, cx-gS, top);                        // 상부 면 (위로 볼록)
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,rootTop,gS*2,rS); }
    tag(tr('Double Bevel (K형)')); info(`T=${T}mm  α=${ang}°  ${tr('상부')} ${Math.round(ratio*100)}%  cap=${cap}mm`);
  }

  // ════════════════════════════════════════════════
  //  FILLET  (T-configuration: vertical web on a
  //  horizontal base; fillet triangles in the corners)
  // ════════════════════════════════════════════════
  else if(jt==='Fillet'){
    const z1=gv('filZ1')||8, z2=(curFilSide==='double'?(gv('filZ2')||8):0), gap=gvz('filGap',0);
    const maxZ=Math.max(z1,z2,1);
    const sc=Math.min((H*0.34)/maxZ, 14);
    const z1S=z1*sc, z2S=z2*sc;
    const baseY=cy+30, webX=cx, webW=14;
    const pad=W*0.14;
    // base plate (horizontal)
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=0.9;
    ctx.fillRect(pad, baseY, W-2*pad, 16); ctx.strokeRect(pad, baseY, W-2*pad, 16);
    // web (vertical)
    const webH=Math.max(z1S,z2S)*1.6+18;
    ctx.fillRect(webX-webW/2, baseY-webH, webW, webH);
    ctx.strokeRect(webX-webW/2, baseY-webH, webW, webH);
    // right fillet (z1)
    ctx.beginPath();
    ctx.moveTo(webX+webW/2, baseY);
    ctx.lineTo(webX+webW/2+z1S, baseY);
    ctx.lineTo(webX+webW/2, baseY-z1S);
    ctx.closePath(); fillStroke(C.wF,C.wS);
    // left fillet (z2) if double
    if(curFilSide==='double'){
      ctx.beginPath();
      ctx.moveTo(webX-webW/2, baseY);
      ctx.lineTo(webX-webW/2-z2S, baseY);
      ctx.lineTo(webX-webW/2, baseY-z2S);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    if(gap>0){ const gS=Math.min(gap*sc,10); ctx.fillStyle=C.gF; ctx.fillRect(webX-webW/2,baseY,webW,gS); }
    // throat dimension hint on z1
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=0.8; ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(webX+webW/2, baseY-z1S); ctx.lineTo(webX+webW/2+z1S, baseY); ctx.stroke();
    ctx.restore();
    tag('Fillet '+(curFilSide==='double'?tr('(양면 Double)'):tr('(일면 Single)')));
    info(`z₁=${z1}${z2?'  z₂='+z2:''}mm  g=${gap}mm`);
  }

  // ════════════════════════════════════════════════
  //  T-JOINT  (angled web; fillet legs; optional PJP)
  // ════════════════════════════════════════════════
  else if(jt==='TJoint'){
    const z1=gv('tFilZ1')||8, z2=(curTSub!=='single'?(gv('tFilZ2')||8):0);
    const gap=gvz('tGap',0), theta=gv('tAngle')||90, cap=gvz('tCap',0);
    const maxZ=Math.max(z1,z2,1);
    const sc=Math.min((H*0.30)/maxZ, 12);
    const z1S=z1*sc, z2S=z2*sc;
    const baseY=cy+40, pad=W*0.12, webW=14, webLen=Math.min(H*0.5,118);
    // base plate (단면 해칭)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.fillRect(pad, baseY, W-2*pad, 16); ctx.strokeRect(pad, baseY, W-2*pad, 16);
    // ── inclined web (parallelogram, feet on the base surface) ──
    const th=deg2rad(theta);
    const ux=Math.cos(th), uy=-Math.sin(th);             // web axis (up; tilts right when θ<90)
    const nx=Math.sin(th), ny=Math.cos(th);              // perpendicular
    const hw=webW/2;
    // wall base points ON the base line (same math as the TKY brace feet)
    function basePt(s){ const t=-(s*hw*ny)/uy; return {x:cx+s*hw*nx+t*ux, y:baseY}; }
    const B1=basePt(+1), B2=basePt(-1);                  // B1 = +n side (right/obtuse), B2 = −n side (left/acute)
    const T1={x:B1.x+ux*webLen, y:B1.y+uy*webLen};
    const T2={x:B2.x+ux*webLen, y:B2.y+uy*webLen};
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(B1.x,B1.y); ctx.lineTo(T1.x,T1.y); ctx.lineTo(T2.x,T2.y); ctx.lineTo(B2.x,B2.y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // ── fillets follow the web walls: leg z along base + leg z UP THE WALL (axis dir) ──
    // 덧살 cap: 필릿 빗변(toe→wall)을 곡선으로 합쳐 볼록(+)/오목(−) 표현. 음수면 면적 감소.
    const tCapS=cap*sc;
    // right-side fillet (z1): toe outward on base, leg up the wall from B1
    { const toe={x:B1.x+z1S,y:baseY}, wall={x:B1.x+ux*z1S,y:baseY+uy*z1S};
      const c=faceCtrl(toe,wall,B1,tCapS);
      ctx.beginPath();
      ctx.moveTo(B1.x, baseY);
      ctx.lineTo(toe.x, toe.y);                            // toe along base (outward)
      ctx.quadraticCurveTo(c.x,c.y, wall.x,wall.y);        // 빗변(덧살 합침)
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    // left-side fillet (z2) for double
    if(curTSub!=='single' && z2){
      const toe={x:B2.x-z2S,y:baseY}, wall={x:B2.x+ux*z2S,y:baseY+uy*z2S};
      const c=faceCtrl(toe,wall,B2,tCapS);
      ctx.beginPath();
      ctx.moveTo(B2.x, baseY);
      ctx.lineTo(toe.x, toe.y);
      ctx.quadraticCurveTo(c.x,c.y, wall.x,wall.y);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(Math.min(B1.x,B2.x), baseY-2, Math.abs(B1.x-B2.x), 3); }
    // θ arc annotation at the right foot
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(B1.x+4,baseY); ctx.lineTo(B1.x+52,baseY); ctx.stroke();   // base ref
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(B1.x, baseY, 30, -th, 0); ctx.stroke();                       // angle arc
    ctx.restore();
    lbl(`θ=${theta}°  Kθ=${rnd(1/Math.sin(th),3)}`, B1.x+58, baseY-10, C.dim);
    tag('T-Joint Fillet  z₁='+z1+(z2?'  z₂='+z2:''));
    info(theta<90?tr('경사 T이음 — 예각측 용착량 증가 (Kθ 적용)'):tr('직각 T이음'));
  }

  // ── T-Joint with groove prep (V/X/Bevel/K) ──
  else if(jt==='TJointBevel'||jt==='TJointK'){
    const T=gv('tgT')||16, ang=gv('tgAng')||45, root=gvz('tgRoot',0), gap=gvz('tgGap',2);
    const ratio=(gv('tgRatio')||60)/100, fil=gvz('tgFil',0), fil2=gvz('tgFil2',0), theta=gv('tgTheta')||90, cap=gvz('tgCap',0);
    const isK=(jt==='TJointK');
    const pad=W*0.12;
    // Member THICKNESS T runs horizontally in the cross-section.
    // Scale must also fit the notch rise h·tan(α) vertically.
    const hMM=(T-root);
    const riseMM=hMM*Math.tan(deg2rad(ang))*(isK?Math.max(ratio,1-ratio):1);
    const baseTop=cy+H*0.18;                      // top surface of base plate
    const kS=Math.abs(1/Math.tan(deg2rad(theta||90)));
    let memHmax=Math.min(H*0.56, baseTop-48);                                   // 상단 라벨 보호
    if(kS>0.05) memHmax=Math.min(memHmax, Math.max(40,(W-110-cx)/kS));          // shear 우측 프레임 보호
    let sc=Math.min((W*0.28)/T, (H*0.40)/Math.max(riseMM, T*0.8), 9);
    sc=Math.min(sc, Math.max(0.8,(memHmax-22)/Math.max(riseMM,1)));             // 노치가 부재 안에 들도록 스케일 축소
    const memW=T*sc;                              // member thickness on screen (horizontal)
    const baseH=Math.max(14, Math.min(memW*0.45, H-40-baseTop));                // info 라인 보호
    let memH=Math.min(memHmax, Math.max(riseMM*sc+22, memW*1.5));
    const memX=cx-memW/2, rightX=memX+memW;       // member left/right faces
    const memTopY=baseTop-memH;
    const gS=Math.max(gap*sc,0), rootS=root*sc;
    const ha=deg2rad(ang);

    // base plate (단면 해칭)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.fillRect(pad, baseTop, W-2*pad, baseH); ctx.strokeRect(pad, baseTop, W-2*pad, baseH);

    // θ 기울임: shear 변환 (바닥 y=baseTop 고정, 위로 갈수록 cotθ 만큼 이동 → 부재 축이 θ)
    const kSh=1/Math.tan(deg2rad(theta));
    ctx.save(); ctx.transform(1,0,-kSh,1,kSh*baseTop,0);

    // ---- upright member: bottom END prepared (bevel cut through the THICKNESS) ----
    // Single bevel (HV): root face of width `root` stays flat (left side);
    //   the remaining thickness h=T-root is cut: notch rises on the right face
    //   to height h·tan(α).  Double bevel (K): notches cut from BOTH faces,
    //   root face land of width `root` in the middle.
    const memBot=baseTop-gS;                       // bottom edge (lifted by root gap)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.beginPath();
    if(!isK){
      const h=(T-root)*sc;                        // bevel width through thickness
      const rise=h*Math.tan(ha);                  // notch height on the right face
      ctx.moveTo(memX, memTopY);                  // top-left
      ctx.lineTo(rightX, memTopY);                // top-right
      ctx.lineTo(rightX, memBot-rise);            // down right face to notch top
      ctx.lineTo(memX+rootS, memBot);             // bevel face down-left to root-face edge
      ctx.lineTo(memX, memBot);                   // root face (flat bottom, left part)
      ctx.closePath();
    } else {
      const h1=(T-root)*ratio*sc, h2=(T-root)*(1-ratio)*sc;
      const rise1=h1*Math.tan(ha), rise2=h2*Math.tan(ha);
      // left notch (h2 side), root land in middle, right notch (h1 side)
      ctx.moveTo(memX, memTopY);
      ctx.lineTo(rightX, memTopY);
      ctx.lineTo(rightX, memBot-rise1);           // right face down to right-notch top
      ctx.lineTo(rightX-h1, memBot);              // right bevel to root land
      ctx.lineTo(memX+h2, memBot);                // root face land (flat)
      ctx.lineTo(memX, memBot-rise2);             // left bevel up to left face
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();

    // ---- weld fills the notch(es) + reinforcing fillet(s) ----
    // 덧살 cap: 용접 외측 면(B→C)을 곡선으로 합쳐 볼록(+)/오목(−). 음수면 용착부 감소.
    ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.8;
    const fS=fil>0?fil*sc:Math.min(memW*0.45, 26);
    const tgCapS=cap*sc, tgCtr={x:cx,y:baseTop};
    if(!isK){
      const h=(T-root)*sc, rise=h*Math.tan(ha);
      const B={x:rightX,y:memBot-rise}, Cc={x:rightX+fS,y:baseTop};
      const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
      ctx.beginPath();
      ctx.moveTo(memX+rootS, memBot);             // root-face edge (notch inner corner)
      ctx.lineTo(B.x, B.y);                        // up the bevel face
      ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);  // 외측 면 (덧살 합침) → fillet toe
      ctx.lineTo(memX+rootS, baseTop);            // along base surface back under the notch
      ctx.closePath(); fillStroke(C.wF,C.wS);
    } else {
      const h1=(T-root)*ratio*sc, h2=(T-root)*(1-ratio)*sc;
      const rise1=h1*Math.tan(ha), rise2=h2*Math.tan(ha);
      // right-side weld
      { const B={x:rightX,y:memBot-rise1}, Cc={x:rightX+fS,y:baseTop};
        const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
        ctx.beginPath();
        ctx.moveTo(rightX-h1, memBot);
        ctx.lineTo(B.x,B.y);
        ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);
        ctx.lineTo(rightX-h1, baseTop);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      }
      // left-side weld
      { const B={x:memX,y:memBot-rise2}, Cc={x:memX-fS,y:baseTop};
        const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
        ctx.beginPath();
        ctx.moveTo(memX+h2, memBot);
        ctx.lineTo(B.x,B.y);
        ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);
        ctx.lineTo(memX+h2, baseTop);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      }
    }
    // 뒷면 보강 필릿 z₂ (양면 용접)
    if(fil2>0){
      const f2=Math.min(fil2*sc, memW*0.9);
      ctx.beginPath();
      ctx.moveTo(memX, baseTop);
      ctx.lineTo(memX-f2, baseTop);
      ctx.lineTo(memX, baseTop-f2);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    // root gap band
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(memX+(isK?(T-root)*(1-ratio)*sc:0), memBot, rootS, gS); }

    // θ centreline (변환 안 → 부재 축 따라 기울어짐)
    ctx.strokeStyle=C.dim; ctx.lineWidth=0.8; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(cx,baseTop); ctx.lineTo(cx,memTopY-6); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();   // shear 해제
    lbl(`θ=${theta}°  Kθ=${rnd(1/Math.sin(deg2rad(theta)),3)}`, 8, 30, C.dim);
    tag(tr(ISO[jt]?.name||'T-Joint')+`  T=${T}  α=${ang}°`);
    info(`Root Face=${root}  Gap=${gap}mm${fil?'  '+tr('보강필릿')+' z='+fil:''}`);
  }

  // ════════════════════════════════════════════════
  //  TKY TUBULAR  (tube-on-tube: brace welded to chord)
  // ════════════════════════════════════════════════
  else if(jt==='TKY'||jt==='TKYDB'){
    const theta=gv('tkyAngle')||45, D=gv('tkyD')||508, d=gv('tkyd')||219;
    const tw=gv('tkyt')||12, ang=gv('tkyAng')||45, root=gvz('tkyRoot',0), gap=gvz('tkyGap',3), fil=gvz('tkyFil',8);
    const ttype=document.getElementById('tkyType')?.value||'Y';
    const braceGap=gvz('tkyBraceGap',0);
    const isOverlap=(ttype==='K' && braceGap<0);
    const dbl=(jt==='TKYDB');
    const sv=Math.sin(deg2rad(theta));
    const beta=Math.min(0.99, d/Math.max(D,1));

    // ════ LEFT (58%): tube-on-tube overview ════
    const cxx=W*0.30, chMidY=cy+38;
    const chR=W*0.26;                         // chord half-length on screen
    const chRy=Math.min(24, H*0.14);          // chord tube radius
    const chLx=cxx-chR, chRx=cxx+chR;
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.3;
    ctx.beginPath();
    ctx.moveTo(chLx, chMidY-chRy);
    ctx.lineTo(chRx, chMidY-chRy);
    ctx.ellipse(chRx, chMidY, 9, chRy, 0, -Math.PI/2, Math.PI/2);
    ctx.lineTo(chLx, chMidY+chRy);
    ctx.ellipse(chLx, chMidY, 9, chRy, 0, Math.PI/2, -Math.PI/2, true);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(chLx, chMidY, 9, chRy, 0, 0, Math.PI*2); ctx.stroke();
    ctx.save(); ctx.globalAlpha=0.5;
    ctx.beginPath(); ctx.ellipse(chLx, chMidY, 9*0.62, chRy*0.78, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();

    function drawBrace(angDeg, dirSign, footOffset){
      const th=deg2rad(angDeg);
      const bRy=Math.max(7, Math.min(chRy*0.62, beta*chRy*1.6));
      const bLen=Math.min(H*0.38, 100);
      const topY=chMidY-chRy;
      const fx=cxx + dirSign*(footOffset!=null?footOffset:chR*0.34);
      const ux=dirSign*Math.cos(th), uy=-Math.sin(th);
      const nx=Math.sin(th),         ny=dirSign*Math.cos(th);
      function basePoint(s){ const t=-(s*bRy*ny)/uy; return {x:fx+s*bRy*nx+t*ux, y:topY}; }
      const B1=basePoint(+1), B2=basePoint(-1);
      const tcx=fx+ux*bLen, tcy=topY+uy*bLen;
      const T1={x:tcx+bRy*nx, y:tcy+bRy*ny};
      const T2={x:tcx-bRy*nx, y:tcy-bRy*ny};
      const tipRot=Math.atan2(ny,nx);
      ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.3;
      ctx.beginPath();
      ctx.moveTo(B1.x,B1.y); ctx.lineTo(T1.x,T1.y); ctx.lineTo(T2.x,T2.y); ctx.lineTo(B2.x,B2.y);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle=C.plate;
      ctx.beginPath(); ctx.ellipse(tcx,tcy, bRy, bRy*0.32, tipRot, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.4;
      const wOut=8, wUp=8;
      [[B1,+1],[B2,-1]].forEach(([B,s])=>{
        const out=s*(B1.x>=B2.x?1:-1);
        ctx.beginPath();
        ctx.moveTo(B.x, topY);
        ctx.lineTo(B.x+out*wOut, topY);
        ctx.lineTo(B.x+ux*wUp, topY+uy*wUp);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      });
    }
    if(ttype==='K'){
      // 겹침이면 두 brace foot을 가깝게 당겨 교차 표현 / gap>0이면 벌려 표현
      const baseOff=chR*0.34;
      const off=isOverlap ? Math.max(chR*0.12, baseOff*0.45) : baseOff;
      drawBrace(theta,+1,off); drawBrace(theta,-1,off);
      if(isOverlap){
        // 두 brace가 겹치는 지점 강조 (chord 표면 교차부)
        ctx.save();
        ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.6;
        const mx=cxx, my=chMidY-chRy;
        ctx.beginPath(); ctx.arc(mx,my,7,0,Math.PI*2); ctx.closePath(); fillStroke(C.wF,C.wS);
        ctx.restore();
        lbl(tr('겹침부'), mx-14, my-12, C.wS);
      }
    }
    else { drawBrace(theta,+1); }   // Single (T/Y): θ=90이면 T형

    // ════ RIGHT (42%): CHORD 단면 뷰 — 원형 chord에 brace 안착 (β=d/D → 부착각 Ψs) ════
    const sx0=W*0.585, sw=W-sx0-6;
    if(isOverlap){
      // 겹침 K-joint: 단면도 대신 "별도 상세도 + PQR 검증" 안내
      ctx.save();
      ctx.strokeStyle=C.dim; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(W*0.575, 14); ctx.lineTo(W*0.575, H-28); ctx.stroke();
      ctx.setLineDash([]);
      // 경고 박스
      const bx=sx0+4, by=46, bw=sw-2, bh=H-92;
      ctx.fillStyle=C.warnBg||'rgba(230,150,30,0.10)';
      ctx.strokeStyle=C.warn||'#c77d11'; ctx.lineWidth=1.3;
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke(); }
      else { ctx.fillRect(bx,by,bw,bh); ctx.strokeRect(bx,by,bw,bh); }
      ctx.restore();
      // ⚠ 아이콘 + 문구 (줄바꿈 수동)
      ctx.save();
      ctx.fillStyle=C.warn||'#c77d11';
      ctx.font='600 18px system-ui,sans-serif'; ctx.textAlign='center';
      ctx.fillText('⚠', sx0+sw/2, by+30);
      ctx.fillStyle=C.text||'#1d1d1f';
      ctx.font='600 11px system-ui,sans-serif';
      const lines=tr('겹침 K-Joint 안내').split('|');
      let yy=by+52;
      lines.forEach(ln=>{ ctx.fillText(ln, sx0+sw/2, yy); yy+=16; });
      ctx.restore();
      lbl(tr('Chord Section (단면)'), sx0+6, 24, C.dim);
    } else {
    // viewport divider
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=0.7; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(W*0.575, 14); ctx.lineTo(W*0.575, H-28); ctx.stroke(); ctx.restore();
    // chord circle (단면 — 해칭)
    const Rc=Math.min(sw*0.43, H*0.30);
    const scx=sx0+sw*0.5, scy=H*0.56;
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.arc(scx,scy,Rc,0,Math.PI*2); ctx.closePath(); ctx.fill(); ctx.stroke();
    // chord 내경 (벽두께 암시)
    ctx.save(); ctx.globalAlpha=0.45;
    ctx.beginPath(); ctx.arc(scx,scy,Rc*0.84,0,Math.PI*2); ctx.closePath(); ctx.stroke(); ctx.restore();
    // brace 안착: 접점 반각 φ=asin(β), 단면 부착각 ω (90°=정상부 수직)
    const phi=Math.asin(beta);
    const om=Math.PI/2;                                // 표준 수직 안착 (회전 대칭 — 각도 무관)
    const bax=Math.cos(om), bay=-Math.sin(om);        // brace 축 단위벡터 (중심 통과)
    const pa=Math.atan2(bay,bax);                      // 축 위치각
    const aP=pa+phi, aQ=pa-phi;                        // 접점 위치각 (축 기준 ±asinβ)
    const Px=scx+Rc*Math.cos(aP), Py=scy+Rc*Math.sin(aP);
    const Qx=scx+Rc*Math.cos(aQ), Qy=scy+Rc*Math.sin(aQ);
    let Lb=H*0.40;                                     // 끝단이 캔버스를 벗어나지 않게 클램프
    if(bax>0.05) Lb=Math.min(Lb, (W-10-Math.max(Px,Qx))/bax);
    if(bay<-0.05) Lb=Math.min(Lb, (Math.min(Py,Qy)-50)/(-bay));   // 상단 라벨 영역 침범 방지
    Lb=Math.max(Lb, H*0.16);
    // brace band: 축 방향 벽, 바닥은 chord 원호(saddle cut) — 단면 해칭
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(Qx+bax*Lb, Qy+bay*Lb);
    ctx.lineTo(Qx, Qy);
    for(let i=0;i<=20;i++){ const a=aQ+(aP-aQ)*i/20; ctx.lineTo(scx+Rc*Math.cos(a), scy+Rc*Math.sin(a)); }
    ctx.lineTo(Px+bax*Lb, Py+bay*Lb);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // brace 내벽 (벽두께 t): βi=(d−2t)/D
    const betaI=Math.max(0,(d-2*tw)/Math.max(D,1));
    const phiI=Math.asin(Math.min(betaI,0.99));
    ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    [pa+phiI, pa-phiI].forEach(a=>{
      const ix=scx+Rc*Math.cos(a), iy=scy+Rc*Math.sin(a);
      ctx.beginPath(); ctx.moveTo(ix+bax*Lb*0.96, iy+bay*Lb*0.96); ctx.lineTo(ix, iy); ctx.stroke();
    });
    ctx.restore();
    // 용접: 접점 코너 (brace 벽 ↔ 원 접선, 내각 Ψs=90°+φ) — 양측
    ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.6;
    const wl=Math.max(9, Math.min(16, fil*1.2));
    [[Px,Py,aP,+1],[Qx,Qy,aQ,-1]].forEach(([px,py,af,s])=>{
      const tx=-Math.sin(af)*s, ty=Math.cos(af)*s;     // 원 둘레 접선, brace에서 멀어지는 방향
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px+bax*wl*1.1, py+bay*wl*1.1);        // 벽 따라 위로 (축 방향)
      ctx.lineTo(px+tx*wl, py+ty*wl);                  // 원 표면 따라 바깥으로
      ctx.closePath(); fillStroke(C.wF,C.wS);
    });
    // Ψs 호 + 라벨 (s=+1 접점): 축 방향 → 접선 방향
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(Px, Py, 18, pa, aP+Math.PI/2); ctx.stroke(); ctx.restore();
    lbl(tr('Chord Section (단면)'), sx0+6, 24, C.dim);
    lbl(`β=${rnd(beta,3)}  Ψs=${rnd(90+phi*180/Math.PI,1)}°`, sx0+6, 40, C.wS);
    lbl(`OD₁=${D}`, scx-16, scy+6, C.dim);
    lbl(`OD₂=${d}`, Math.min(W-34, Px+bax*Lb+6), Math.max(52, Py+bay*Lb+12), C.dim);
    }

    const fcv=Math.tan((Math.PI-deg2rad(theta))/2), fsv=Math.tan((Math.PI/2+Math.asin(beta))/2);
    tag(`Branch ${dbl?'Double':'Single'}-Bevel (${ttype})  θ=${theta}°  β=${rnd(beta,2)}`);
    lbl(`Toe:${rnd(fcv,2)} Sad:${rnd(fsv,2)} Heel:${rnd(1/sv,2)}`, 8, 30, C.dim);
    info(isOverlap
      ? tr('겹침 K-Joint — 겹침부는 별도 상세도 작성 및 PQR 검증 필요')
      : `t=${tw}  α=${ang}°  r=${root}  g=${gap} — `+tr('우측: Chord 단면, β에 따라 부착각 Ψs 변화'));
  }
}

function downloadBlob(bytes, filename){
  const blob=new Blob([bytes],{type:'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},100);
}
function downloadText(text, filename, mime){
  const blob=new Blob(['\uFEFF'+text],{type:(mime||'text/csv')+';charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},100);
}

function actualMass(b){
  // 실제 용착량(kg, Joint 1개). 입력측 우선: 용접후 실제사용량×효율 → 용접중 용착속도×아크타임
  const a=b.actual||{}, post=a.post||{}, mid=a.mid||{};
  const proc=b.process||'SMAW'; const eff=(PROC[proc]?.iiw||80)/100;
  const usedKg=parseFloat(post.usedKg);
  if(!isNaN(usedKg)&&usedKg>0) return usedKg*eff;
  const dr=parseFloat(mid.depRate), am=parseFloat(mid.arcMin);
  if(!isNaN(dr)&&!isNaN(am)&&dr>0&&am>0) return dr*am/60;
  return null;
}

  const GROUP_LABEL={ID:tr('식별'),JOINT:'Joint',MAT:tr('재질 (Material)'),GROOVE:tr('그루브'),TKY:'Branch',OPT:tr('옵션')};

    {project:'Hull Block',   component:'엔진룸/Engine', jointNo:'W-101', jointType:'T',   groove:'SBDF', process:'FCAW', weldLength:800, qty:8, T:16, ang:45, root:2, gap:2, z1:8, z2:6, tAngle:90},

  const styleMap={0:{},1:{},2:{},3:{}};
  COLS.forEach((c,ci)=>{ styleMap[0][ci]=4; styleMap[1][ci]=5; styleMap[2][ci]=c.req?1:2; styleMap[3][ci]=3; });
  const cols=COLS.map(c=>c.w);
  const L=(n)=>{let s='';while(n>0){const m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;};
  const jtCol=COLS.findIndex(c=>c.k==='jointType')+1;
  const gvCol=COLS.findIndex(c=>c.k==='groove')+1;
  const r0=5, r1=200;
