<script>
(function(){try{var P=Storage.prototype;if(P.__wdcNS)return;P.__wdcNS=1;var _g=P.getItem,_s=P.setItem,_r=P.removeItem;var G={wdc_lang:1,wdc_accounts:1,wdc_session:1};function NS(){try{return (window.parent&&window.parent!==window&&window.parent.__WDC_NS)||window.__WDC_NS||'';}catch(e){return window.__WDC_NS||'';}}function K(k){if(typeof k==='string'&&!G[k]&&(k.indexOf('wdc_')===0||k.indexOf('wrc_')===0)){var n=NS();if(n)return 'u_'+n+'__'+k;}return k;}P.getItem=function(k){return _g.call(this,K(k));};P.setItem=function(k,v){return _s.call(this,K(k),v);};P.removeItem=function(k){return _r.call(this,K(k));};}catch(e){}})();

/* ====== 공용 헬퍼 (Calculator 와 동일) ====== */
function tr(s){ return s; }                 // KO 기준 (병합 시 I18N 연결)
const deg2rad = d => d*Math.PI/180;
const rnd = (n,d=4) => isNaN(n)?0:parseFloat(n.toFixed(d));

/* ====== PROCESS 효율 (Calculator PROC 와 동일 def) ====== */
const PROC = {
  SMAW:{def:65}, GMAW:{def:85}, FCAW:{def:80}, SAW:{def:95}, GTAW:{def:95}, CUSTOM:{def:85}
};

/* ====== 계산 엔진 — Welding Deposit Calculator 에서 verbatim 이식 ====== */
function computeDeposit(s){
  const nz=(v,d)=>{ const x=parseFloat(v); return isNaN(x)?d:x; };
  const ui=!s;
  const rho=ui?gv('density'):(parseFloat(s.rho)||7.85);
  const L=ui?gv('weldLength'):(parseFloat(s.weldLength)||1000);
  const eta=ui?gv('efficiency')/100:(parseFloat(s.efficiency)||80)/100;
  const jt=ui?curJoint:(s.jointType||'ButtV');
  let area=0, adjFactor=1, breakdown=[], _tkyK=null;

  // ── Butt joints ──
  if(jt==='ButtSquare'){
    const T=ui?gv('sqT'):(parseFloat(s.T)||6);
    const gap=ui?gv('sqGap'):(nz(s.gap,2));
    const cap=ui?gvz('sqCap',1):(nz(s.cap,1));
    // 보강 비드 폭 ≈ gap + 2×cap (양쪽 toe가 cap 높이만큼 퍼짐), 삼각 근사 ½·폭·cap
    const capW=gap+2*cap;
    const capA=capW*cap*0.5;
    area=gap*T+capA;
    breakdown.push({l:'Gap 기여 면적 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtV'){
    const T=ui?gv('vT'):(parseFloat(s.T)||16);
    const ang=ui?gv('vAng'):(parseFloat(s.ang)||60);
    const root=ui?gv('vRoot'):(nz(s.root,0));
    const gap=ui?gv('vGap'):(nz(s.gap,2));
    const cap=ui?gv('vCap'):(nz(s.cap,1.5));
    const h=T-root; const ha=deg2rad(ang/2);
    const wTop=2*h*Math.tan(ha)+gap;
    const grooveV=h*h*Math.tan(ha);            // V 삼각부 (양측 베벨)
    const capA=wTop*cap*0.5;
    area=grooveV+gap*T+capA;                   // gap 기둥은 전체 두께 g×T
    breakdown.push({l:'V 개선부',v:rnd(grooveV,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtBevel'){
    const T=ui?gv('bevT'):(parseFloat(s.T)||16);
    const ang=ui?gv('bevAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('bevRoot'):(nz(s.root,0));
    const gap=ui?gv('bevGap'):(nz(s.gap,2));
    const cap=ui?gvz('bevCap',1.5):(nz(s.cap,1.5));
    const h=T-root; const ha=deg2rad(ang);
    const grooveA=h*h*Math.tan(ha)/2;
    const wTop=h*Math.tan(ha)+gap;             // 상부 개선 폭 (단면 bevel + gap)
    const capA=Math.max(0,wTop)*cap*0.5;
    area=grooveA+gap*T+capA;
    breakdown.push({l:'Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtU'){
    const T=ui?gv('uT'):(parseFloat(s.T)||25);
    const R=ui?gv('uR'):(parseFloat(s.R)||6);
    const ang=ui?gv('uAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('uRoot'):(nz(s.root,0));
    const gap=ui?gv('uGap'):(nz(s.gap,2));
    const cap=ui?gvz('uCap',1.5):(nz(s.cap,1.5));
    const h=Math.max(0,T-root-R); const ha=deg2rad(ang);
    const wTop=gap+2*(R+h*Math.tan(ha));       // 상부 개선 폭
    const capA=Math.max(0,wTop)*cap*0.5;
    area=Math.PI*R*R/2+h*(2*R+2*(R+h*Math.tan(ha)))/2+gap*T+capA;
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtJ'){
    const T=ui?gv('jT'):(parseFloat(s.T)||20);
    const R=ui?gv('jR'):(parseFloat(s.R)||5);
    const ang=ui?gv('jAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('jRoot'):(nz(s.root,0));
    const gap=ui?gv('jGap'):(nz(s.gap,2));
    const cap=ui?gvz('jCap',1.5):(nz(s.cap,1.5));
    const h=Math.max(0,T-root-R); const ha=deg2rad(ang);
    const wTop=gap+R+h*Math.tan(ha);           // 상부 개선 폭 (편측 J)
    const capA=Math.max(0,wTop)*cap*0.5;
    area=Math.PI*R*R/4+h*(R+R+h*Math.tan(ha))/2+gap*T+capA;
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtX'){
    const T=ui?gv('xT'):(parseFloat(s.T)||30);
    const ang=ui?gv('xAng'):(parseFloat(s.ang)||60);
    const root=ui?gv('xRoot'):(nz(s.root,0));
    const gap=ui?gv('xGap'):(nz(s.gap,2));
    const cap=ui?gvz('xCap',1.5):(nz(s.cap,1.5));
    const ratio=(ui?gv('xRatio'):(parseFloat(s.ratio)||50))/100;
    const ha=deg2rad(ang/2);
    const h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
    const grooveX=(h1*h1+h2*h2)*Math.tan(ha);
    const wTop1=2*h1*Math.tan(ha)+gap, wTop2=2*h2*Math.tan(ha)+gap;  // 앞면·뒷면 개선 폭
    const capA=(Math.max(0,wTop1)+Math.max(0,wTop2))*cap*0.5;        // 양면 보강
    area=grooveX+gap*T+capA;
    breakdown.push({l:'상·하 개선부',v:rnd(grooveX,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적 (양면)',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtK'){
    const T=ui?gv('kT'):(parseFloat(s.T)||30);
    const ang=ui?gv('kAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('kRoot'):(nz(s.root,0));
    const gap=ui?gv('kGap'):(nz(s.gap,2));
    const cap=ui?gvz('kCap',1.5):(nz(s.cap,1.5));
    const ratio=(ui?gv('kRatio'):(parseFloat(s.ratio)||50))/100;
    const ha=deg2rad(ang);
    const h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
    const grooveK=(h1*h1+h2*h2)*Math.tan(ha)/2;
    const wTop1=h1*Math.tan(ha)+gap, wTop2=h2*Math.tan(ha)+gap;     // 앞면·뒷면 개선 폭 (편측 bevel)
    const capA=(Math.max(0,wTop1)+Math.max(0,wTop2))*cap*0.5;        // 양면 보강
    area=grooveK+gap*T+capA;
    breakdown.push({l:'상·하 개선부',v:rnd(grooveK,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적 (양면)',v:rnd(capA,2),u:'mm²'});
  }
  // ── Fillet ──
  else if(jt==='Fillet'){
    const side=ui?curFilSide:(s.filSide||'single');
    const z1=ui?gv('filZ1'):(nz(s.z1,8));
    const z2=(side==='double')?(ui?gv('filZ2'):(parseFloat(s.z2)||z1)):0;
    const k=ui?gv('filK'):(parseFloat(s.filK)||0.707);
    const gap=ui?gv('filGap'):(nz(s.gap,0));
    const a1=z1, a2=z2;
    const throat1=a1*k, throat2=a2*k;
    const areaF1=0.5*a1*a1+gap*a1;
    const areaF2=side==='double'?(0.5*a2*a2+gap*a2):0;
    area=areaF1+areaF2;
    breakdown.push({l:'목두께 throat₁',v:rnd(throat1,2),u:'mm'});
    breakdown.push({l:'앞면 단면적 A₁',v:rnd(areaF1,2),u:'mm²'});
    if(side==='double'){
      breakdown.push({l:'목두께 throat₂',v:rnd(throat2,2),u:'mm'});
      breakdown.push({l:'뒷면 단면적 A₂',v:rnd(areaF2,2),u:'mm²'});
    }
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*(a1+(side==='double'?a2:0)),2),u:'mm²',type:'gap'});
  }
  // ── T-Joint (Fillet) ──
  else if(jt==='TJoint'){
    const side=ui?curTSub:(s.tSubtype||'double');
    const z1=ui?gv('tFilZ1'):(nz(s.z1,8));
    const z2=(side!=='single')?(ui?gv('tFilZ2'):(parseFloat(s.z2)||z1)):0;
    const gap=ui?gv('tGap'):(nz(s.tGap,0));
    const cap=ui?gvz('tCap',0):(nz(s.cap,0));
    const theta=ui?gv('tAngle'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let baseArea=0;
    if(side==='single') baseArea=0.5*z1*z1+gap*z1;
    else{
      const a1=0.5*z1*z1+gap*z1;
      const a2=0.5*z2*z2+gap*z2;
      baseArea=a1+a2;
      breakdown.push({l:'앞면 A₁',v:rnd(a1,2),u:'mm²'});
      breakdown.push({l:'뒷면 A₂',v:rnd(a2,2),u:'mm²'});
    }
    // 덧살: 용접면(빗변) 볼록(+)/오목(−) 보강. 면폭 = z×√2, 용접면마다 적용. 음수 가능.
    const faceW=z1*Math.SQRT2+(side!=='single'?z2*Math.SQRT2:0);
    const capA=0.5*faceW*cap;
    area=baseArea+capA;
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*z1,2),u:'mm²',type:'gap'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── T-Joint with groove prep (V / X / Bevel / K) ──
  else if(jt==='TJointBevel'||jt==='TJointK'){
    const T=ui?gv('tgT'):(parseFloat(s.T)||16);
    const ang=ui?gv('tgAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('tgRoot'):(nz(s.root,0));
    const gap=ui?gv('tgGap'):(nz(s.gap,2));
    const ratio=(ui?gv('tgRatio'):(parseFloat(s.ratio)||50))/100;
    const fil1=ui?gv('tgFil'):(nz(s.z1,0));
    const fil2=ui?gv('tgFil2'):(nz(s.z2,0));
    const cap=ui?gvz('tgCap',0):(nz(s.cap,0));
    const theta=ui?gv('tgTheta'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let grooveA=0, wFace=0;
    if(jt==='TJointBevel'){           // single bevel (HV): notch through thickness
      const h=T-root, ha=deg2rad(ang);
      grooveA=h*h*Math.tan(ha)/2+gap*T;            // gap은 부재 전체 두께 아래
      wFace=h*Math.tan(ha)+gap;                    // 용접면 폭 (개선 상부)
    } else {                          // TJointK double bevel: notches both sides
      const ha=deg2rad(ang), h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
      grooveA=(h1*h1+h2*h2)*Math.tan(ha)/2+gap*T;
      wFace=(h1+h2)*Math.tan(ha)+gap;              // 양면 용접면 폭 합
    }
    // 보강 fillet: 앞면 z₁ + (양면 용접 시) 뒷면 z₂
    const filA=0.5*fil1*fil1+0.5*fil2*fil2;
    // 덧살: 용접면 볼록(+)/오목(−) 보강. 음수 가능.
    const capA=0.5*Math.max(0,wFace)*cap;
    area=grooveA+filA+capA;
    breakdown.push({l:'Groove 단면적',v:rnd(grooveA,2),u:'mm²'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (앞면 z₁)'),v:rnd(filA,2),u:'mm²'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    if(gap>0) breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── TKY ──
  else if(jt==='TKY'||jt==='TKYDB'){
    const D=ui?gv('tkyD'):(parseFloat(s.tkyD)||508);
    const d=ui?gv('tkyd'):(parseFloat(s.tkyd)||219);
    const tw=ui?gv('tkyt'):(parseFloat(s.tkyt)||parseFloat(s.T)||12);  // brace 벽두께 (업로드: 모재1 T 사용)
    const ang=ui?gv('tkyAng'):(parseFloat(s.ang)||45);               // 개선각 α
    const root=ui?gv('tkyRoot'):(nz(s.root,0));                      // 미입력 시 0
    const gap=ui?gv('tkyGap'):(nz(s.gap,3));
    const fil1=ui?gv('tkyFil'):(nz(s.z1,8));
    const fil2=ui?gv('tkyFil2'):(nz(s.z2,0));
    const theta=ui?gv('tkyAngle'):(parseFloat(s.tkyAngle)||parseFloat(s.tAngle)||45);  // 업로드: T 경사각 사용
    const ttype=ui?document.getElementById('tkyType').value:(s.tkyType||'Y');
    const dbl=(jt==='TKYDB');
    const sv=Math.sin(deg2rad(theta));
    // ── 기준 단면 A₀ (Ψ=90°): brace 끝단 bevel 개선 + root gap + 보강 fillet ──
    const hb=Math.max(0,tw-root), ha=deg2rad(ang);
    let grooveA, filA;
    if(!dbl){ grooveA=hb*hb*Math.tan(ha)/2; }
    else    { grooveA=2*(hb/2)*(hb/2)*Math.tan(ha)/2; }   // 양면 bevel 50/50
    filA=0.5*fil1*fil1+0.5*fil2*fil2;                     // 앞면 z₁ + 뒷면 z₂(양면 용접 시)
    const aBase=grooveA+gap*tw+filA;
    // ── 단면(둘레) 방향 국부 이면각 Ψ ──
    //   Toe Ψ=180°−θ (둔각→tan(Ψ/2)), Saddle Ψ=90°+asin(β) (코드 곡률, β=d/D), Heel Ψ=θ (1/sinθ 용입 요구)
    const beta=Math.min(0.99, D>0?d/D:0);
    const psiS=Math.PI/2+Math.asin(beta);
    const psiT=Math.PI-deg2rad(theta);
    const fs=Math.tan(psiS/2);
    const fc=Math.tan(psiT/2);
    const fh=1/sv;
    const favg=(fc+fs*2+fh)/4;
    // 경사 교차선 실제 둘레 (타원 근사: a=d/(2sinθ), b=d/2, Ramanujan)
    const ea=d/(2*sv), eb=d/2, eh=Math.pow((ea-eb)/(ea+eb),2);
    const perimIncl=Math.PI*(ea+eb)*(1+3*eh/(10+Math.sqrt(4-3*eh)));
    let favgEff=favg;
    // K-Joint: 단일 brace(Y) 계산을 2개분으로. brace 간격 g<0이면 겹침 → 중복 용착 차감
    if(ttype==='K'){
      const bgap=ui?gvz('tkyBraceGap',0):(parseFloat(s.tkyBraceGap)||0);
      const ovl=bgap<0?Math.min(-bgap, perimIncl):0; // 겹침 길이 (mm), 둘레 초과 방지
      _tkyK={count:2, overlapLen:ovl};
    }
    area=aBase; adjFactor=favgEff;         // 팩터는 adjFactor에서 1회만 적용
    breakdown.push({l:(dbl?'양면':'단면')+' Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×t)',v:rnd(gap*tw,2),u:'mm²',type:'gap'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (z₁)'),v:rnd(filA,2),u:'mm²'});
    breakdown.push({l:'β = d/D',v:rnd(beta,3),u:''});
    breakdown.push({l:`Toe Ψ=${rnd(180-theta,0)}°`,v:rnd(fc,3),u:'×'});
    breakdown.push({l:`Saddle Ψ=${rnd(psiS*180/Math.PI,1)}° (90°+asin β)`,v:rnd(fs,3),u:'×'});
    breakdown.push({l:`Heel Ψ=${rnd(theta,0)}° (1/sinθ)`,v:rnd(fh,3),u:'×'});
    breakdown.push({l:'가중평균 (Toe:Saddle:Heel=1:2:1)',v:rnd(favgEff,4),u:'×'});
    breakdown.push({l:'교차선 둘레 (π·d 단순)',v:rnd(Math.PI*d,1),u:'mm'});
    breakdown.push({l:'교차선 둘레 (θ 경사 보정)',v:rnd(perimIncl,1),u:'mm — '+tr('용접 길이로 권장')});
  }

  // ── 이종 두께 맞대기: 단차 천이 필릿 (Butt 전용) ──
  if(jt.startsWith('Butt')){
    const tFieldMap={ButtSquare:'sqT',ButtV:'vT',ButtBevel:'bevT',ButtU:'uT',ButtJ:'jT',ButtX:'xT',ButtK:'kT'};
    const T1 = ui ? gv(tFieldMap[jt]) : (parseFloat(s.T)||0);
    const T2 = ui ? gv('buttT2') : (parseFloat(s.T2)||0);
    // 배치(업로드): diffAlign='Y'면 이종두께 적용. (하위호환: T₂가 T와 다르면 자동) UI는 체크박스 유지.
    const daFlag = !ui ? String(s.diffAlign||'').trim().toUpperCase() : '';
    const dOn = ui ? document.getElementById('buttDiff')?.checked
                   : ( daFlag==='Y' || (daFlag!=='N' && isFinite(T2) && T2>0 && Math.abs(T2-T1)>1e-9) );
    if(dOn){
      // 정렬: UI는 선택 유지, 배치는 flush 고정(이종두께 여부만 Y/N로 입력)
      const align = ui ? (document.getElementById('buttDiffAlign')?.value||'flush') : 'flush';
      const dT = Math.abs(T2-T1);
      if(dT>0){
        let stepA;
        if(align==='center'){
          stepA = 2*0.5*(dT/2)*(dT/2);   // 양면 단차 ΔT/2 → 필릿 2개 = ΔT²/4
          breakdown.push({l:tr('단차 필릿 양면')+` (ΔT/2=${rnd(dT/2,1)}×2)`,v:rnd(stepA,2),u:'mm²'});
        } else {
          stepA = 0.5*dT*dT;             // 일면 단차 ΔT → 필릿 1개 = ½ΔT²
          breakdown.push({l:tr('단차 필릿 일면')+` (ΔT=${rnd(dT,1)})`,v:rnd(stepA,2),u:'mm²'});
        }
        area += stepA;
      }
    }
  }

  // K-Joint: brace 2개분 면적 + 겹침(brace gap<0) 중복 용착 차감
  if((jt==='TKY'||jt==='TKYDB') && _tkyK){
    const perBrace=area;                       // 단일 brace 단면적
    let kArea=perBrace*_tkyK.count;            // 2개분
    if(_tkyK.overlapLen>0 && L>0){
      // 겹친 둘레 길이만큼 단면적 1개분 차감 (L 기준 비율 환산)
      const dedFrac=Math.min(1, _tkyK.overlapLen/L);
      kArea-=perBrace*dedFrac;
      breakdown.push({l:tr('K 겹침 차감')+` (overlap ${rnd(_tkyK.overlapLen,0)}mm)`,v:'−'+rnd(perBrace*dedFrac,2),u:'mm²',type:'pjp'});
      breakdown.push({l:'⚠ 겹침부 용착량은 별도 상세도·PQR로 산정',v:'',u:'',type:'pjp'});
    }
    breakdown.push({l:`K-Joint brace ×${_tkyK.count}`,v:rnd(kArea,2),u:'mm² (유효)'});
    area=kArea;
  }

  const adjArea=area*adjFactor;
  // Back gouging: extra deposit as % of total
  const gouge = ui ? (document.getElementById('backGouge')?.checked ? gv('gougePctNum') : 0)
                   : (s.backGouge===true||s.backGouge==='Y' ? (nz(s.gougePct,10)) : 0);
  const gougeFactor = 1 + gouge/100;
  const vol=adjArea*L/1000*gougeFactor;
  const mass=vol*rho/1000;
  const rod=mass/eta;
  if(gouge>0) breakdown.push({l:'Back Gouging 추가',v:'+'+rnd(gouge,0),u:'%',type:'pjp'});
  return {area:rnd(area,3),adjFactor:rnd(adjFactor,4),adjArea:rnd(adjArea,3),gouge:rnd(gouge,0),vol:rnd(vol,3),mass:rnd(mass,4),rod:rnd(rod,4),perM:rnd(mass*1000/L,4),rho,breakdown};
}

/* TKY 교차선 권장 길이 (Calculator 와 동일 타원 둘레식) */
function tkyLength(d,theta){
  const sv=Math.sin(deg2rad(theta))||1;
  const ea=d/(2*sv), eb=d/2, eh=Math.pow((ea-eb)/(ea+eb),2);
  return Math.PI*(ea+eb)*(1+3*eh/(10+Math.sqrt(4-3*eh)));
}
function weldLength(){
  const m=$('lenmode').value;
  if(m==='linear') return num('wlen');
  if(m==='circ')   return Math.PI*num('od');
  if(m==='tky')    return tkyLength(num('tkyd'), num('tkyAngle'));
  return 0;
}

/* Route Card 입력 → 엔진 상태 객체 s */
function gatherState(){
  const g=$('groove').value;
  const s={
    jointType:g, rho:num('dens'), efficiency:num('eff'), weldLength:weldLength(),
    T:num('bl_pre_t1'), ang:num('bl_pre_ang'), root:num('bl_pre_root'), gap:num('bl_pre_gap'), cap:num('cap'),
    ratio:num('ratio'), R:num('R'), z1:num('z1'), z2:num('z2'), filK:0.707,
    filSide:$('filSide').value, tSubtype:$('tSub').value, tAngle:num('tAngle'),
    backGouge:$('gouge').checked?'Y':'N', gougePct:num('gougePct')
  };
  if(g==='TKY'||g==='TKYDB'){
    s.tkyD=num('tkyD'); s.tkyd=num('tkyd'); s.tkyt=num('tkyt');
    s.ang=num('tkyAng'); s.root=num('tkyRoot'); s.gap=num('tkyGap');
    s.z1=num('tkyFil'); s.z2=num('tkyFil2');
    s.tkyAngle=num('tkyAngle'); s.tkyType=$('tkyType').value; s.tkyBraceGap=num('tkyBraceGap');
  }
  return s;
}
function actualDeposit(eta){
  var pu=$('bl_post_usedKg'); var u=pu?parseFloat(pu.value):NaN; if(!isNaN(u)&&u>0) return u*eta/100;
  var dr=$('bl_mid_depRate'), am=$('bl_mid_arcMin'); var drv=dr?parseFloat(dr.value):NaN, amv=am?parseFloat(am.value):NaN;
  if(!isNaN(drv)&&!isNaN(amv)&&drv>0&&amv>0) return drv*amv/60;
  return 0;
}
const f=(n,d=3)=>!isFinite(n)?'—':n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});

function recalc(){
  const s=gatherState();
  const res=computeDeposit(s);
  const T=(id,v)=>{const el=$(id); if(el)el.textContent=v;};
  const H=(id,v)=>{const el=$(id); if(el)el.innerHTML=v;};

  ButtV:      {sym:'▽',  name:'Single-V Butt (V형)',     std:'ISO 2553 symbol: ▽',   desc:'V형 개선. 중판(6~25mm). 용착량 많으나 변형 주의.'},

  ButtU:      {sym:'∪',  name:'Single-U Butt (U형)',     std:'ISO 2553 symbol: ∪',   desc:'U형 개선. 두꺼운 판(>25mm). V형 대비 용착량↓.'},

  ButtX:      {sym:'✕',  name:'Double-V Butt (X형)',     std:'ISO 2553 symbol: ✕',   desc:'양면 V형. 두꺼운 판. 변형 최소화 가능.'},
  ButtK:      {sym:'⋈',  name:'Double Bevel (K형)',      std:'ISO 2553 symbol: ⋈',   desc:'양면 개선(Bevel). T-Joint 양면 개선에도 사용.'},
  Fillet:     {sym:'△',  name:'Fillet Weld (필릿 용접)',  std:'ISO 2553 symbol: △',   desc:'직각 또는 T이음. 일면·양면, 각장(z1/z2) 별도 설정.'},
  TJoint:     {sym:'⊥',  name:'T-Joint (Fillet)',        std:'ISO 2553',              desc:'T형 필릿 이음. 각도 팩터(Kθ=1/sinθ) 적용. 일면·양면.'},
  TJointBevel:{sym:'⊳',  name:'T-Joint Single-Bevel',    std:'ISO 2553',              desc:'T이음 일면 개선. 가장 일반적. Kθ 적용.'},
  TJointK:    {sym:'⋈',  name:'T-Joint Double-Bevel (K)', std:'ISO 2553',             desc:'T이음 양면 개선(K). 후판 완전용입. Kθ 적용.'},
  TKY:        {sym:'⊳',  name:'Branch — Single-Bevel', std:'AWS D1.1',           desc:'관-관 분기 이음, brace 끝단 단면 bevel. 위치별 국부 이면각 Ψ 팩터 (β=OD₂/OD₁).'},
  TKYDB:      {sym:'⋈',  name:'Branch — Double-Bevel', std:'AWS D1.1',           desc:'관-관 분기 이음, brace 끝단 양면 bevel(K). 위치별 Ψ 팩터 (β=OD₂/OD₁).'}
}
    function getC(){ return {plate:'#e9eef6',plateS:'#8fa1ba',hatch:'#d5dae2',wF:'rgba(0,132,61,.22)',wS:'#00843D',gF:'rgba(202,168,0,.35)',pF:'rgba(124,58,237,.18)',pS:'#7c3aed',dim:'#00843D',txt:'#515154',text:'#1d1d1f',warn:'#c77d11',warnBg:'rgba(230,150,30,.10)',frame:'#d2d2d7'}; }
    function tr(x){ return x; }
    function _G(id){ var m=_M; var G={'sqT':m.T,'vT':m.T,'bevT':m.T,'uT':m.T,'jT':m.T,'xT':m.T,'kT':m.T,'tgT':m.T,'buttT2':m.T2,'vAng':m.ang,'bevAng':m.ang,'uAng':m.ang,'jAng':m.ang,'xAng':m.ang,'kAng':m.ang,'tgAng':m.ang,'tkyAng':m.ang,'xRatio':m.ratio,'kRatio':m.ratio,'tgRatio':m.ratio,'uR':m.R,'jR':m.R,'filZ1':m.z1,'tFilZ1':m.z1,'tgFil':m.z1,'tkyFil':m.z1,'filZ2':m.z2,'tFilZ2':m.z2,'tgFil2':m.z2,'tAngle':m.tAngle,'tgTheta':(m.tAngle||m.ang),'tkyAngle':(m.tkyAngle||m.tAngle||m.ang),'tkyD':m.tkyD,'tkyd':m.tkyd,'tkyt':m.tkyt,'sqGap':m.gap,'vGap':m.gap,'bevGap':m.gap,'uGap':m.gap,'jGap':m.gap,'xGap':m.gap,'kGap':m.gap,'tGap':m.gap,'tgGap':m.gap,'filGap':m.gap,'tkyGap':m.gap,'tkyBraceGap':m.tkyBraceGap,'vRoot':m.root,'bevRoot':m.root,'uRoot':m.root,'jRoot':m.root,'xRoot':m.root,'kRoot':m.root,'tgRoot':m.root,'tkyRoot':m.root,'sqCap':m.cap,'vCap':m.cap,'bevCap':m.cap,'uCap':m.cap,'jCap':m.cap,'xCap':m.cap,'kCap':m.cap,'tCap':m.cap,'tgCap':m.cap}; return G[id]; }
    function gv(id){ var v=parseFloat(_G(id)); return isNaN(v)?0:v; }
    function gvz(id,def){ var v=parseFloat(_G(id)); return isNaN(v)?(def||0):v; }
    function drawPreview(){
  const cv=_RCCV; if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
  const C=getC(), cx=W/2, cy=H/2;

  // 도면 외곽 프레임 (제도 시트 느낌)
  ctx.strokeStyle=C.frame; ctx.lineWidth=1;
  ctx.strokeRect(4.5,4.5,W-9,H-9);

  // helpers
  function fillStroke(fill,stroke){ ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=1.6; ctx.fill(); ctx.stroke(); }
  function lbl(t,x,y,col){ ctx.fillStyle=col||C.txt; ctx.font='10.5px ui-monospace,SFMono-Regular,Consolas,monospace'; ctx.fillText(t,x,y); }
  function tag(t){
    // 생산도면 타이틀 블록 (하단 스트립): DETAIL — 명칭 | N.T.S.
    ctx.strokeStyle=C.frame; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(4.5,H-24.5); ctx.lineTo(W-4.5,H-24.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-56,H-24.5); ctx.lineTo(W-56,H-4.5); ctx.stroke();
    ctx.fillStyle=C.dim; ctx.font='700 10px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText('DETAIL',12,H-10);
    ctx.fillStyle=C.txt; ctx.font='10.5px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText(t,58,H-10);
    ctx.fillStyle=C.txt; ctx.font='10px ui-monospace,SFMono-Regular,Consolas,monospace';
    ctx.fillText('N.T.S.',W-48,H-10);
  }
  function info(t){ lbl(t,10,H-32); }

  // 덧살을 weld 외곽선에 합치기 위한 보조: p→q 면의 2차 베지어 제어점을 반환.
  // capS>0 이면 interior 반대(바깥)로 볼록, capS<0 이면 안쪽(오목)으로. SV처럼 경계선 없이 합쳐짐.
  function faceCtrl(p,q,interior,capS){
    const mx=(p.x+q.x)/2, my=(p.y+q.y)/2;
    if(!capS) return {x:mx,y:my};
    let nx=-(q.y-p.y), ny=(q.x-p.x);
    const L=Math.hypot(nx,ny)||1; nx/=L; ny/=L;
    if((mx-interior.x)*nx+(my-interior.y)*ny<0){ nx=-nx; ny=-ny; }
    return {x:mx+nx*capS, y:my+ny*capS};
  }

  // Compute a scale that fits thickness T into the canvas vertical budget.
  // Returns {sc, ht, top, bot} where top/bot are y-coords of plate inner faces.
  function vScale(T,frac){
    frac = frac||0.56;
    const sc = Math.min((H*frac)/T, 11);
    const ht = T*sc;
    return { sc, ht, top: cy-ht/2, bot: cy+ht/2 };
  }
  // Draw the two horizontal plates (butt joint, gap centered on cx)
  function buttPlates(top,bot,gS){
    const pW=(W*0.78)/2 - gS;          // each plate width
    const pLx=cx-gS-pW, pRx=cx+gS;
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=0.9;
    // left/right are actually upper/lower halves in a cross-section view → draw as left & right blocks
    // We draw plates to LEFT and RIGHT of the weld centerline (standard butt cross-section is horizontal plates meeting vertically)
  }

  const jt=curJoint;

  // ════════════════════════════════════════════════
  //  BUTT JOINTS  (cross-section: two plates meet at a
  //  vertical seam centred on cx; thickness is vertical)
  //  Plates drawn as filled rectangles left & right;
  //  groove is the void between them, weld fills it.
  // ════════════════════════════════════════════════
  // Standard model: plate spans full width, thickness vertical.
  // Weld prep removes material symmetric about cx.
  // top = upper face, bot = lower face.

  function drawButtPlatesV(top,bot,leftEdgeFn,rightEdgeFn,sc){
    // leftEdgeFn(y) -> x of the right boundary of the LEFT plate at height y
    // rightEdgeFn(y) -> x of the left boundary of the RIGHT plate at height y
    // sc (optional): px-per-mm; enables dissimilar-thickness rendering (right plate thicker by ΔT)
    const pad=W*0.10;
    let dTop=0, dBot=0;
    if(sc && document.getElementById('buttDiff')?.checked){
      const T1=(bot-top)/sc, T2=gv('buttT2')||T1;
      const center=(document.getElementById('buttDiffAlign')?.value==='center');
      const dS=Math.abs(T2-T1)*sc;
      if(center){ dTop=Math.min(dS/2, Math.max(0,top-10)); dBot=Math.min(dS/2, Math.max(0,H-30-bot)); }
      else      { dTop=Math.min(dS,   Math.max(0,top-10)); }
    }
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    // LEFT plate (thinner reference, T₁)
    ctx.beginPath();
    ctx.moveTo(pad, top);
    ctx.lineTo(leftEdgeFn(top), top);
    // walk down the prepared edge
    const steps=24;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(leftEdgeFn(y), y); }
    ctx.lineTo(pad, bot);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // RIGHT plate (top raised by dTop / bottom extended by dBot when 이종 두께)
    const xs=rightEdgeFn(top);
    const xb=rightEdgeFn(bot);
    ctx.beginPath();
    ctx.moveTo(W-pad, top-dTop);
    ctx.lineTo(xs, top-dTop);
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(rightEdgeFn(y), y); }
    if(dBot>0) ctx.lineTo(xb, bot+dBot);
    ctx.lineTo(W-pad, bot+dBot);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // 단차 천이 필릿 (45°)
    ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.6;
    if(dTop>2){
      ctx.beginPath();
      ctx.moveTo(xs, top-dTop);        // step top
      ctx.lineTo(xs, top);             // down the step face
      ctx.lineTo(xs-dTop, top);        // out along the thinner-plate surface
      ctx.closePath(); ctx.fill(); ctx.stroke();
      lbl('ΔT'+(dBot>0?'/2':'')+' '+tr('천이 필릿'), xs+6, top-dTop+4, C.wS);
    }
    if(dBot>2){
      ctx.beginPath();
      ctx.moveTo(xb, bot+dBot);        // step bottom (아랫면)
      ctx.lineTo(xb, bot);             // up the step face
      ctx.lineTo(xb-dBot, bot);        // out along the thinner-plate bottom surface
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }

  // ── Square (I) ──
  if(jt==='ButtSquare'){
    const T=gv('sqT')||6, gap=gvz('sqGap',2), cap=gvz('sqCap',1);
    const {ht,top,bot}=vScale(T,0.5);
    const sc=ht/T, gS=gap>0?Math.max(gap*sc/2,2):0;
    drawButtPlatesV(top,bot, ()=>cx-gS, ()=>cx+gS, sc);
    // weld = gap column + 덧살 보강 비드를 하나의 외곽선으로 합침 (경계선 없음, gap=0이어도 표시)
    const capS=cap>0?Math.max(cap*sc,3):0, halfW=cap>0?Math.max(gS+capS,5):gS;
    ctx.beginPath();
    if(cap>0){
      ctx.moveTo(cx-halfW, top);
      ctx.quadraticCurveTo(cx, top-capS*1.6, cx+halfW, top);  // 상단 보강 곡선
      ctx.lineTo(cx+gS, top);                                  // toe → 기둥 우상단
    } else {
      ctx.moveTo(cx-gS, top);
      ctx.lineTo(cx+gS, top);
    }
    ctx.lineTo(cx+gS, bot);                                    // 우측 기둥
    ctx.lineTo(cx-gS, bot);                                    // 하단
    ctx.lineTo(cx-gS, top);                                    // 좌측 기둥
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    tag(tr('Square Butt (I형)'));
    info(`T=${T}mm  g=${gap}mm  cap=${cap}mm`);
  }

  // ── Single-V ──
  else if(jt==='ButtV'){
    const T=gv('vT')||16, ang=gv('vAng')||60, root=gvz('vRoot',0), gap=gvz('vGap',2), cap=gvz('vCap',1.5);
    const {ht,top,bot}=vScale(T);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, capS=cap*sc, ha=deg2rad(ang/2);
    const bevelDepth=ht-rS;
    const wHalf=bevelDepth*Math.tan(ha);
    const left=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx-gS-wHalf*(1-t);} return cx-gS; };
    const right=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx+gS+wHalf*(1-t);} return cx+gS; };
    drawButtPlatesV(top,bot,left,right,sc);
    ctx.beginPath();
    ctx.moveTo(cx-gS-wHalf, top);
    ctx.lineTo(cx-gS, top+bevelDepth);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    ctx.lineTo(cx+gS, top+bevelDepth);
    ctx.lineTo(cx+gS+wHalf, top);
    ctx.quadraticCurveTo(cx, top-capS, cx-gS-wHalf, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,top+bevelDepth,gS*2,rS); }
    tag(tr('Single-V (V형)')); info(`T=${T}mm  2α=${ang}°  r=${root}  g=${gap}mm`);
  }

  // ── Single Bevel ──
  else if(jt==='ButtBevel'){
    const T=gv('bevT')||16, ang=gv('bevAng')||45, root=gvz('bevRoot',0), gap=gvz('bevGap',2), cap=gvz('bevCap',1.5);
    const {ht,top,bot}=vScale(T,0.52);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const bevelDepth=ht-rS;
    const wRight=bevelDepth*Math.tan(ha);   // only the RIGHT plate is bevelled
    const left=()=>cx-gS;
    const right=(y)=>{ if(y<=top+bevelDepth){ const t=(y-top)/bevelDepth; return cx+gS+wRight*(1-t);} return cx+gS; };
    drawButtPlatesV(top,bot,left,right,sc);
    const bevCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS, top);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    ctx.lineTo(cx+gS, top+bevelDepth);
    ctx.lineTo(cx+gS+wRight, top);              // 상부 우측 toe
    // 덧살: 상부 면을 곡선으로 합침 (양수 볼록 위로, 음수 오목 아래로)
    ctx.quadraticCurveTo((cx-gS+cx+gS+wRight)/2, top-bevCapS, cx-gS, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0 && rS>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,top+bevelDepth,gS*2,rS); }
    tag('Single Bevel'); info(`T=${T}mm  α=${ang}°  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Single-U ──
  else if(jt==='ButtU'){
    const T=gv('uT')||25, R=gv('uR')||6, ang=gv('uAng')||10, root=gvz('uRoot',0), gap=gvz('uGap',2), cap=gvz('uCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, RS=R*sc, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    // U profile: straight slightly-tapered sidewalls from top down to (top + sideH),
    // then quarter-radius curving in to the root face, root face rS tall at bottom.
    const sideH=Math.max(0, ht - rS - RS);
    const topHalf=gS + RS + sideH*Math.tan(ha);   // half-width at the very top face
    const left=(y)=>{
      const yy=y-top;
      if(yy<=sideH){ return cx - (gS+RS+ (sideH-yy)*Math.tan(ha)); }            // tapered sidewall
      if(yy<=sideH+RS){ const dy=yy-sideH; const dx=RS*Math.cos(Math.asin(Math.min(1,dy/RS))); return cx-gS-dx; } // quarter radius (monotonic)
      return cx-gS;                                                              // root face
    };
    const right=(y)=>{ return 2*cx - left(y); };
    drawButtPlatesV(top,bot,left,right,sc);
    // weld fills the void
    const uCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(left(top), top);
    const steps=28;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(left(y), y); }
    ctx.lineTo(cx+gS, bot);
    for(let i=steps;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y), y); }
    // 덧살: 상부 면 곡선으로 합침 (right(top) → left(top))
    ctx.quadraticCurveTo(cx, top-uCapS, left(top), top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,bot-rS,gS*2,rS); }
    tag(tr('Single-U (U형)')); info(`T=${T}  R=${R}  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Single-J ──
  else if(jt==='ButtJ'){
    const T=gv('jT')||20, R=gv('jR')||5, ang=gv('jAng')||10, root=gvz('jRoot',0), gap=gvz('jGap',2), cap=gvz('jCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, RS=R*sc, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const sideH=Math.max(0, ht - rS - RS);
    // J: only RIGHT plate is prepared (curved); LEFT plate straight vertical
    const left=()=>cx-gS;
    const right=(y)=>{
      const yy=y-top;
      if(yy<=sideH){ return cx + (gS+RS+(sideH-yy)*Math.tan(ha)); }
      if(yy<=sideH+RS){ const dy=yy-sideH; const dx=RS*Math.cos(Math.asin(Math.min(1,dy/RS))); return cx+gS+dx; }
      return cx+gS;
    };
    drawButtPlatesV(top,bot,left,right,sc);
    const jCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS, top);
    ctx.lineTo(cx-gS, bot);
    ctx.lineTo(cx+gS, bot);
    const steps=28;
    for(let i=steps;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y), y); }
    // 덧살: 상부 면 곡선으로 합침 (right(top) → cx-gS)
    ctx.quadraticCurveTo((cx-gS+right(top))/2, top-jCapS, cx-gS, top);
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,bot-rS,gS*2,rS); }
    tag(tr('Single-J (J형)')); info(`T=${T}  R=${R}  r=${root}  g=${gap}  cap=${cap}mm`);
  }

  // ── Double-V (X) ──
  else if(jt==='ButtX'){
    const T=gv('xT')||30, ang=gv('xAng')||60, root=gvz('xRoot',0), gap=gvz('xGap',2), ratio=(gv('xRatio')||60)/100, cap=gvz('xCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang/2);
    // root face centred; upper bevel depth h1, lower bevel depth h2
    const usable=ht-rS;
    const h1=usable*ratio, h2=usable*(1-ratio);
    const rootTop=top+h1, rootBot=rootTop+rS;   // root face band
    const w1=h1*Math.tan(ha), w2=h2*Math.tan(ha);
    const left=(y)=>{
      if(y<rootTop){ const t=(rootTop-y)/h1; return cx-gS-w1*t; }       // upper bevel
      if(y<=rootBot){ return cx-gS; }                                    // root face
      const t=(y-rootBot)/h2; return cx-gS-w2*t;                         // lower bevel
    };
    const right=(y)=>2*cx-left(y);
    drawButtPlatesV(top,bot,left,right,sc);
    // weld = void, 덧살을 상·하부 면에 곡선으로 합침
    const xCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(left(top),top);
    const steps=30;
    for(let i=0;i<=steps;i++){ const y=top+(bot-top)*i/steps; ctx.lineTo(left(y),y); }   // 좌측 하강, left(bot)에서 끝
    ctx.quadraticCurveTo(cx, bot+xCapS, right(bot), bot);                                  // 하부 면 (아래로 볼록)
    for(let i=steps-1;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y),y); }  // 우측 상승, right(top)에서 끝
    ctx.quadraticCurveTo(cx, top-xCapS, left(top), top);                                   // 상부 면 (위로 볼록)
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,rootTop,gS*2,rS); }
    tag(tr('Double-V (X형)')); info(`T=${T}mm  2α=${ang}°  ${tr('상부')} ${Math.round(ratio*100)}%  cap=${cap}mm`);
  }

  // ── Double Bevel (K) ──
  else if(jt==='ButtK'){
    const T=gv('kT')||30, ang=gv('kAng')||45, root=gvz('kRoot',0), gap=gvz('kGap',2), ratio=(gv('kRatio')||60)/100, cap=gvz('kCap',1.5);
    const {ht,top,bot}=vScale(T,0.56);
    const sc=ht/T, rS=root*sc, gS=gap>0?Math.max(gap*sc/2,1.5):0, ha=deg2rad(ang);
    const usable=ht-rS;
    const h1=usable*ratio, h2=usable*(1-ratio);
    const rootTop=top+h1, rootBot=rootTop+rS;
    const w1=h1*Math.tan(ha), w2=h2*Math.tan(ha);
    // only RIGHT plate bevelled (double bevel = both bevels on one member)
    const left=()=>cx-gS;
    const right=(y)=>{
      if(y<rootTop){ const t=(rootTop-y)/h1; return cx+gS+w1*t; }
      if(y<=rootBot){ return cx+gS; }
      const t=(y-rootBot)/h2; return cx+gS+w2*t;
    };
    drawButtPlatesV(top,bot,left,right,sc);
    const kCapS=cap*sc;
    ctx.beginPath();
    ctx.moveTo(cx-gS,top);
    ctx.lineTo(cx-gS,bot);                                                                 // 좌측 직선면, (cx-gS,bot)
    ctx.quadraticCurveTo((cx-gS+cx+gS+w2)/2, bot+kCapS, cx+gS+w2, bot);                     // 하부 면 (아래로 볼록)
    const steps=30;
    for(let i=steps-1;i>=0;i--){ const y=top+(bot-top)*i/steps; ctx.lineTo(right(y),y); }  // 우측 상승, right(top)=cx+gS+w1
    ctx.quadraticCurveTo((cx-gS+cx+gS+w1)/2, top-kCapS, cx-gS, top);                        // 상부 면 (위로 볼록)
    ctx.closePath();
    fillStroke(C.wF,C.wS);
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(cx-gS,rootTop,gS*2,rS); }
    tag(tr('Double Bevel (K형)')); info(`T=${T}mm  α=${ang}°  ${tr('상부')} ${Math.round(ratio*100)}%  cap=${cap}mm`);
  }

  // ════════════════════════════════════════════════
  //  FILLET  (T-configuration: vertical web on a
  //  horizontal base; fillet triangles in the corners)
  // ════════════════════════════════════════════════
  else if(jt==='Fillet'){
    const z1=gv('filZ1')||8, z2=(curFilSide==='double'?(gv('filZ2')||8):0), gap=gvz('filGap',0);
    const maxZ=Math.max(z1,z2,1);
    const sc=Math.min((H*0.34)/maxZ, 14);
    const z1S=z1*sc, z2S=z2*sc;
    const baseY=cy+30, webX=cx, webW=14;
    const pad=W*0.14;
    // base plate (horizontal)
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=0.9;
    ctx.fillRect(pad, baseY, W-2*pad, 16); ctx.strokeRect(pad, baseY, W-2*pad, 16);
    // web (vertical)
    const webH=Math.max(z1S,z2S)*1.6+18;
    ctx.fillRect(webX-webW/2, baseY-webH, webW, webH);
    ctx.strokeRect(webX-webW/2, baseY-webH, webW, webH);
    // right fillet (z1)
    ctx.beginPath();
    ctx.moveTo(webX+webW/2, baseY);
    ctx.lineTo(webX+webW/2+z1S, baseY);
    ctx.lineTo(webX+webW/2, baseY-z1S);
    ctx.closePath(); fillStroke(C.wF,C.wS);
    // left fillet (z2) if double
    if(curFilSide==='double'){
      ctx.beginPath();
      ctx.moveTo(webX-webW/2, baseY);
      ctx.lineTo(webX-webW/2-z2S, baseY);
      ctx.lineTo(webX-webW/2, baseY-z2S);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    if(gap>0){ const gS=Math.min(gap*sc,10); ctx.fillStyle=C.gF; ctx.fillRect(webX-webW/2,baseY,webW,gS); }
    // throat dimension hint on z1
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=0.8; ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(webX+webW/2, baseY-z1S); ctx.lineTo(webX+webW/2+z1S, baseY); ctx.stroke();
    ctx.restore();
    tag('Fillet '+(curFilSide==='double'?tr('(양면 Double)'):tr('(일면 Single)')));
    info(`z₁=${z1}${z2?'  z₂='+z2:''}mm  g=${gap}mm`);
  }

  // ════════════════════════════════════════════════
  //  T-JOINT  (angled web; fillet legs; optional PJP)
  // ════════════════════════════════════════════════
  else if(jt==='TJoint'){
    const z1=gv('tFilZ1')||8, z2=(curTSub!=='single'?(gv('tFilZ2')||8):0);
    const gap=gvz('tGap',0), theta=gv('tAngle')||90, cap=gvz('tCap',0);
    const maxZ=Math.max(z1,z2,1);
    const sc=Math.min((H*0.30)/maxZ, 12);
    const z1S=z1*sc, z2S=z2*sc;
    const baseY=cy+40, pad=W*0.12, webW=14, webLen=Math.min(H*0.5,118);
    // base plate (단면 해칭)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.fillRect(pad, baseY, W-2*pad, 16); ctx.strokeRect(pad, baseY, W-2*pad, 16);
    // ── inclined web (parallelogram, feet on the base surface) ──
    const th=deg2rad(theta);
    const ux=Math.cos(th), uy=-Math.sin(th);             // web axis (up; tilts right when θ<90)
    const nx=Math.sin(th), ny=Math.cos(th);              // perpendicular
    const hw=webW/2;
    // wall base points ON the base line (same math as the TKY brace feet)
    function basePt(s){ const t=-(s*hw*ny)/uy; return {x:cx+s*hw*nx+t*ux, y:baseY}; }
    const B1=basePt(+1), B2=basePt(-1);                  // B1 = +n side (right/obtuse), B2 = −n side (left/acute)
    const T1={x:B1.x+ux*webLen, y:B1.y+uy*webLen};
    const T2={x:B2.x+ux*webLen, y:B2.y+uy*webLen};
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(B1.x,B1.y); ctx.lineTo(T1.x,T1.y); ctx.lineTo(T2.x,T2.y); ctx.lineTo(B2.x,B2.y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // ── fillets follow the web walls: leg z along base + leg z UP THE WALL (axis dir) ──
    // 덧살 cap: 필릿 빗변(toe→wall)을 곡선으로 합쳐 볼록(+)/오목(−) 표현. 음수면 면적 감소.
    const tCapS=cap*sc;
    // right-side fillet (z1): toe outward on base, leg up the wall from B1
    { const toe={x:B1.x+z1S,y:baseY}, wall={x:B1.x+ux*z1S,y:baseY+uy*z1S};
      const c=faceCtrl(toe,wall,B1,tCapS);
      ctx.beginPath();
      ctx.moveTo(B1.x, baseY);
      ctx.lineTo(toe.x, toe.y);                            // toe along base (outward)
      ctx.quadraticCurveTo(c.x,c.y, wall.x,wall.y);        // 빗변(덧살 합침)
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    // left-side fillet (z2) for double
    if(curTSub!=='single' && z2){
      const toe={x:B2.x-z2S,y:baseY}, wall={x:B2.x+ux*z2S,y:baseY+uy*z2S};
      const c=faceCtrl(toe,wall,B2,tCapS);
      ctx.beginPath();
      ctx.moveTo(B2.x, baseY);
      ctx.lineTo(toe.x, toe.y);
      ctx.quadraticCurveTo(c.x,c.y, wall.x,wall.y);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(Math.min(B1.x,B2.x), baseY-2, Math.abs(B1.x-B2.x), 3); }
    // θ arc annotation at the right foot
    ctx.save(); ctx.strokeStyle=C.dim; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(B1.x+4,baseY); ctx.lineTo(B1.x+52,baseY); ctx.stroke();   // base ref
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(B1.x, baseY, 30, -th, 0); ctx.stroke();                       // angle arc
    ctx.restore();
    lbl(`θ=${theta}°  Kθ=${rnd(1/Math.sin(th),3)}`, B1.x+58, baseY-10, C.dim);
    tag('T-Joint Fillet  z₁='+z1+(z2?'  z₂='+z2:''));
    info(theta<90?tr('경사 T이음 — 예각측 용착량 증가 (Kθ 적용)'):tr('직각 T이음'));
  }

  // ── T-Joint with groove prep (V/X/Bevel/K) ──
  else if(jt==='TJointBevel'||jt==='TJointK'){
    const T=gv('tgT')||16, ang=gv('tgAng')||45, root=gvz('tgRoot',0), gap=gvz('tgGap',2);
    const ratio=(gv('tgRatio')||60)/100, fil=gvz('tgFil',0), fil2=gvz('tgFil2',0), theta=gv('tgTheta')||90, cap=gvz('tgCap',0);
    const isK=(jt==='TJointK');
    const pad=W*0.12;
    // Member THICKNESS T runs horizontally in the cross-section.
    // Scale must also fit the notch rise h·tan(α) vertically.
    const hMM=(T-root);
    const riseMM=hMM*Math.tan(deg2rad(ang))*(isK?Math.max(ratio,1-ratio):1);
    const baseTop=cy+H*0.18;                      // top surface of base plate
    const kS=Math.abs(1/Math.tan(deg2rad(theta||90)));
    let memHmax=Math.min(H*0.56, baseTop-48);                                   // 상단 라벨 보호
    if(kS>0.05) memHmax=Math.min(memHmax, Math.max(40,(W-110-cx)/kS));          // shear 우측 프레임 보호
    let sc=Math.min((W*0.28)/T, (H*0.40)/Math.max(riseMM, T*0.8), 9);
    sc=Math.min(sc, Math.max(0.8,(memHmax-22)/Math.max(riseMM,1)));             // 노치가 부재 안에 들도록 스케일 축소
    const memW=T*sc;                              // member thickness on screen (horizontal)
    const baseH=Math.max(14, Math.min(memW*0.45, H-40-baseTop));                // info 라인 보호
    let memH=Math.min(memHmax, Math.max(riseMM*sc+22, memW*1.5));
    const memX=cx-memW/2, rightX=memX+memW;       // member left/right faces
    const memTopY=baseTop-memH;
    const gS=Math.max(gap*sc,0), rootS=root*sc;
    const ha=deg2rad(ang);

    // base plate (단면 해칭)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.fillRect(pad, baseTop, W-2*pad, baseH); ctx.strokeRect(pad, baseTop, W-2*pad, baseH);

    // θ 기울임: shear 변환 (바닥 y=baseTop 고정, 위로 갈수록 cotθ 만큼 이동 → 부재 축이 θ)
    const kSh=1/Math.tan(deg2rad(theta));
    ctx.save(); ctx.transform(1,0,-kSh,1,kSh*baseTop,0);

    // ---- upright member: bottom END prepared (bevel cut through the THICKNESS) ----
    // Single bevel (HV): root face of width `root` stays flat (left side);
    //   the remaining thickness h=T-root is cut: notch rises on the right face
    //   to height h·tan(α).  Double bevel (K): notches cut from BOTH faces,
    //   root face land of width `root` in the middle.
    const memBot=baseTop-gS;                       // bottom edge (lifted by root gap)
    ctx.fillStyle=C.hatch; ctx.strokeStyle=C.plateS; ctx.lineWidth=1;
    ctx.beginPath();
    if(!isK){
      const h=(T-root)*sc;                        // bevel width through thickness
      const rise=h*Math.tan(ha);                  // notch height on the right face
      ctx.moveTo(memX, memTopY);                  // top-left
      ctx.lineTo(rightX, memTopY);                // top-right
      ctx.lineTo(rightX, memBot-rise);            // down right face to notch top
      ctx.lineTo(memX+rootS, memBot);             // bevel face down-left to root-face edge
      ctx.lineTo(memX, memBot);                   // root face (flat bottom, left part)
      ctx.closePath();
    } else {
      const h1=(T-root)*ratio*sc, h2=(T-root)*(1-ratio)*sc;
      const rise1=h1*Math.tan(ha), rise2=h2*Math.tan(ha);
      // left notch (h2 side), root land in middle, right notch (h1 side)
      ctx.moveTo(memX, memTopY);
      ctx.lineTo(rightX, memTopY);
      ctx.lineTo(rightX, memBot-rise1);           // right face down to right-notch top
      ctx.lineTo(rightX-h1, memBot);              // right bevel to root land
      ctx.lineTo(memX+h2, memBot);                // root face land (flat)
      ctx.lineTo(memX, memBot-rise2);             // left bevel up to left face
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();

    // ---- weld fills the notch(es) + reinforcing fillet(s) ----
    // 덧살 cap: 용접 외측 면(B→C)을 곡선으로 합쳐 볼록(+)/오목(−). 음수면 용착부 감소.
    ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.8;
    const fS=fil>0?fil*sc:Math.min(memW*0.45, 26);
    const tgCapS=cap*sc, tgCtr={x:cx,y:baseTop};
    if(!isK){
      const h=(T-root)*sc, rise=h*Math.tan(ha);
      const B={x:rightX,y:memBot-rise}, Cc={x:rightX+fS,y:baseTop};
      const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
      ctx.beginPath();
      ctx.moveTo(memX+rootS, memBot);             // root-face edge (notch inner corner)
      ctx.lineTo(B.x, B.y);                        // up the bevel face
      ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);  // 외측 면 (덧살 합침) → fillet toe
      ctx.lineTo(memX+rootS, baseTop);            // along base surface back under the notch
      ctx.closePath(); fillStroke(C.wF,C.wS);
    } else {
      const h1=(T-root)*ratio*sc, h2=(T-root)*(1-ratio)*sc;
      const rise1=h1*Math.tan(ha), rise2=h2*Math.tan(ha);
      // right-side weld
      { const B={x:rightX,y:memBot-rise1}, Cc={x:rightX+fS,y:baseTop};
        const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
        ctx.beginPath();
        ctx.moveTo(rightX-h1, memBot);
        ctx.lineTo(B.x,B.y);
        ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);
        ctx.lineTo(rightX-h1, baseTop);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      }
      // left-side weld
      { const B={x:memX,y:memBot-rise2}, Cc={x:memX-fS,y:baseTop};
        const cc=faceCtrl(B,Cc,tgCtr,tgCapS);
        ctx.beginPath();
        ctx.moveTo(memX+h2, memBot);
        ctx.lineTo(B.x,B.y);
        ctx.quadraticCurveTo(cc.x,cc.y, Cc.x,Cc.y);
        ctx.lineTo(memX+h2, baseTop);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      }
    }
    // 뒷면 보강 필릿 z₂ (양면 용접)
    if(fil2>0){
      const f2=Math.min(fil2*sc, memW*0.9);
      ctx.beginPath();
      ctx.moveTo(memX, baseTop);
      ctx.lineTo(memX-f2, baseTop);
      ctx.lineTo(memX, baseTop-f2);
      ctx.closePath(); fillStroke(C.wF,C.wS);
    }
    // root gap band
    if(gap>0){ ctx.fillStyle=C.gF; ctx.fillRect(memX+(isK?(T-root)*(1-ratio)*sc:0), memBot, rootS, gS); }

    // θ centreline (변환 안 → 부재 축 따라 기울어짐)
    ctx.strokeStyle=C.dim; ctx.lineWidth=0.8; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(cx,baseTop); ctx.lineTo(cx,memTopY-6); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();   // shear 해제
    lbl(`θ=${theta}°  Kθ=${rnd(1/Math.sin(deg2rad(theta)),3)}`, 8, 30, C.dim);
    tag(tr(ISO[jt]?.name||'T-Joint')+`  T=${T}  α=${ang}°`);
    info(`Root Face=${root}  Gap=${gap}mm${fil?'  '+tr('보강필릿')+' z='+fil:''}`);
  }

  // ════════════════════════════════════════════════
  //  TKY TUBULAR  (tube-on-tube: brace welded to chord)
  // ════════════════════════════════════════════════
  else if(jt==='TKY'||jt==='TKYDB'){
    const theta=gv('tkyAngle')||45, D=gv('tkyD')||508, d=gv('tkyd')||219;
    const tw=gv('tkyt')||12, ang=gv('tkyAng')||45, root=gvz('tkyRoot',0), gap=gvz('tkyGap',3), fil=gvz('tkyFil',8);
    const ttype=document.getElementById('tkyType')?.value||'Y';
    const braceGap=gvz('tkyBraceGap',0);
    const isOverlap=(ttype==='K' && braceGap<0);
    const dbl=(jt==='TKYDB');
    const sv=Math.sin(deg2rad(theta));
    const beta=Math.min(0.99, d/Math.max(D,1));

    // ════ LEFT (58%): tube-on-tube overview ════
    const cxx=W*0.30, chMidY=cy+38;
    const chR=W*0.26;                         // chord half-length on screen
    const chRy=Math.min(24, H*0.14);          // chord tube radius
    const chLx=cxx-chR, chRx=cxx+chR;
    ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.3;
    ctx.beginPath();
    ctx.moveTo(chLx, chMidY-chRy);
    ctx.lineTo(chRx, chMidY-chRy);
    ctx.ellipse(chRx, chMidY, 9, chRy, 0, -Math.PI/2, Math.PI/2);
    ctx.lineTo(chLx, chMidY+chRy);
    ctx.ellipse(chLx, chMidY, 9, chRy, 0, Math.PI/2, -Math.PI/2, true);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(chLx, chMidY, 9, chRy, 0, 0, Math.PI*2); ctx.stroke();
    ctx.save(); ctx.globalAlpha=0.5;
    ctx.beginPath(); ctx.ellipse(chLx, chMidY, 9*0.62, chRy*0.78, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();

    function drawBrace(angDeg, dirSign, footOffset){
      const th=deg2rad(angDeg);
      const bRy=Math.max(7, Math.min(chRy*0.62, beta*chRy*1.6));
      const bLen=Math.min(H*0.38, 100);
      const topY=chMidY-chRy;
      const fx=cxx + dirSign*(footOffset!=null?footOffset:chR*0.34);
      const ux=dirSign*Math.cos(th), uy=-Math.sin(th);
      const nx=Math.sin(th),         ny=dirSign*Math.cos(th);
      function basePoint(s){ const t=-(s*bRy*ny)/uy; return {x:fx+s*bRy*nx+t*ux, y:topY}; }
      const B1=basePoint(+1), B2=basePoint(-1);
      const tcx=fx+ux*bLen, tcy=topY+uy*bLen;
      const T1={x:tcx+bRy*nx, y:tcy+bRy*ny};
      const T2={x:tcx-bRy*nx, y:tcy-bRy*ny};
      const tipRot=Math.atan2(ny,nx);
      ctx.fillStyle=C.plate; ctx.strokeStyle=C.plateS; ctx.lineWidth=1.3;
      ctx.beginPath();
      ctx.moveTo(B1.x,B1.y); ctx.lineTo(T1.x,T1.y); ctx.lineTo(T2.x,T2.y); ctx.lineTo(B2.x,B2.y);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle=C.plate;
      ctx.beginPath(); ctx.ellipse(tcx,tcy, bRy, bRy*0.32, tipRot, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.4;
      const wOut=8, wUp=8;
      [[B1,+1],[B2,-1]].forEach(([B,s])=>{
        const out=s*(B1.x>=B2.x?1:-1);
        ctx.beginPath();
        ctx.moveTo(B.x, topY);
        ctx.lineTo(B.x+out*wOut, topY);
        ctx.lineTo(B.x+ux*wUp, topY+uy*wUp);
        ctx.closePath(); fillStroke(C.wF,C.wS);
      });
    }
    if(ttype==='K'){
      // 겹침이면 두 brace foot을 가깝게 당겨 교차 표현 / gap>0이면 벌려 표현
      const baseOff=chR*0.34;
      const off=isOverlap ? Math.max(chR*0.12, baseOff*0.45) : baseOff;
      drawBrace(theta,+1,off); drawBrace(theta,-1,off);
      if(isOverlap){
        // 두 brace가 겹치는 지점 강조 (chord 표면 교차부)
        ctx.save();
        ctx.fillStyle=C.wF; ctx.strokeStyle=C.wS; ctx.lineWidth=1.6;

<script type="text/html" id="src-calc"><!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Welding Deposit Calculator</title>
<style>
:root{color-scheme:light dark;
  --bg:#f5f5f7;--bg2:#ececf0;--card:#ffffff;--field:#f7f8f9;
  --border:#e8e8ed;--border2:#d2d2d7;
  --text:#1d1d1f;--text2:#515154;--text3:#86868b;
  --accent:#00843D;--accent2:#006B33;--accent-bg:#e9f6ee;--accent-bd:#b9e0c8;
  --warn:#9a7b00;--warn2:#7d6400;--warn-bg:#fdf8e1;--warn-bd:#ede092;
  --pjp:#7c3aed;--pjp-bg:#f5f3ff;
  --gap:#9a7b00;--gap-bg:#faf0bd;
  --ok:#00843D;--ok-bg:#e9f6ee;
  --red:#d70015;
  --r:18px;--rs:11px;
  --sh:0 1px 3px rgba(0,0,0,.05);
  --sh2:0 8px 24px rgba(0,0,0,.09);
  --grad:linear-gradient(135deg,#009a48 0%,#006B33 100%);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000000;--bg2:#0a0a0c;--card:#1c1c1e;--field:#141416;
  --border:#2c2c2e;--border2:#3a3a3c;
  --text:#f5f5f7;--text2:#aeaeb2;--text3:#7c7c80;
  --accent:#2bb24c;--accent2:#1f9e3f;--accent-bg:#10301c;--accent-bd:#1f5c33;
  --warn:#e6c200;--warn2:#caa800;--warn-bg:#2a2408;--warn-bd:#5c4f10;
  --pjp:#bf8aff;--pjp-bg:#2a1c45;
  --gap:#e6c200;--gap-bg:#2a2408;
  --ok:#30d158;--ok-bg:#0c2e18;
  --red:#ff453a;
  --sh:0 1px 3px rgba(0,0,0,.5);
  --sh2:0 10px 28px rgba(0,0,0,.55);
}}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--text);font-size:14px}
body{background:radial-gradient(1200px 500px at 85% -100px,var(--accent-bg) 0%,transparent 60%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);background-attachment:fixed}
::selection{background:var(--accent);color:#fff}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
/* ── header ── */
header{position:sticky;top:0;z-index:200;backdrop-filter:blur(12px) saturate(1.4);-webkit-backdrop-filter:blur(12px) saturate(1.4);background:color-mix(in srgb,var(--card) 82%,transparent);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 1.125rem;gap:9px;box-shadow:var(--sh)}
@supports not (background:color-mix(in srgb,red 50%,blue)){header{background:var(--card)}}
header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--grad);opacity:.55}
header h1{font-size:16px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
header h1 .htitle{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
header h1 .logo{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;background:var(--grad);box-shadow:0 3px 8px rgba(0,132,61,.30);font-size:15px;flex-shrink:0}
header h1 em{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--accent);font-style:normal}
header select#langSel{cursor:pointer;flex-shrink:0;font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--card);color:var(--text)}
header .hmodes{display:flex;gap:5px;flex-shrink:0}
@media (max-width:640px){
  header{padding:0 .7rem;gap:6px}
  header h1{font-size:13px;gap:6px;flex:0 1 auto;max-width:42vw}
  header h1 .logo{width:26px;height:26px}
  header select#langSel{margin-left:auto}
  header .hmodes .hbtn{padding:5px 9px;font-size:12px}
}
.hbtn{padding:6px 15px;font-size:12px;font-weight:600;border-radius:999px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:.16s}
.hbtn.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,132,61,.30)}
.hbtn:hover:not(.active){background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
/* ── layout ── */
main{padding:1rem;max-width:1340px;margin:0 auto}
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1rem;align-items:start}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
@media(min-width:961px){
  .two-col>div:last-child{position:sticky;top:72px;max-height:calc(100vh - 86px);overflow-y:auto;overscroll-behavior:contain;padding:2px 4px 8px 2px;scrollbar-width:thin}
}
/* ── cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.125rem;box-shadow:var(--sh);margin-bottom:.875rem;transition:box-shadow .2s}
.card:hover{box-shadow:var(--sh2)}
.card:last-child{margin-bottom:0}
.stitle{font-size:10.5px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';width:3.5px;height:13px;border-radius:3px;background:var(--grad);flex-shrink:0}
/* ── grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:680px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:440px){.g2,.g3,.g4{grid-template-columns:1fr}}
.mt{margin-top:.7rem}
.span2{grid-column:1/-1}
/* ── fields ── */
.fld{display:flex;flex-direction:column;gap:4px;min-width:0}
.fld label{font-size:11px;font-weight:650;color:var(--text2);user-select:none;letter-spacing:.1px}
.fld .hint{font-size:10px;color:var(--text3);margin-top:1px;line-height:1.45}
.fld input,.fld select{width:100%;height:36px;padding:0 11px;font-size:13px;font-variant-numeric:tabular-nums;border:1px solid var(--border2);border-radius:var(--rs);background:var(--field);color:var(--text);transition:border-color .15s,box-shadow .15s,background .15s;-webkit-appearance:none;appearance:none}
.fld select{padding-right:28px;background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' fill='none' stroke='%238b9ab1' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;cursor:pointer}
.fld input:hover,.fld select:hover{border-color:var(--accent-bd)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3.5px color-mix(in srgb,var(--accent) 16%,transparent)}
@supports not (background:color-mix(in srgb,red 50%,blue)){.fld input:focus,.fld select:focus{box-shadow:0 0 0 3.5px rgba(0,132,61,.16)}}
.fld input:disabled{opacity:.4;cursor:not-allowed;background:var(--bg)}
/* range slider */
input[type=range]{height:auto;padding:9px 0;border:none!important;box-shadow:none!important;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:999px;background:linear-gradient(90deg,var(--accent-bd),var(--border2))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;margin-top:-6px;border-radius:50%;background:var(--card);border:2.5px solid var(--accent);box-shadow:0 1px 5px rgba(0,132,61,.35);transition:transform .12s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12)}
input[type=range]::-moz-range-track{height:6px;border-radius:999px;background:var(--border2)}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--card);border:2.5px solid var(--accent);box-shadow:0 1px 5px rgba(0,132,61,.35)}
/* ── tabs ── */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.7rem}
.tab{padding:6px 13px;font-size:12px;font-weight:600;border-radius:999px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:.16s;white-space:nowrap;line-height:1.4}
.tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,132,61,.28)}
.tab:hover:not(.active){background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd);transform:translateY(-1px)}
.tab .sym{font-size:16px;margin-right:5px;vertical-align:-1px}
/* ── iso badge ── */
.iso-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:linear-gradient(135deg,var(--accent-bg),var(--card));border:1px solid var(--accent-bd);border-radius:var(--rs);margin-bottom:.7rem;font-size:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.iso-badge .sym{font-size:20px;font-weight:700;color:var(--accent)}
.iso-badge .name{font-weight:700;color:var(--text)}
.iso-badge .desc{font-size:11px;color:var(--text3)}
/* ── chk ── */
.chk-row{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:550;color:var(--text2);cursor:pointer;margin:.55rem 0;padding:9px 12px;background:var(--field);border-radius:var(--rs);border:1px solid var(--border);transition:.15s}
.chk-row:hover{border-color:var(--accent-bd);background:var(--accent-bg)}
.chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
/* ── process bar ── */
.proc-bar{margin-top:.55rem;padding:.75rem 1rem;background:var(--field);border:1px solid var(--border);border-radius:var(--rs);display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.proc-eff{flex:1;min-width:160px}
.proc-eff-lbl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.proc-eff-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.eff-badge{font-size:17px;font-weight:800;padding:3px 11px;border-radius:8px;min-width:56px;text-align:center;font-variant-numeric:tabular-nums}
.proc-detail{font-size:11px;color:var(--text3);border-left:2.5px solid var(--accent-bd);padding-left:.8rem;line-height:1.7;flex:1;min-width:180px}
.range-val{font-size:11.5px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
/* ── image panel ── */
.img-panel{position:relative;background:var(--field);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-panel img{width:100%;height:auto;max-height:240px;object-fit:contain;display:block}
.img-panel .no-img{text-align:center;padding:1.5rem;color:var(--text3)}
.img-panel .no-img .iso{font-size:36px;font-weight:700;color:var(--border2);margin-bottom:6px}
.img-panel .no-img p{font-size:12px;line-height:1.5}
.img-upload-btn{position:absolute;bottom:9px;right:9px;padding:6px 13px;font-size:11px;font-weight:650;background:var(--card);border:1px solid var(--border2);border-radius:999px;cursor:pointer;color:var(--text2);box-shadow:var(--sh2);transition:.15s}
.img-upload-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd);transform:translateY(-1px)}
.img-clear-btn{position:absolute;top:9px;right:9px;width:25px;height:25px;border-radius:50%;background:rgba(8,15,30,.5);backdrop-filter:blur(4px);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;transition:.15s}
.img-clear-btn:hover{background:var(--red)}
/* ── canvas ── */
canvas{display:block;width:100%;border-radius:var(--rs);border:1px solid var(--border);background:var(--field)}
/* ── results ── */
.res-hi{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:.8rem}
@media(max-width:420px){.res-hi{grid-template-columns:1fr 1fr}}
.rc{position:relative;background:linear-gradient(150deg,var(--accent-bg) 0%,var(--card) 120%);border:1px solid var(--accent-bd);border-radius:12px;padding:.7rem .9rem;overflow:hidden;transition:.18s}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad)}
.rc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.rc.warn{background:linear-gradient(150deg,var(--warn-bg) 0%,var(--card) 120%);border-color:var(--warn-bd)}
.rc.warn::before{background:linear-gradient(180deg,var(--warn),var(--warn2))}
.rc .rl{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:.2px}
.rc.warn .rl{color:var(--warn)}
.rc .rv{font-size:22px;font-weight:800;color:var(--accent);line-height:1.05;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.rc.warn .rv{color:var(--warn)}
.rc .ru{font-size:10px;color:var(--accent);opacity:.7;margin-top:2px}
.rc.warn .ru{color:var(--warn);opacity:.7}
.det{background:var(--field);border:1px solid var(--border);border-radius:var(--rs);padding:.45rem 1rem}
.dr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5.5px 0;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2)}
.dr:last-child{border-bottom:none}
.dr .dv{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.dr .dv.gap{color:var(--gap)}
.dr .dv.pjp{color:var(--pjp)}
.dr .du{font-size:10px;font-weight:450;color:var(--text3);margin-left:3px}
/* ── batch ── */
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:2.25rem 2rem;text-align:center;cursor:pointer;transition:.18s;color:var(--text3);background:var(--field)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);box-shadow:inset 0 0 0 1px var(--accent-bd)}
.drop-zone .di{font-size:32px;margin-bottom:.45rem}
.batch-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--rs);max-height:60vh}
table.bt{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
table.bt th{position:sticky;top:0;z-index:1;background:var(--field);padding:8px 10px;font-weight:700;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.55px;border-bottom:2px solid var(--border2);text-align:left;white-space:nowrap}
table.bt td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums}
table.bt tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--field) 55%,transparent)}
table.bt tr:hover td{background:var(--accent-bg)}
.ta{color:var(--accent);font-weight:700}
.tg{color:var(--gap);font-weight:700}
.tp{color:var(--pjp);font-weight:700}
/* ── misc ── */
.btn{padding:8px 16px;font-size:12px;font-weight:600;border-radius:999px;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.16s;white-space:nowrap}
.btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd);transform:translateY(-1px)}
.btn.pri{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 9px rgba(0,132,61,.30)}
.btn.pri:hover{filter:brightness(1.07);transform:translateY(-1px);color:#fff}
.badge{display:inline-block;font-size:10px;padding:1.5px 7px;border-radius:999px;margin-left:4px;vertical-align:middle;font-weight:700}
.bw{background:var(--warn-bg);color:var(--warn)}
.bn{background:var(--accent-bg);color:var(--accent)}
.ok-tag{font-size:12px;color:var(--ok);font-weight:600;padding:6px 12px;background:var(--ok-bg);border-radius:999px}
.empty{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px}
.hidden{display:none!important}
#toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(56px) scale(.96);background:linear-gradient(135deg,#16213b,#0f1c2e);color:#fff;padding:.6rem 1.25rem;border-radius:999px;font-size:12.5px;font-weight:600;opacity:0;transition:.26s cubic-bezier(.2,.9,.3,1.2);z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
body.mode-simple .adv{display:none!important}
.mode-seg{display:inline-flex;gap:2px;padding:2px;background:var(--border);border:none;border-radius:9px;margin-left:auto;flex-shrink:0}
.mode-seg button{padding:4px 13px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:7px;transition:.15s}
.mode-seg button:hover:not(.active){color:var(--text)}
.mode-seg button.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.14)}

/* ── 사용설명서 오버레이 ── */
#manual-overlay{position:fixed;inset:0;z-index:1000;background:#f4f5f7;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
#manual-overlay.show{display:block}
.manual-toolbar{position:sticky;top:0;z-index:5;display:flex;gap:8px;align-items:center;padding:10px 16px;background:#ffffff;border-bottom:1px solid #d2d2d7;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.manual-toolbar .mt-title{margin-right:auto;font-weight:800;font-size:14px;color:#1d1d1f;display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.manual-toolbar .mt-title .dot{width:9px;height:9px;border-radius:50%;background:#00843D;display:inline-block;flex-shrink:0}
.manual-btn{padding:7px 15px;font-size:13px;font-weight:700;border-radius:999px;border:1px solid #d2d2d7;background:#fff;color:#1d1d1f;cursor:pointer;white-space:nowrap;transition:.15s}
.manual-btn:hover{background:#f0f0f3}
.manual-btn.pri{background:linear-gradient(135deg,#009a48,#006B33);color:#fff;border-color:transparent}
.manual-btn.exit{border-color:#e3b0b0;color:#c0392b}
.manual-btn.exit:hover{background:#fdeeee}
@media (max-width:560px){.manual-toolbar{padding:8px 10px;gap:6px}.manual-btn{padding:6px 11px;font-size:12px}}

/* ── 설명서 본문 (scoped) ── */
#manual-doc{--green:#00843D; --green2:#00a04a; --bg:#f5f5f7; --card:#fff;
  --text:#1d1d1f; --text2:#3a3a3c; --text3:#6e6e73; --border:#d2d2d7;
  --accent-bg:#e8f5ed; --warn-bg:#fff8e6; --warn:#c77d11;}
#manual-doc *{box-sizing:border-box; margin:0; padding:0;}
#manual-doc{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.7;}
#manual-doc .cover{background:linear-gradient(135deg,#004d24 0%,#00843D 60%,#00b04d 100%); color:#fff; padding:56px 40px 48px; text-align:center;}
#manual-doc .cover h1{font-size:2rem; font-weight:800; letter-spacing:-.02em; margin-bottom:.4rem;}
#manual-doc .cover .sub{font-size:1rem; opacity:.85; margin-bottom:1.2rem;}
#manual-doc .cover .badge{display:inline-block; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600; letter-spacing:.04em;}
#manual-doc .toc{max-width:820px; margin:36px auto 0; background:var(--card); border-radius:16px; padding:28px 32px; box-shadow:0 2px 12px rgba(0,0,0,.07);}
#manual-doc .toc h2{font-size:14px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px;}
#manual-doc .toc ol{padding-left:1.4rem; color:var(--green);}
#manual-doc .toc li{margin-bottom:4px;}
#manual-doc .toc a{color:var(--green); text-decoration:none; font-weight:500;}
#manual-doc .toc a:hover{text-decoration:underline;}
#manual-doc .wrap{max-width:820px; margin:0 auto; padding:0 20px 60px;}
#manual-doc section{margin-top:44px;}
#manual-doc h2.sec{font-size:1.3rem; font-weight:800; color:var(--green); border-bottom:3px solid var(--green); padding-bottom:8px; margin-bottom:20px;}
#manual-doc h3{font-size:1rem; font-weight:700; margin:24px 0 8px;}
#manual-doc p{margin-bottom:10px; color:var(--text2);}
#manual-doc .box{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 22px; margin:12px 0;}
#manual-doc .box.green{background:var(--accent-bg); border-color:#a8d8be;}
#manual-doc .box.warn{background:var(--warn-bg); border-color:#f0c060;}
#manual-doc .box.warn .icon{color:var(--warn); font-weight:700; margin-bottom:4px;}
#manual-doc table{width:100%; border-collapse:collapse; margin:12px 0; font-size:13.5px;}
#manual-doc th{background:var(--green); color:#fff; padding:9px 12px; text-align:left; font-weight:600;}
#manual-doc td{padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top;}
#manual-doc tr:nth-child(even) td{background:#f9f9fb;}
#manual-doc code{background:#f0f0f5; border-radius:5px; padding:1px 6px; font-size:13px; font-family:'SF Mono',Consolas,monospace; color:#5a0089;}
#manual-doc .step{display:flex; gap:14px; margin:10px 0;}
#manual-doc .step-num{flex-shrink:0; width:28px; height:28px; background:var(--green); color:#fff; border-radius:50%; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;}
#manual-doc .step-body{flex:1;}
#manual-doc .tip{font-size:12.5px; color:var(--text3); border-left:3px solid var(--green); padding-left:10px; margin:6px 0;}
#manual-doc .kw{font-weight:700; color:var(--green);}
#manual-doc ul{padding-left:1.4rem; margin-bottom:10px;}
#manual-doc li{margin-bottom:4px; color:var(--text2);}
#manual-doc .flow{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:12px 0; font-size:13px;}
#manual-doc .flow-step{background:var(--green); color:#fff; border-radius:8px; padding:6px 14px; font-weight:700; font-size:12.5px;}
#manual-doc .flow-arr{color:var(--text3); font-size:16px; font-weight:700;}
#manual-doc .pill{display:inline-block; background:var(--accent-bg); color:var(--green); border:1px solid #a8d8be; border-radius:20px; padding:2px 10px; font-size:12px; font-weight:700; margin:2px;}
#manual-doc footer{text-align:center; padding:32px 20px; color:var(--text3); font-size:12px; border-top:1px solid var(--border); max-width:820px; margin:0 auto;}

/* ── 인쇄: 설명서만 출력 ── */
@media print{
  body.printing-manual>*{display:none!important}
  body.printing-manual>#manual-overlay{display:block!important;position:static;inset:auto;overflow:visible;height:auto;background:#fff;z-index:auto}
  body.printing-manual #manual-overlay .manual-toolbar{display:none!important}
  #manual-doc .cover{padding:28px 20px}
  #manual-doc section{page-break-inside:avoid}
  #manual-doc,#manual-doc *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

<body class="mode-simple">

<header>
  <h1><span class="logo"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <path d="M4.2 4.2 L11.4 11.4" stroke="#fff" stroke-width="4.6"/>
  <path d="M4.2 4.2 L7.6 7.6" stroke="#ff8a5c" stroke-width="4.6"/>
  <path d="M11.4 11.4 L15.4 17.2" stroke="#fff" stroke-width="2"/>
  <path d="M16.4 18.1 L16.4 16.2 M17.7 19.4 L19.6 19.4 M15.1 19.4 L13.2 19.4 M16.4 20.7 L16.4 22.6 M17.3 18.5 L18.7 17.1 M15.5 20.3 L14.1 21.7 M17.3 20.3 L18.7 21.7 M15.5 18.5 L14.1 17.1" stroke="#ffd60a" stroke-width="1.9"/>
</svg></span><span class="htitle">Welding <em>Deposit</em> Calculator</span></h1>
  
  <div class="hmodes">
    <button class="hbtn active" id="btn-single" onclick="switchMode('single')">Calculator</button>
    
    <button class="hbtn" id="btn-manual" style="display:none" onclick="openManual()">📖 설명서</button>
  </div>
</header>

<main>

<!-- ══ SINGLE ══ -->
<div id="mode-single">
<div class="card" style="background:var(--accent-bg);border:1px solid var(--accent-bd);display:flex;gap:10px;align-items:flex-start">
  <span style="font-size:17px;line-height:1.3">💡</span>
  <div style="font-size:13px;line-height:1.6;color:var(--text2)">기준정보를 불러오지 않아도 형상·치수를 직접 입력하면 바로 계산기로 사용할 수 있습니다. 기준정보를 불러오면 등록된 Joint 값이 자동으로 채워집니다.</div>
</div>
<div class="card" id="bl-link-card" style="border:1px solid var(--accent-bd)">
  <div class="stitle">🔗 기준정보 불러오기</div>
  <div id="bl-diag" style="font-size:12px;color:var(--accent2);font-weight:700;margin-bottom:.5rem">기준정보 불러오는 중…</div>
  <style>#bl-combo-list .bl-combo-item:hover{background:var(--bg2)}</style>
  <div style="position:relative;margin-bottom:.5rem">
    <input id="bl-combo" type="search" autocomplete="off" placeholder="Joint 검색·선택 (프로젝트·Component·Joint·WPS)" oninput="blComboOpen()" onfocus="blComboOpen()" onblur="blComboBlur()" style="width:100%;height:36px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--field);color:var(--text);padding:0 12px">
    <div id="bl-combo-list" style="display:none;position:absolute;left:0;right:0;top:39px;z-index:40;max-height:280px;overflow:auto;background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);box-shadow:0 10px 28px rgba(0,0,0,.2)"></div>
  </div>
  <input type="hidden" id="add-project"><input type="hidden" id="add-component"><input type="hidden" id="add-jointno"><input type="hidden" id="add-qty" value="1">
</div>
<div class="two-col">

<!-- ── LEFT ── -->
<div>

<!-- ════ MATERIAL 정보 ════ -->
<div class="card">
  <div class="stitle">① Material 정보 — 모재</div>
  <div class="g4">
    <div class="fld span2">
      <label>모재 재질</label>
      <select id="material" onchange="onMaterial()">
        <option>Carbon Steel (CS)</option><option>Low Alloy Steel</option>
        <option>Stainless Steel 304/316</option><option>Duplex SS</option>
        <option>Inconel 625</option><option>Hastelloy C-276</option>
        <option>Aluminum</option><option>사용자 정의</option>
      </select>
    </div>
    <div class="fld">
      <label>모재1 두께 t₁ (mm)</label>
      <input type="number" id="gT" value="16" step="0.5" min="1" oninput="syncT()">
      <span class="hint">모든 개선 공통 적용</span>
    </div>
    <div class="fld hidden" id="buttT2-wrap">
      <label>모재2 두께 t₂ (mm)</label>
      <input type="number" id="buttT2" value="16" step="0.5" min="1" oninput="calc()">
      <span class="hint">이종 두께 맞대기 (T₁ ≠ T₂)</span>
    </div>


    <div class="fld">
      <label>밀도 ρ (g/cm³)</label>
      <input type="number" id="density" value="7.85" step="0.01" min="0.5" oninput="calc()">
    </div>
  </div>


</div>

<!-- ════ WELDING 정보 ════ -->
<div class="card">
  <div class="stitle">② Welding 정보 — 용접 조건</div>

  <!-- 2-1. 프로세스 -->
  <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:.4rem">2-1. 용접 프로세스 &amp; 효율</div>
  <div class="g2">
    <div class="fld">
      <label>용접 프로세스</label>
      <select id="process" onchange="onProcess()">
        <option value="SMAW">SMAW — 피복 아크 (Shielded Metal Arc)</option>
        <option value="GMAW">GMAW — MIG/MAG (솔리드/메탈코어)</option>
        <option value="FCAW">FCAW — 플럭스 코어드 아크</option>
        <option value="SAW">SAW — 서브머지드 아크</option>
        <option value="GTAW">GTAW — TIG (Gas Tungsten Arc)</option>
        <option value="CUSTOM">사용자 정의</option>
      </select>
    </div>
  </div>
  <div class="proc-bar" id="proc-bar">
    <div class="proc-eff">
      <div class="proc-eff-lbl">Deposition Efficiency η</div>
      <div class="proc-eff-row">
        <div class="eff-badge" id="eff-badge">65%</div>
        <span id="eff-range" style="font-size:11px;color:var(--text3)">기준</span>
        <button type="button" onclick="effResetCurrent()" title="이 프로세스 효율을 기준값으로 복원" style="margin-left:6px;font-size:10.5px;padding:2px 7px;border:1px solid var(--border2);border-radius:6px;background:var(--card);color:var(--text3);cursor:pointer">↺ 기준값</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="range" id="effSlider" min="50" max="100" value="65" step="1" oninput="onEffSlider()" style="flex:1">
        <input type="number" id="efficiency" value="65" min="50" max="100" step="1" oninput="onEffInput()" style="width:54px;padding:5px 7px;font-size:13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--card);color:var(--text)">
        <span style="font-size:11px;color:var(--text3)">%</span>
      </div>
    </div>
    <div class="proc-detail" id="proc-detail"></div>
  </div>
</div>

<!-- Joint (Welding 정보 2-2) -->
<div class="card">
  <div class="stitle" style="display:flex;align-items:center;gap:8px">② Welding 정보 &nbsp;|&nbsp; 2-2. Joint &amp; 개선 형상
    <button id="adv-toggle" onclick="toggleAdv()" style="margin-left:auto;font-size:11px;font-weight:700;padding:4px 10px;border:1px solid var(--accent-bd);border-radius:20px;background:var(--bg2);color:var(--accent2);cursor:pointer" title="루트 페이스·덧살·비율 등 상세 입력 표시/숨김">⚙ 상세 입력</button>
  </div>

  <!-- Level 0: member category -->

    <button class="tab active" data-cat="Plate" onclick="selCat('Plate')"><span class="sym">▭</span>Plate (판재)</button>

  <!-- Level 1: Joint family (카테고리에 따라 필터) -->

  <div class="tabs" id="family-tabs">
    <button class="tab active" data-fam="Butt"   onclick="selFamily('Butt')">Butt (맞대기)</button>

  <!-- Level 2: groove prep within family -->
  <div style="font-size:11px;font-weight:700;color:var(--text2);margin:.5rem 0 .35rem">STEP 3 — 개선 형상</div>
  <div class="tabs" id="groove-tabs"></div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:.5rem 0 .2rem;padding-top:.5rem;border-top:1px dashed var(--border2)">
