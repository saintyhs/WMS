<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#00843D">
<title>Welding Quantity Manager</title>
<style>
:root{color-scheme:light dark;
  --bg:#f5f5f7;--bg2:#ececf0;--card:#ffffff;--field:#f7f8f9;
  --border:#e8e8ed;--border2:#d2d2d7;
  --text:#1d1d1f;--text2:#515154;--text3:#86868b;
  --accent:#00843D;--accent2:#006B33;--accent-bg:#e9f6ee;--accent-bd:#b9e0c8;
  --r:20px;--rs:12px;--sh:0 1px 3px rgba(0,0,0,.05);--sh2:0 12px 34px rgba(0,0,0,.10);
  --grad:linear-gradient(135deg,#009a48 0%,#006B33 100%);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000;--bg2:#0a0a0c;--card:#1c1c1e;--field:#141416;--border:#2c2c2e;--border2:#3a3a3c;
  --text:#f5f5f7;--text2:#aeaeb2;--text3:#7c7c80;
  --accent:#2bb24c;--accent2:#1f9e3f;--accent-bg:#10301c;--accent-bd:#1f5c33;
  --sh:0 1px 3px rgba(0,0,0,.5);--sh2:0 14px 38px rgba(0,0,0,.6);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--text);
  background:radial-gradient(1100px 520px at 80% -120px,var(--accent-bg) 0%,transparent 60%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);background-attachment:fixed}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ===== Launcher ===== */
#launcher{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 60px}
.hero{text-align:center;margin-bottom:38px;max-width:640px}
.hero .logo{width:64px;height:64px;border-radius:18px;background:var(--grad);box-shadow:0 8px 22px rgba(0,132,61,.32);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
.hero .logo svg{width:36px;height:36px}
.hero h1{font-size:30px;font-weight:850;letter-spacing:-.5px;line-height:1.1}
.hero h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--accent)}
.hero p{margin-top:10px;color:var(--text3);font-size:14.5px;line-height:1.6}
.tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;width:100%;max-width:920px}
@media(max-width:760px){.tiles{grid-template-columns:1fr}}
.tile{position:relative;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px 20px;cursor:pointer;box-shadow:var(--sh);transition:transform .16s,box-shadow .2s,border-color .16s;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:4px;width:100%;background:var(--grad);opacity:.0;transition:.2s}
.tile:hover{transform:translateY(-4px);box-shadow:var(--sh2);border-color:var(--accent-bd)}
.tile:hover::after{opacity:1}
.tile .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:16px;background:var(--accent-bg);border:1px solid var(--accent-bd)}
.tile .ic svg{width:26px;height:26px}
.tile.alt .ic{background:linear-gradient(135deg,#eef7f1,#ffffff)}
.tile h2{font-size:17px;font-weight:800;letter-spacing:-.2px}
.tile .badge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-bd);padding:2px 9px;border-radius:999px;margin-bottom:13px}
.tile p{margin-top:8px;color:var(--text3);font-size:12.8px;line-height:1.55}
.tile .go{margin-top:15px;font-size:12.5px;font-weight:700;color:var(--accent);display:inline-flex;align-items:center;gap:5px}
.foot{margin-top:34px;color:var(--text3);font-size:11.5px;text-align:center;line-height:1.6;max-width:620px}

/* ===== Stage (app view) ===== */
#stage{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:var(--bg)}
#stage.show{display:flex}
.topbar{flex:0 0 auto;height:46px;display:flex;align-items:center;gap:10px;padding:0 12px;background:var(--card);border-bottom:1px solid var(--border);box-shadow:var(--sh)}
.topbar .back{font-size:13px;font-weight:700;color:var(--text2);background:transparent;border:1px solid var(--border2);border-radius:999px;padding:6px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.topbar .back:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.topbar .name{font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .appnav{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none}
.topbar .appnav::-webkit-scrollbar{display:none}
.topbar .appnav button{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--text2);background:transparent;border:1px solid transparent;border-radius:999px;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:.15s}
.topbar .appnav button:hover{background:var(--accent-bg);color:var(--accent)}
.topbar .appnav button.active{background:var(--grad);color:#fff;box-shadow:0 2px 8px rgba(0,132,61,.25)}
.flow{display:inline-flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:14px;font-size:12.5px;color:var(--text2)}
.flow span{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-weight:600;box-shadow:var(--sh)}
.flow i{color:var(--accent);font-style:normal;font-weight:800}
.topbar .name .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.frames{flex:1;position:relative;min-height:0}
.frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--card)}
.frames iframe.show{display:block}
</style>
</head>
<body>
<style>
/* responsive safety net */
html,body{overflow-x:hidden}
.grid>*,.g2>*,.g3>*,.g4>*,.fld{min-width:0}
.fld>input,.fld>select,.fld>textarea{width:100%;max-width:100%}
label,.hint,.note{overflow-wrap:break-word}
.stitle{flex-wrap:wrap;row-gap:6px}
@media(max-width:520px){.grid,.g2,.g3,.g4{grid-template-columns:1fr!important}
.btn,.hbtn,.tab,button{white-space:nowrap}
.stitle,.actbar,.tabs,.mtoolbar,.chips,.toolbar{flex-wrap:wrap}
.appnav{flex-wrap:nowrap}
.topbar{flex-wrap:wrap;height:auto;min-height:46px;padding-top:4px;padding-bottom:4px}}
</style>

    #authGate .ag-l{display:block;text-align:left;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.75);margin:0 0 5px 2px}
    #authGate .ag-form input{width:100%;box-sizing:border-box;font:inherit;font-size:14px;padding:11px 13px;margin-bottom:13px;border-radius:11px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.93);color:#111;outline:none}
    #authGate .ag-form input:focus{border-color:#00d266;box-shadow:0 0 0 3px rgba(0,210,102,.25)}
    #authGate .ag-btn{width:100%;font:inherit;font-weight:800;font-size:15px;padding:13px;border:0;border-radius:12px;background:linear-gradient(135deg,#00c95f,#00843D);color:#fff;cursor:pointer;box-shadow:0 8px 20px rgba(0,160,80,.4);transition:.15s;margin-top:2px}
    #authGate .ag-btn:hover{filter:brightness(1.07)}
    #authGate .ag-btn:active{transform:translateY(1px)}
    #authGate .ag-err{min-height:16px;font-size:12px;color:#ff9b8a;font-weight:600;margin:-4px 0 8px;text-align:left}
    #authGate .ag-foot{font-size:11px;line-height:1.5;color:rgba(255,255,255,.55);margin-top:18px}
  </style>

  <div class="ag-top">

.nderow{display:flex;gap:6px;align-items:center}
.nderow .chip{min-width:46px;text-align:center;flex:0 0 auto}
.ndesel{flex:1 1 auto;min-width:0;height:34px;border:1px solid var(--border2);border-radius:8px;background:var(--field);color:var(--text);font-size:12px;padding:0 6px}
.ndesel:disabled{opacity:.5}
.fld.s2{grid-column:span 2}
.g2,.g3,.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
@media(max-width:440px){.g2,.g3,.grid{grid-template-columns:repeat(2,1fr)}}
.fld label{font-size:11.5px;font-weight:700;color:var(--text2)}
.fld label .req{color:var(--red)}
.fld input,.fld select{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:9px;background:var(--field);color:var(--text)}
.fld .hint{font-size:10.5px;color:var(--text3)}
.btn{font:inherit;font-weight:700;font-size:13px;padding:9px 16px;border-radius:10px;border:1px solid var(--accent-bd);background:var(--accent-bg);color:var(--accent2);cursor:pointer}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.ghost{background:var(--bg2);color:var(--text2);border-color:var(--border2)}
.btn.sm{padding:4px 10px;font-size:11.5px}
.row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.bulk{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
th{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
tbody tr:hover{background:var(--bg2)}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:999px;background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent-bd)}
.tag.no{background:var(--bg2);color:var(--text3);border-color:var(--border2)}
.empty{color:var(--text3);font-size:13px;padding:16px;text-align:center}
.note{font-size:12px;color:var(--warn2);background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:9px;padding:8px 12px;margin-top:10px;line-height:1.7}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cnt{margin-left:auto;font-size:12px;font-weight:600;color:var(--text3)}
</style>
</head>
<body>
<style>
/* responsive safety net */
html,body{overflow-x:hidden}
.grid>*,.g2>*,.g3>*,.g4>*,.fld{min-width:0}
.fld>input,.fld>select,.fld>textarea{width:100%;max-width:100%}
label,.hint,.note{overflow-wrap:break-word}
.stitle{flex-wrap:wrap;row-gap:6px}
@media(max-width:520px){.grid,.g2,.g3,.g4{grid-template-columns:1fr!important}
.btn,.hbtn,.tab,button{white-space:nowrap}
.stitle,.actbar,.tabs,.mtoolbar,.chips,.toolbar{flex-wrap:wrap}
.appnav{flex-wrap:nowrap}
.topbar{flex-wrap:wrap;height:auto;min-height:46px;padding-top:4px;padding-bottom:4px}}
</style>
<div class="wrap">
  <h1>기준 정보 등록</h1>
  <div class="sub">프로젝트·Component·Joint 기준정보(모재·개선·프로세스)를 등록합니다. Route Card가 이 기준을 불러와 실제값을 입력하고, 현황에서 이론 vs 실제를 비교합니다.</div>

  <!-- ① 식별 -->
  <div class="card">
    <div class="stitle">① 프로젝트 · Component · Joint</div>
    <div class="grid">
      <div class="fld"><label>프로젝트 <span class="req">*</span></label><input id="f_project" placeholder="예: SHI-1234"><div class="hint">현황에서 이 이름으로 구분</div></div>
      <div class="fld"><label>Component <span class="req">*</span></label><input id="f_component" placeholder="예: 선수 / 엔진룸 / TP"></div>
      <div class="fld"><label>Joint 번호</label><input id="f_jointNo" placeholder="예: J-001"></div>
      <div class="fld"><label>수량 (qty) <span class="req">*</span></label><input id="f_qty" type="number" min="1" step="1" value="1"></div><div class="fld"><label>제품 유형</label><select id="f_prodType" onchange="onProdType()"><option value="piping">배관</option><option value="vessel">압력용기</option><option value="offshore">해양구조물</option><option value="other">기타</option></select></div><div class="fld" id="prodTypeOtherFld" style="display:none"><label>유형 직접 입력</label><input id="f_prodTypeName" placeholder="유형 직접 입력"></div>
    </div>
  </div>

  <!-- ② 모재 -->
  <div class="card">
    <div class="stitle">② 모재1 · 모재2 (재질 · 두께)</div>
    <div class="grid">
      <div class="fld span2"><label>모재1 재질</label>
        <input id="f_material" list="matList" placeholder="선택 또는 직접 입력"><div class="hint">밀도 자동 적용 (미입력 시 Carbon Steel)</div></div>
      <div class="fld span2"><label>모재2 재질</label>
        <input id="f_material2" list="matList" placeholder="이종재질일 때 입력 (미입력 시 모재1과 동일)"><div class="hint">목록 선택 또는 직접 입력</div></div>
      <div class="fld"><label>모재1 두께 t₁ (mm) <span class="req">*</span></label><input id="f_T" type="number" step="any" placeholder="예: 16"></div>
      <div class="fld" id="t2-fld"><label>모재2 두께 t₂ (mm)</label><input id="f_T2" type="number" step="any" placeholder="미입력 시 t₁과 동일"><div class="hint">다른 값 입력 시 이종두께 자동 적용</div></div>
      <datalist id="matList"></datalist>
    </div>
  </div>

  <!-- ③ Joint(개선/Gap) -->
  <div class="card">
    <div class="stitle">③ Joint 정보 (개선 · Gap)</div>
    <div class="grid">
      <div class="fld"><label>Joint 종류 <span class="req">*</span></label>
        <select id="f_jointType" onchange="onJointType()"><option value="B">B (맞대기)</option><option value="T">T (T이음)</option><option value="TKY">TKY (분기)</option></select></div>
      <div class="fld"><label>개선 (groove) <span class="req">*</span></label><select id="f_groove"></select></div>
      <div class="fld"><label>용접 길이 L (mm) <span class="req">*</span></label><input id="f_weldLength" type="number" step="any" placeholder="Joint 1개당"></div>
      <div class="fld"><label>개선각 α (°)</label><input id="f_ang" type="number" step="any" placeholder="그루브 전체각"></div>
      <div class="fld"><label>루트 페이스 c (mm)</label><input id="f_root" type="number" step="any" placeholder="미입력 0"></div>
      <div class="fld"><label>루트 갭 b (mm)</label><input id="f_gap" type="number" step="any"></div>
      <div class="fld"><label>상부비율 h₁/h (%)</label><input id="f_ratio" type="number" step="any" placeholder="DV/DB형, 미입력 50"></div>
      <div class="fld"><label>덧살 cap (mm)</label><input id="f_cap" type="number" step="any" placeholder="미입력 1.5, Flush 0"></div>
      <div class="fld"><label>각장 z₁ (mm)</label><input id="f_z1" type="number" step="any" placeholder="필릿/T/Branch 보강"></div>
      <div class="fld"><label>각장 z₂ (mm)</label><input id="f_z2" type="number" step="any" placeholder="양면"></div>
      <div class="fld"><label>경사각 θ (°)</label><input id="f_tAngle" type="number" step="any" placeholder="T·Branch 공용"></div>
      <div class="fld"><label>백가우징</label>
        <select id="f_backGouge"><option value="">N</option><option value="Y">Y</option></select></div>
    </div>
    <div class="grid" id="tkyRow" style="margin-top:12px;display:none">
      <div class="fld"><label>주관 외경 OD₁ (mm)</label><input id="f_tkyD" type="number" step="any" placeholder="chord OD"></div>
      <div class="fld"><label>지관 외경 OD₂ (mm)</label><input id="f_tkyd" type="number" step="any" placeholder="brace OD"></div>
      <div class="fld"><label>지관 두께 t (mm)</label><input id="f_tkyt" type="number" step="any" placeholder="미입력 시 t₁"></div>
      <div class="fld"><label>지관 경사각 θ (°)</label><input id="f_tkyAngle" type="number" step="any"></div>
    </div>
    <div class="note" id="grooveHint"></div>
  </div>

  <!-- ④ 프로세스/WPS -->
  <div class="card">
    <div class="stitle">④ 용접 프로세스 · WPS</div>
    <div class="grid">
      <div class="fld"><label>적용 WPS</label><input id="f_wps" placeholder="예: WPS-001"></div>
      <div class="fld"><label>용접 프로세스 <span class="req">*</span></label><input id="f_process" list="procList" placeholder="선택 또는 직접 입력"><datalist id="procList"></datalist><div class="hint">목록 선택 또는 직접 입력 · 효율 자동(미정의 시 80%)</div></div>
      <div class="fld"><label>백가우징 추가 (%)</label><input id="f_gougePct" type="number" step="any" placeholder="백가우징 Y일 때, 미입력 10"></div>
    </div>
    <div class="row-actions">
      <button class="btn primary" onclick="register()" id="regBtn">＋ 기준정보 등록</button>
      <button class="btn ghost" onclick="resetForm()">초기화</button>
      <span id="editState" style="font-size:12px;color:var(--warn2);font-weight:700"></span>
    </div>
  </div>

  <!-- 일괄 업로드 -->
  <div class="card">
    <div class="stitle">⑤ 일괄 업로드 (Excel / CSV)</div>
    <div class="bulk">
      <button class="btn primary" onclick="blSample()">🧩 샘플 데이터 채우기</button>
      <button class="btn" onclick="csvTemplate()">⬇ 업로드 양식 (CSV)</button>
      <button class="btn" onclick="document.getElementById('csvFile').click()">📂 CSV 업로드</button>
      <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none" onchange="csvUpload(this.files[0]);this.value=''">
      <span id="upStatus" style="font-size:12.5px;color:var(--accent2);font-weight:600"></span>
    </div>
    <div class="note">처음 사용하신다면 <b>‘🧩 샘플 데이터 채우기’</b>로 예시 기준정보 10건을 불러올 수 있습니다.</div>
    <div class="note">양식의 헤더(영문 키)는 그대로 두고 행만 추가하세요. jointType=B/T/TKY, groove는 B:I/SV/DV/SB/DB/SU/SJ · T:SBSF/SBDF/DBSF/DBDF · TKY:SB/DB. 엑셀은 "다른 이름으로 저장 → CSV UTF-8"로 내보내 업로드합니다. 기존과 같은 프로젝트+Component+Joint번호면 덮어씁니다.</div>
  </div>

  <!-- 등록 목록 -->
  <div class="card">
    <div class="stitle">등록된 기준정보 <span class="cnt" id="listCnt"></span>
      <button class="btn ghost sm" style="margin-left:10px" onclick="clearAll()">전체 삭제</button>
    </div>
    <div style="overflow-x:auto"><table id="listTbl"><thead><tr>
      <th>프로젝트</th><th>Component</th><th>Joint</th><th>종류·개선</th><th>t₁/t₂</th><th>재질</th><th>L·qty</th><th>WPS</th><th>프로세스</th><th>실제</th><th></th>
    </tr></thead><tbody id="listBody"></tbody></table></div>
    <div class="empty" id="listEmpty">아직 등록된 기준정보가 없습니다. 처음이시라면 위 <b>‘🧩 샘플 데이터 채우기’</b>로 예시를 불러와 보세요.</div>
  </div>
</div>
<div id="dupModal" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh2);max-width:380px;width:100%;padding:22px">
    <div style="font-size:15px;font-weight:800;margin-bottom:8px">⚠ 중복 Joint 확인</div>
    <div id="dupMsg" style="font-size:13px;line-height:1.55;margin-bottom:16px;color:var(--text2)"></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button id="dupSkipBtn" class="btn primary" onclick="dupResolve('skip')" style="width:100%">중복 제외하고 등록</button>
      <button class="btn" onclick="dupResolve('overwrite')" style="width:100%">전체 덮어쓰기 (중복 갱신)</button>
      <button class="btn ghost" onclick="dupResolve('cancel')" style="width:100%">취소</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
(function(){try{var P=Storage.prototype;if(P.__wdcNS)return;P.__wdcNS=1;var _g=P.getItem,_s=P.setItem,_r=P.removeItem;var G={wdc_lang:1,wdc_accounts:1,wdc_session:1};function NS(){try{return (window.parent&&window.parent!==window&&window.parent.__WDC_NS)||window.__WDC_NS||'';}catch(e){return window.__WDC_NS||'';}}function K(k){if(typeof k==='string'&&!G[k]&&(k.indexOf('wdc_')===0||k.indexOf('wrc_')===0)){var n=NS();if(n)return 'u_'+n+'__'+k;}return k;}P.getItem=function(k){return _g.call(this,K(k));};P.setItem=function(k,v){return _s.call(this,K(k),v);};P.removeItem=function(k){return _r.call(this,K(k));};}catch(e){}})();

const RHO_MAP={'Carbon Steel (CS)':7.85,'Low Alloy Steel':7.85,'Stainless Steel 304/316':7.93,'Duplex SS':8.0,'Inconel 625':8.44,'Hastelloy C-276':8.19,'Aluminum':2.7};
const PROCS=['SMAW','GMAW','FCAW','SAW','GTAW'];
const GROOVES={B:['I','SV','DV','SB','DB','SU','SJ'],T:['SBSF','SBDF','DBSF','DBDF'],TKY:['SB','DB']};
const GROOVE_DESC={
  I:'I형 (Square)',SV:'Single-V',DV:'Double-V (X)',SB:'Single-Bevel',DB:'Double-Bevel (K)',SU:'Single-U',SJ:'Single-J',
  SBSF:'Single-Bevel + 일면필릿',SBDF:'Single-Bevel + 양면필릿',DBSF:'Double-Bevel + 일면필릿',DBDF:'Double-Bevel + 양면필릿'
};
// 폼 ↔ CSV 공통 필드 (순서 = CSV 컬럼 순서)
const FIELDS=['project','component','jointNo','qty','prodType','prodTypeName','material','material2','T','T2',
  'jointType','groove','weldLength','ang','root','gap','ratio','cap','z1','z2','tAngle',
  'tkyD','tkyd','tkyt','tkyAngle','backGouge','gougePct','wps','process'];
const NUMERIC=new Set(['qty','T','T2','weldLength','ang','root','gap','ratio','cap','z1','z2','tAngle','tkyD','tkyd','tkyt','tkyAngle','gougePct']);

const BKEY='wdc_baseline';
function bLoad(){ try{return JSON.parse(localStorage.getItem(BKEY))||[]}catch(e){return []} }
function bSave(a){ try{localStorage.setItem(BKEY,JSON.stringify(a));}catch(e){} }
function bId(){ return 'J'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function keyOf(r){ return [(r.project||'').trim(),(r.component||'').trim(),(r.jointNo||'').trim()].join('').toLowerCase(); }

let editingId=null;

function $(id){return document.getElementById(id);}
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1900); }

function initSelects(){
  $('matList').innerHTML=Object.keys(RHO_MAP).map(m=>`<option value="${m}">`).join('');
  $('procList').innerHTML=PROCS.map(p=>`<option value="${p}">`).join('');
  onJointType();
}
function onProdType(){ var s=document.getElementById('f_prodType'), of=document.getElementById('prodTypeOtherFld'); if(of) of.style.display=(s&&s.value==='other')?'':'none'; }
function prodCode(v){ v=((v||'')+'').toLowerCase().trim(); if(v==='piping'||v==='vessel'||v==='offshore'||v==='other')return v; if(/배관|pip/.test(v))return 'piping'; if(/압력|용기|vessel/.test(v))return 'vessel'; if(/해양|offshore|node|brace/.test(v))return 'offshore'; if(v==='기타')return 'other'; return ''; }
function onJointType(){
  const jt=$('f_jointType').value;
  $('f_groove').innerHTML=GROOVES[jt].map(g=>`<option value="${g}">${g} — ${GROOVE_DESC[g]||g}</option>`).join('');
  $('tkyRow').style.display = jt==='TKY' ? 'grid':'none';
  // 모재2 두께는 맞대기에서만 의미 (T이음·Branch는 붙는쪽 두께만 영향)
  const showT2 = (jt==='B');
  $('t2-fld').style.display = showT2 ? '' : 'none';
  if(!showT2) $('f_T2').value='';
  var _HL; try{_HL=(window.parent&&window.parent.WDC&&window.parent.WDC.lang&&window.parent.WDC.lang())||'ko';}catch(e){_HL='ko';}
  const hintsAll={
    ko:{B:'맞대기: 개선각 α·루트 c·갭 b 입력. DV/DB는 상부비율(h₁/h)도. 모재2 두께를 다르게 입력하면 이종두께가 자동 적용됩니다.',
        T:'T이음: 개선(SB/DB)+필릿(SF/DF). 각장 z₁(앞면)·z₂(양면), 경사각 θ. (붙는쪽 두께 t₁만 영향 — 모재2 두께 불필요)',
        TKY:'분기(Branch): 주관 OD₁·지관 OD₂·지관 두께 t·경사각 θ. 보강필릿 z₁(·z₂). (지관 두께만 영향 — 모재2 두께 불필요)'},
    en:{B:'Butt: enter bevel angle α, root face c, gap b. DV/DB also need the upper ratio (h₁/h). Enter a different base-metal-2 thickness to auto-apply dissimilar thickness.',
        T:'T-joint: bevel (SB/DB) + fillet (SF/DF). Leg z₁ (front)·z₂ (both sides), incline θ. (Only the attached-side thickness t₁ matters — base metal 2 thickness not needed.)',
        TKY:'Branch (TKY): main pipe OD₁·branch OD₂·branch thickness t·incline θ. Reinforcing fillet z₁(·z₂). (Only branch thickness matters — base metal 2 thickness not needed.)'},
    ja:{B:'突合せ: 開先角α・ルートc・ギャップbを入力。DV/DBは上部比率(h₁/h)も。母材2の厚さを変えて入力すると異厚が自動適用されます。',
        T:'T継手: 開先(SB/DB)+フィレット(SF/DF)。脚長z₁(前面)・z₂(両面)、傾斜角θ。(取付側の厚さt₁のみ影響 — 母材2の厚さ不要)',
        TKY:'分岐(Branch): 主管OD₁・枝管OD₂・枝管厚さt・傾斜角θ。補強フィレットz₁(・z₂)。(枝管厚さのみ影響 — 母材2の厚さ不要)'},
    zh:{B:'对接: 输入坡口角α·钝边c·间隙b。DV/DB还需上部比例(h₁/h)。母材2厚度输入不同值时自动应用异厚。',
        T:'T接头: 坡口(SB/DB)+角焊(SF/DF)。焊脚z₁(前面)·z₂(双面)、倾斜角θ。(仅贴合侧厚度t₁有影响 — 无需母材2厚度)',
        TKY:'分支(Branch): 主管OD₁·支管OD₂·支管厚度t·倾斜角θ。加强角焊z₁(·z₂)。(仅支管厚度有影响 — 无需母材2厚度)'},
    es:{B:'A tope: introduzca ángulo de bisel α, cara de raíz c, separación b. DV/DB también la relación superior (h₁/h). Introduzca un espesor distinto de metal base 2 para aplicar espesor disímil automáticamente.',
        T:'Junta en T: bisel (SB/DB) + filete (SF/DF). Cateto z₁ (frontal)·z₂ (ambos lados), inclinación θ. (Solo importa el espesor del lado unido t₁ — no se necesita espesor de metal base 2.)',
        TKY:'Ramal (TKY): tubo principal OD₁·ramal OD₂·espesor de ramal t·inclinación θ. Filete de refuerzo z₁(·z₂). (Solo importa el espesor del ramal — no se necesita espesor de metal base 2.)'}
  };
  const hints=hintsAll[_HL]||hintsAll.ko;

function downloadText(name,text){
  const b=new Blob([text],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}
function parseCSV(text){
  text=text.replace(/^﻿/,'');
  const rows=[];let i=0,field='',row=[],inQ=false;
  while(i<text.length){const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue;} field+=ch;i++;continue; }
    if(ch==='"'){inQ=true;i++;continue;}
    if(ch===','){row.push(field);field='';i++;continue;}
    if(ch==='\r'){i++;continue;}
    if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=ch;i++;
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  if(!rows.length)return [];
  const hdr=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(c=>c!=='')).map(r=>{const o={};hdr.forEach((h,j)=>o[h]=(r[j]!==undefined?r[j].trim():''));return o;});
}
var _pendingUpload=null;
function csvUpload(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    let recs;
    try{ recs=parseCSV(e.target.result); }catch(err){ $('upStatus').textContent='파싱 오류'; return; }
    const arr=bLoad();
    const origKeys=new Set(arr.filter(x=>(x.jointNo||'').trim()!=='').map(keyOf));
    const valids=[]; let skipped=0;
    recs.forEach(rec=>{ const o={}; FIELDS.forEach(k=>{ if(rec[k]!==undefined) o[k]=rec[k]; }); if(validate(o).length){ skipped++; return; } valids.push(o); });
    const dupCount=valids.filter(o=>(o.jointNo||'').trim()!=='' && origKeys.has(keyOf(o))).length;
    if(dupCount>0){
      _pendingUpload={valids:valids,arr:arr,skipped:skipped,total:recs.length,dup:dupCount};
      $('dupMsg').innerHTML='업로드 <b>'+recs.length+'</b>건 중 <b style="color:var(--red,#c0392b)">'+dupCount+'</b>건이 이미 등록된 Joint와 중복됩니다.<br>처리 방법을 선택하세요.';
      const sb=$('dupSkipBtn'); if(sb) sb.textContent='중복 '+dupCount+'건 제외하고 '+(valids.length-dupCount)+'건만 등록';
      $('dupModal').style.display='flex';
    } else {
      _applyUpload(valids,arr,'overwrite',skipped);
    }
  };
  rd.readAsText(file,'utf-8');
}
function dupResolve(mode){
  const m=$('dupModal'); if(m) m.style.display='none';
  const p=_pendingUpload; _pendingUpload=null; if(!p) return;
  if(mode==='cancel'){ $('upStatus').textContent='업로드 취소됨 (중복 '+p.dup+'건)'; toast('업로드를 취소했습니다.'); return; }
  _applyUpload(p.valids,p.arr,mode,p.skipped);
}
function _applyUpload(valids,arr,mode,skipped){
  let added=0,updated=0,skippedDup=0;
  valids.forEach(o=>{ const k=keyOf(o); const dup=arr.findIndex(x=>keyOf(x)===k && (o.jointNo||'').trim()!==''); if(dup>=0){ if(mode==='overwrite'){ arr[dup]={...arr[dup],...o}; updated++; } else { skippedDup++; } } else { arr.push({id:bId(),...o,actual:{pre:{},mid:{},post:{}}}); added++; } });
  bSave(arr); renderList();
  $('upStatus').textContent='추가 '+added+' · 갱신 '+updated+(skippedDup?(' · 중복제외 '+skippedDup):'')+(skipped?(' · 필수누락 '+skipped):'');
  toast('업로드 완료 — 추가 '+added+(updated?(', 갱신 '+updated):'')+(skippedDup?(', 제외 '+skippedDup):''));
}

function manpowerReset(){ MANPOWER={}; Object.keys(PROC).forEach(function(k){MANPOWER[k]={dr:PROC[k].dr,of:PROC[k].of};}); manpowerStore(); renderMpSliders(); renderStatus(); }
function toggleMp(){ var b=$('mp-body'),c=$('mp-caret'); if(!b)return; var willHide=b.style.display!=='none'; b.style.display=willHide?'none':''; if(c)c.textContent=willHide?'▸':'▾'; }
function tr(s){return s;}
const deg2rad=d=>d*Math.PI/180;

function computeDeposit(s){
  const nz=(v,d)=>{ const x=parseFloat(v); return isNaN(x)?d:x; };
  const ui=!s;

  // ── Butt joints ──
  if(jt==='ButtSquare'){
    const T=ui?gv('sqT'):(parseFloat(s.T)||6);
    const gap=ui?gv('sqGap'):(nz(s.gap,2));
    const cap=ui?gvz('sqCap',1):(nz(s.cap,1));

    const root=ui?gv('bevRoot'):(nz(s.root,0));
    const gap=ui?gv('bevGap'):(nz(s.gap,2));
    const cap=ui?gvz('bevCap',1.5):(nz(s.cap,1.5));

    const capA=Math.max(0,wTop)*cap*0.5;
    area=grooveA+gap*T+capA;
    breakdown.push({l:'Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtU'){
    const T=ui?gv('uT'):(parseFloat(s.T)||25);
    const R=ui?gv('uR'):(parseFloat(s.R)||6);
    const ang=ui?gv('uAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('uRoot'):(nz(s.root,0));
    const gap=ui?gv('uGap'):(nz(s.gap,2));
    const cap=ui?gvz('uCap',1.5):(nz(s.cap,1.5));

    area=Math.PI*R*R/2+h*(2*R+2*(R+h*Math.tan(ha)))/2+gap*T+capA;
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적',v:rnd(capA,2),u:'mm²'});
  }
  else if(jt==='ButtJ'){
    const T=ui?gv('jT'):(parseFloat(s.T)||20);
    const R=ui?gv('jR'):(parseFloat(s.R)||5);
    const ang=ui?gv('jAng'):(parseFloat(s.ang)||10);
    const root=ui?gv('jRoot'):(nz(s.root,0));
    const gap=ui?gv('jGap'):(nz(s.gap,2));
    const cap=ui?gvz('jCap',1.5):(nz(s.cap,1.5));

    const T=ui?gv('kT'):(parseFloat(s.T)||30);
    const ang=ui?gv('kAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('kRoot'):(nz(s.root,0));
    const gap=ui?gv('kGap'):(nz(s.gap,2));
    const cap=ui?gvz('kCap',1.5):(nz(s.cap,1.5));
    const ratio=(ui?gv('kRatio'):(parseFloat(s.ratio)||50))/100;
    const ha=deg2rad(ang);
    const h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
    const grooveK=(h1*h1+h2*h2)*Math.tan(ha)/2;
    const wTop1=h1*Math.tan(ha)+gap, wTop2=h2*Math.tan(ha)+gap;     // 앞면·뒷면 개선 폭 (편측 bevel)
    const capA=(Math.max(0,wTop1)+Math.max(0,wTop2))*cap*0.5;        // 양면 보강
    area=grooveK+gap*T+capA;
    breakdown.push({l:'상·하 개선부',v:rnd(grooveK,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    if(capA>0) breakdown.push({l:'Reinforcement 면적 (양면)',v:rnd(capA,2),u:'mm²'});
  }
  // ── Fillet ──
  else if(jt==='Fillet'){
    const side=ui?curFilSide:(s.filSide||'single');
    const z1=ui?gv('filZ1'):(nz(s.z1,8));
    const z2=(side==='double')?(ui?gv('filZ2'):(parseFloat(s.z2)||z1)):0;
    const k=ui?gv('filK'):(parseFloat(s.filK)||0.707);
    const gap=ui?gv('filGap'):(nz(s.gap,0));
    const a1=z1, a2=z2;
    const throat1=a1*k, throat2=a2*k;
    const areaF1=0.5*a1*a1+gap*a1;
    const areaF2=side==='double'?(0.5*a2*a2+gap*a2):0;
    area=areaF1+areaF2;
    breakdown.push({l:'목두께 throat₁',v:rnd(throat1,2),u:'mm'});
    breakdown.push({l:'앞면 단면적 A₁',v:rnd(areaF1,2),u:'mm²'});
    if(side==='double'){
      breakdown.push({l:'목두께 throat₂',v:rnd(throat2,2),u:'mm'});
      breakdown.push({l:'뒷면 단면적 A₂',v:rnd(areaF2,2),u:'mm²'});
    }
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*(a1+(side==='double'?a2:0)),2),u:'mm²',type:'gap'});
  }
  // ── T-Joint (Fillet) ──
  else if(jt==='TJoint'){
    const side=ui?curTSub:(s.tSubtype||'double');
    const z1=ui?gv('tFilZ1'):(nz(s.z1,8));
    const z2=(side!=='single')?(ui?gv('tFilZ2'):(parseFloat(s.z2)||z1)):0;
    const gap=ui?gv('tGap'):(nz(s.tGap,0));
    const cap=ui?gvz('tCap',0):(nz(s.cap,0));
    const theta=ui?gv('tAngle'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let baseArea=0;
    if(side==='single') baseArea=0.5*z1*z1+gap*z1;
    else{
      const a1=0.5*z1*z1+gap*z1;
      const a2=0.5*z2*z2+gap*z2;
      baseArea=a1+a2;
      breakdown.push({l:'앞면 A₁',v:rnd(a1,2),u:'mm²'});
      breakdown.push({l:'뒷면 A₂',v:rnd(a2,2),u:'mm²'});
    }
    // 덧살: 용접면(빗변) 볼록(+)/오목(−) 보강. 면폭 = z×√2, 용접면마다 적용. 음수 가능.
    const faceW=z1*Math.SQRT2+(side!=='single'?z2*Math.SQRT2:0);
    const capA=0.5*faceW*cap;
    area=baseArea+capA;
    if(gap>0) breakdown.push({l:'Gap 기여',v:rnd(gap*z1,2),u:'mm²',type:'gap'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── T-Joint with groove prep (V / X / Bevel / K) ──
  else if(jt==='TJointBevel'||jt==='TJointK'){
    const T=ui?gv('tgT'):(parseFloat(s.T)||16);
    const ang=ui?gv('tgAng'):(parseFloat(s.ang)||45);
    const root=ui?gv('tgRoot'):(nz(s.root,0));
    const gap=ui?gv('tgGap'):(nz(s.gap,2));
    const ratio=(ui?gv('tgRatio'):(parseFloat(s.ratio)||50))/100;
    const fil1=ui?gv('tgFil'):(nz(s.z1,0));
    const fil2=ui?gv('tgFil2'):(nz(s.z2,0));
    const cap=ui?gvz('tgCap',0):(nz(s.cap,0));
    const theta=ui?gv('tgTheta'):(parseFloat(s.tAngle)||90);
    adjFactor=1/Math.sin(deg2rad(theta));
    let grooveA=0, wFace=0;
    if(jt==='TJointBevel'){           // single bevel (HV): notch through thickness
      const h=T-root, ha=deg2rad(ang);
      grooveA=h*h*Math.tan(ha)/2+gap*T;            // gap은 부재 전체 두께 아래
      wFace=h*Math.tan(ha)+gap;                    // 용접면 폭 (개선 상부)
    } else {                          // TJointK double bevel: notches both sides
      const ha=deg2rad(ang), h1=(T-root)*ratio, h2=(T-root)*(1-ratio);
      grooveA=(h1*h1+h2*h2)*Math.tan(ha)/2+gap*T;
      wFace=(h1+h2)*Math.tan(ha)+gap;              // 양면 용접면 폭 합
    }
    // 보강 fillet: 앞면 z₁ + (양면 용접 시) 뒷면 z₂
    const filA=0.5*fil1*fil1+0.5*fil2*fil2;
    // 덧살: 용접면 볼록(+)/오목(−) 보강. 음수 가능.
    const capA=0.5*Math.max(0,wFace)*cap;
    area=grooveA+filA+capA;
    breakdown.push({l:'Groove 단면적',v:rnd(grooveA,2),u:'mm²'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (앞면 z₁)'),v:rnd(filA,2),u:'mm²'});
    if(Math.abs(capA)>0.001) breakdown.push({l:'Reinforcement 면적'+(capA<0?' (오목)':''),v:rnd(capA,2),u:'mm²'});
    if(gap>0) breakdown.push({l:'Gap 기여 (g×T)',v:rnd(gap*T,2),u:'mm²',type:'gap'});
    breakdown.push({l:'각도 팩터 Kθ',v:rnd(adjFactor,4),u:''});
  }
  // ── TKY ──
  else if(jt==='TKY'||jt==='TKYDB'){
    const D=ui?gv('tkyD'):(parseFloat(s.tkyD)||508);
    const d=ui?gv('tkyd'):(parseFloat(s.tkyd)||219);
    const tw=ui?gv('tkyt'):(parseFloat(s.tkyt)||parseFloat(s.T)||12);  // brace 벽두께 (업로드: 모재1 T 사용)
    const ang=ui?gv('tkyAng'):(parseFloat(s.ang)||45);               // 개선각 α
    const root=ui?gv('tkyRoot'):(nz(s.root,0));                      // 미입력 시 0
    const gap=ui?gv('tkyGap'):(nz(s.gap,3));
    const fil1=ui?gv('tkyFil'):(nz(s.z1,8));
    const fil2=ui?gv('tkyFil2'):(nz(s.z2,0));
    const theta=ui?gv('tkyAngle'):(parseFloat(s.tkyAngle)||parseFloat(s.tAngle)||45);  // 업로드: T 경사각 사용
    const ttype=ui?document.getElementById('tkyType').value:(s.tkyType||'Y');
    const dbl=(jt==='TKYDB');
    const sv=Math.sin(deg2rad(theta));
    // ── 기준 단면 A₀ (Ψ=90°): brace 끝단 bevel 개선 + root gap + 보강 fillet ──
    const hb=Math.max(0,tw-root), ha=deg2rad(ang);
    let grooveA, filA;
    if(!dbl){ grooveA=hb*hb*Math.tan(ha)/2; }
    else    { grooveA=2*(hb/2)*(hb/2)*Math.tan(ha)/2; }   // 양면 bevel 50/50
    filA=0.5*fil1*fil1+0.5*fil2*fil2;                     // 앞면 z₁ + 뒷면 z₂(양면 용접 시)
    const aBase=grooveA+gap*tw+filA;
    // ── 단면(둘레) 방향 국부 이면각 Ψ ──
    //   Toe Ψ=180°−θ (둔각→tan(Ψ/2)), Saddle Ψ=90°+asin(β) (코드 곡률, β=d/D), Heel Ψ=θ (1/sinθ 용입 요구)
    const beta=Math.min(0.99, D>0?d/D:0);
    const psiS=Math.PI/2+Math.asin(beta);
    const psiT=Math.PI-deg2rad(theta);
    const fs=Math.tan(psiS/2);
    const fc=Math.tan(psiT/2);
    const fh=1/sv;
    const favg=(fc+fs*2+fh)/4;
    // 경사 교차선 실제 둘레 (타원 근사: a=d/(2sinθ), b=d/2, Ramanujan)
    const ea=d/(2*sv), eb=d/2, eh=Math.pow((ea-eb)/(ea+eb),2);
    const perimIncl=Math.PI*(ea+eb)*(1+3*eh/(10+Math.sqrt(4-3*eh)));
    let favgEff=favg;
    // K-Joint: 단일 brace(Y) 계산을 2개분으로. brace 간격 g<0이면 겹침 → 중복 용착 차감
    if(ttype==='K'){
      const bgap=ui?gvz('tkyBraceGap',0):(parseFloat(s.tkyBraceGap)||0);
      const ovl=bgap<0?Math.min(-bgap, perimIncl):0; // 겹침 길이 (mm), 둘레 초과 방지
      _tkyK={count:2, overlapLen:ovl};
    }
    area=aBase; adjFactor=favgEff;         // 팩터는 adjFactor에서 1회만 적용
    breakdown.push({l:(dbl?'양면':'단면')+' Bevel 개선부',v:rnd(grooveA,2),u:'mm²'});
    breakdown.push({l:'Gap 기여 (g×t)',v:rnd(gap*tw,2),u:'mm²',type:'gap'});
    if(filA>0) breakdown.push({l:'보강 Fillet'+(fil2>0?' (양면 z₁+z₂)':' (z₁)'),v:rnd(filA,2),u:'mm²'});
    breakdown.push({l:'β = d/D',v:rnd(beta,3),u:''});
    breakdown.push({l:`Toe Ψ=${rnd(180-theta,0)}°`,v:rnd(fc,3),u:'×'});
    breakdown.push({l:`Saddle Ψ=${rnd(psiS*180/Math.PI,1)}° (90°+asin β)`,v:rnd(fs,3),u:'×'});
    breakdown.push({l:`Heel Ψ=${rnd(theta,0)}° (1/sinθ)`,v:rnd(fh,3),u:'×'});
    breakdown.push({l:'가중평균 (Toe:Saddle:Heel=1:2:1)',v:rnd(favgEff,4),u:'×'});
    breakdown.push({l:'교차선 둘레 (π·d 단순)',v:rnd(Math.PI*d,1),u:'mm'});
    breakdown.push({l:'교차선 둘레 (θ 경사 보정)',v:rnd(perimIncl,1),u:'mm — '+tr('용접 길이로 권장')});
  }

  // ── 이종 두께 맞대기: 단차 천이 필릿 (Butt 전용) ──
  if(jt.startsWith('Butt')){
    const tFieldMap={ButtSquare:'sqT',ButtV:'vT',ButtBevel:'bevT',ButtU:'uT',ButtJ:'jT',ButtX:'xT',ButtK:'kT'};
    const T1 = ui ? gv(tFieldMap[jt]) : (parseFloat(s.T)||0);
    const T2 = ui ? gv('buttT2') : (parseFloat(s.T2)||0);
    // 배치(업로드): diffAlign='Y'면 이종두께 적용. (하위호환: T₂가 T와 다르면 자동) UI는 체크박스 유지.
    const daFlag = !ui ? String(s.diffAlign||'').trim().toUpperCase() : '';
    const dOn = ui ? document.getElementById('buttDiff')?.checked
                   : ( daFlag==='Y' || (daFlag!=='N' && isFinite(T2) && T2>0 && Math.abs(T2-T1)>1e-9) );
    if(dOn){
      // 정렬: UI는 선택 유지, 배치는 flush 고정(이종두께 여부만 Y/N로 입력)
      const align = ui ? (document.getElementById('buttDiffAlign')?.value||'flush') : 'flush';
      const dT = Math.abs(T2-T1);
      if(dT>0){
        let stepA;
        if(align==='center'){
          stepA = 2*0.5*(dT/2)*(dT/2);   // 양면 단차 ΔT/2 → 필릿 2개 = ΔT²/4
          breakdown.push({l:tr('단차 필릿 양면')+` (ΔT/2=${rnd(dT/2,1)}×2)`,v:rnd(stepA,2),u:'mm²'});
        } else {
          stepA = 0.5*dT*dT;             // 일면 단차 ΔT → 필릿 1개 = ½ΔT²
          breakdown.push({l:tr('단차 필릿 일면')+` (ΔT=${rnd(dT,1)})`,v:rnd(stepA,2),u:'mm²'});
        }
        area += stepA;
      }
    }
  }

  // K-Joint: brace 2개분 면적 + 겹침(brace gap<0) 중복 용착 차감
  if((jt==='TKY'||jt==='TKYDB') && _tkyK){
    const perBrace=area;                       // 단일 brace 단면적
    let kArea=perBrace*_tkyK.count;            // 2개분
    if(_tkyK.overlapLen>0 && L>0){
      // 겹친 둘레 길이만큼 단면적 1개분 차감 (L 기준 비율 환산)
      const dedFrac=Math.min(1, _tkyK.overlapLen/L);
      kArea-=perBrace*dedFrac;
      breakdown.push({l:tr('K 겹침 차감')+` (overlap ${rnd(_tkyK.overlapLen,0)}mm)`,v:'−'+rnd(perBrace*dedFrac,2),u:'mm²',type:'pjp'});
      breakdown.push({l:'⚠ 겹침부 용착량은 별도 상세도·PQR로 산정',v:'',u:'',type:'pjp'});
    }
    breakdown.push({l:`K-Joint brace ×${_tkyK.count}`,v:rnd(kArea,2),u:'mm² (유효)'});
    area=kArea;
  }

  const adjArea=area*adjFactor;
  // Back gouging: extra deposit as % of total
  const gouge = ui ? (document.getElementById('backGouge')?.checked ? gv('gougePctNum') : 0)
                   : (s.backGouge===true||s.backGouge==='Y' ? (nz(s.gougePct,10)) : 0);
  const gougeFactor = 1 + gouge/100;
  const vol=adjArea*L/1000*gougeFactor;
  const mass=vol*rho/1000;
  const rod=mass/eta;
  if(gouge>0) breakdown.push({l:'Back Gouging 추가',v:'+'+rnd(gouge,0),u:'%',type:'pjp'});
  return {area:rnd(area,3),adjFactor:rnd(adjFactor,4),adjArea:rnd(adjArea,3),gouge:rnd(gouge,0),vol:rnd(vol,3),mass:rnd(mass,4),rod:rnd(rod,4),perM:rnd(mass*1000/L,4),rho,breakdown};
}
function mapJointCode(row){
  const fam=(row.jointType||'').trim().toUpperCase();
  const gv=(row.groove||'').trim().toUpperCase();
  const r={...row}; let code=null;
  if(fam==='B'||fam==='BUTT'){ code=({I:'ButtSquare',SV:'ButtV',DV:'ButtX',SB:'ButtBevel',DB:'ButtK',SU:'ButtU',SJ:'ButtJ'})[gv]; }
  else if(fam==='T'||fam==='TJOINT'||fam==='T-JOINT'){ const m=gv.match(/^(SB|DB)(SF|DF)?$/); if(m){ code=m[1]==='SB'?'TJointBevel':'TJointK'; if(m[2]==='DF'){ if(r.z2===undefined||r.z2==='') r.z2=(r.z1!==undefined&&r.z1!=='')?r.z1:8; } else { r.z2=0; } } }
  else if(fam==='TKY'){ code=(gv==='DB')?'TKYDB':'TKY'; const ta=String(r.tkyAngle||'').trim().toUpperCase(); if(ta===''||ta==='N/A'||ta==='NA'){ if(r.tAngle!==undefined&&r.tAngle!==''&&String(r.tAngle).toUpperCase()!=='N/A') r.tkyAngle=r.tAngle; else if(r.ang!==undefined&&r.ang!=='') r.tkyAngle=r.ang; } const tt=String(r.tkyt||'').trim().toUpperCase(); if((tt===''||tt==='N/A'||tt==='NA')&&r.T!==undefined&&r.T!=='') r.tkyt=r.T; }
  if(!code){ const d=(row.jointType||'').trim(); if(['ButtSquare','ButtV','ButtX','ButtBevel','ButtK','ButtU','ButtJ','Fillet','TJoint','TJointBevel','TJointK','TKY','TKYDB'].includes(d)) code=d; }
  r.jointType=code||'ButtV'; return r;
}
function calcRow(row){
  const m=mapJointCode(row);
  if(m.diffAlign){ m.diffAlign=String(m.diffAlign).trim().toLowerCase(); }
  if(m.backGouge!==undefined){ const b=String(m.backGouge).trim().toUpperCase(); m.backGouge=(b==='Y'||b==='YES'||b==='TRUE')?'Y':'N'; }
  const rho=parseFloat(row.rho)||(RHO_MAP[row.material]||7.85);
  const proc=row.process||'SMAW';
  const eff=parseFloat(row.efficiency)||(PROC[proc]?.iiw||80);
  return computeDeposit({...m,rho,efficiency:eff});
}
function actualMass(b){
  const a=b.actual||{},post=a.post||{},mid=a.mid||{};
  const proc=b.process||'SMAW'; const eff=(PROC[proc]?.iiw||80)/100;
  const u=parseFloat(post.usedKg); if(!isNaN(u)&&u>0) return u*eff;
  const dr=parseFloat(mid.depRate),am=parseFloat(mid.arcMin); if(!isNaN(dr)&&!isNaN(am)&&dr>0&&am>0) return dr*am/60;
  return null;
}
function blLoad(){ try{return JSON.parse(localStorage.getItem('wdc_baseline'))||[]}catch(e){return[]} }
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ISONAME={ButtSquare:'Square (I)',ButtV:'Single-V',ButtX:'Double-V',ButtBevel:'Single-Bevel',ButtK:'Double-Bevel',ButtU:'Single-U',ButtJ:'Single-J',Fillet:'Fillet',TJoint:'T-Fillet',TJointBevel:'T Single-Bevel',TJointK:'T Double-Bevel',TKY:'TKY',TKYDB:'TKY-DB'};

function agg(rs){ const sum=f=>rs.reduce((s,r)=>s+f(r)*r.qty,0); return { joints:rs.reduce((s,r)=>s+r.qty,0), lines:rs.length, theo:sum(r=>r._r.mass||0), rod:sum(r=>r._r.rod||0) }; }

function periodKey(dstr,mode){
  if(!dstr) return '미지정';
  var d=new Date(dstr); if(isNaN(d.getTime())) return '미지정';
  if(mode==='week'){ var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); var day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3); var ft=new Date(Date.UTC(t.getUTCFullYear(),0,4)); var w=1+Math.round(((t-ft)/86400000-3+((ft.getUTCDay()+6)%7))/7); return t.getUTCFullYear()+'-W'+('0'+w).slice(-2); }
  return String(dstr).slice(0,7);
}
function _pbar(v,max,c){ var w=max>0?Math.max(2,Math.round(v/max*100)):2; return '<div style="height:5px;border-radius:3px;background:'+c+';width:'+w+'%;margin-top:3px;opacity:.85"></div>'; }

  var keys=Object.keys(g).filter(function(k){return k!=='미지정';}).sort(); if(g['미지정']) keys.push('미지정');
  if(!keys.length){ box.innerHTML='<div class="empty">'+(ranged?'지정한 기간에 해당하는 실적이 없습니다.':'Route Card에서 작업 일자를 입력하면 기간별 실적이 집계됩니다.')+'</div>'; return; }

function svgHBars(rows,opts){
  opts=opts||{}; const W=opts.w||700,Lw=opts.lw||140,vw=72,pad=8; const Bw=W-Lw-vw-pad;
  let maxV=0; rows.forEach(r=>r.segs.forEach(s=>{ if(s.v>maxV)maxV=s.v; })); if(maxV<=0)maxV=1;
  const barH=opts.barH||13,gap=4,grp=opts.grp||9; let y=8,body='';
  rows.forEach(r=>{ const rowH=r.segs.length*(barH+gap)-gap;
    body+=`<text x="0" y="${y+rowH/2+4}" font-size="11" font-weight="${r.labelColor?700:400}" fill="${r.labelColor||'#333'}">${esc(r.label)}</text>`;
    r.segs.forEach(s=>{ const w=Math.max(1,s.v/maxV*Bw);
      body+=`<rect x="${Lw}" y="${y}" width="${w.toFixed(1)}" height="${barH}" fill="${s.color}" rx="2"/>`;
      body+=`<text x="${(Lw+w+5).toFixed(1)}" y="${y+barH-2}" font-size="10" fill="#444">${esc(s.t)}</text>`;
      y+=barH+gap; });
    y+=grp; });
  const H=y+2;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">${body}</svg>`;
}

function _scope(){

    sc.groups.forEach(g=>{ const R=reportFor(g.rs,g.name); html+='<div class="rp-proj">■ '+RT('프로젝트')+': '+esc(g.name)+'</div>'+_reportBody(R,f); });
    html+='<div class="rp-sec">'+RT('전체 분석 요약')+'</div><ul class="rp-an">'+Rall.analysis.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';

/* ---- PPTX slide builders ---- */
function _titleSlide(R,subtitle){ var s='',P=Math.round(0.7*EMU),f=(n,d)=>rnd(n,d),k=R.kpi;
  s+=_rect(2,0,0,SLW,Math.round(2.4*EMU),'00843D');
  s+=_tx(3,'t',P,Math.round(0.55*EMU),Math.round(11.9*EMU),Math.round(1.1*EMU),[{runs:[{t:RT('용접 용착량 현황 보고서'),sz:3600,b:true,color:'FFFFFF'}]}]);
  s+=_tx(4,'s',P,Math.round(1.6*EMU),Math.round(11.9*EMU),Math.round(0.6*EMU),[{runs:[{t:subtitle,sz:1500,color:'E9F6EE'}]}]);
  s+=_tx(5,'b',P,Math.round(3.0*EMU),Math.round(11.9*EMU),Math.round(3.9*EMU),[
    {runs:[{t:'• '+RT('Joint 수')+': '+k.joints,sz:1800}]},
    {runs:[{t:'• '+RT('총 이론 용착량')+': '+f(k.theo,2)+' kg',sz:1800}]},
    {runs:[{t:'• '+RT('총 실제 용착량')+': '+(k.act!=null?f(k.act,2)+' kg':'-')+' ('+k.nAct+'/'+k.total+')',sz:1800}]},
    {runs:[{t:'• '+RT('이론 대비')+': '+(k.act!=null?((k.dPct>=0?'+':'')+f(k.dPct,1)+'%'):'-'),sz:1800,b:true,color:(Math.abs(k.dPct)>15?'D70015':'006B33')}]},
    {runs:[{t:'• '+RT('총 필요 용접봉')+': '+f(k.rod,2)+' kg',sz:1800}]},
    {runs:[{t:'• '+RT('총 예상 시수')+': '+f(k.mh,1)+' h',sz:1800}]}
  ]); return s;
}
function _barSlide(title, rws){ // rws:[{name,theo,act,hasAct}]
  var s='',P=Math.round(0.7*EMU),f=(n,d)=>rnd(n,d);
  s+=_tx(2,'t',P,Math.round(0.5*EMU),Math.round(11.9*EMU),Math.round(0.9*EMU),[{runs:[{t:title,sz:2600,b:true,color:'006B33'}]}]);
  s+=_rect(3,P,Math.round(1.35*EMU),Math.round(0.22*EMU),Math.round(0.22*EMU),'00843D');
  s+=_tx(4,'l1',P+Math.round(0.32*EMU),Math.round(1.28*EMU),Math.round(2*EMU),Math.round(0.35*EMU),[{runs:[{t:RT('이론'),sz:1200}]}]);
  s+=_rect(5,P+Math.round(1.7*EMU),Math.round(1.35*EMU),Math.round(0.22*EMU),Math.round(0.22*EMU),'2563EB');
  s+=_tx(6,'l2',P+Math.round(2.02*EMU),Math.round(1.28*EMU),Math.round(2*EMU),Math.round(0.35*EMU),[{runs:[{t:RT('실제'),sz:1200}]}]);
  var maxV=1; rws.forEach(function(r){ maxV=Math.max(maxV,r.theo,r.hasAct?r.act:0); });
  var x0=P+Math.round(1.9*EMU),areaW=Math.round(8.4*EMU),y=Math.round(2.0*EMU),id=10;
  rws.forEach(function(r){
    s+=_tx(id++,'l',P,y-Math.round(0.02*EMU),Math.round(1.8*EMU),Math.round(0.3*EMU),[{runs:[{t:r.name,sz:1200,b:true}]}]);
    var wT=Math.max(9525,Math.round(r.theo/maxV*areaW)); s+=_rect(id++,x0,y,wT,Math.round(0.22*EMU),'00843D');
    s+=_tx(id++,'vt',x0+wT+Math.round(0.05*EMU),y-Math.round(0.04*EMU),Math.round(1.6*EMU),Math.round(0.3*EMU),[{runs:[{t:f(r.theo,2),sz:1100}]}]);
    y+=Math.round(0.30*EMU);
    if(r.hasAct){ var wA=Math.max(9525,Math.round(r.act/maxV*areaW)); s+=_rect(id++,x0,y,wA,Math.round(0.22*EMU),'2563EB'); s+=_tx(id++,'va',x0+wA+Math.round(0.05*EMU),y-Math.round(0.04*EMU),Math.round(1.6*EMU),Math.round(0.3*EMU),[{runs:[{t:f(r.act,2),sz:1100}]}]); y+=Math.round(0.30*EMU); }
    y+=Math.round(0.12*EMU);
  });
  return s;
}
function _mhBarSlide(title,items){ var s='',P=Math.round(0.7*EMU),f=(n,d)=>rnd(n,d);
  s+=_tx(2,'t',P,Math.round(0.5*EMU),Math.round(11.9*EMU),Math.round(0.9*EMU),[{runs:[{t:title,sz:2600,b:true,color:'006B33'}]}]);
  var maxV=1; items.forEach(function(it){maxV=Math.max(maxV,it.val);});
  var x0=P+Math.round(1.9*EMU),areaW=Math.round(8.2*EMU),y=Math.round(1.7*EMU),id=10;
  items.forEach(function(it){ s+=_tx(id++,'l',P,y-Math.round(0.02*EMU),Math.round(1.8*EMU),Math.round(0.32*EMU),[{runs:[{t:it.name,sz:1200,b:true}]}]);
    var w=Math.max(9525,Math.round(it.val/maxV*areaW)); s+=_rect(id++,x0,y,w,Math.round(0.26*EMU),'7C3AED');
    s+=_tx(id++,'v',x0+w+Math.round(0.05*EMU),y-Math.round(0.05*EMU),Math.round(1.8*EMU),Math.round(0.32*EMU),[{runs:[{t:f(it.val,1)+' h',sz:1100}]}]); y+=Math.round(0.42*EMU); });
  return s;
}
function _bulletSlide(title,lines,titleSz){ var s='',P=Math.round(0.7*EMU);
  s+=_tx(2,'t',P,Math.round(0.5*EMU),Math.round(11.9*EMU),Math.round(0.9*EMU),[{runs:[{t:title,sz:(titleSz||2800),b:true,color:'006B33'}]}]);
  s+=_tx(3,'b',P,Math.round(1.5*EMU),Math.round(11.9*EMU),Math.round(5.2*EMU),lines.length?lines:[{runs:[{t:'-',sz:1500}]}]); return s;
}
function _slidesFull(R){ var f=(n,d)=>rnd(n,d); var out=[];
  out.push(_titleSlide(R, RT('프로젝트')+': '+R.project+'   ·   '+R.date));
  out.push(_barSlide(RT('프로세스별 이론 vs 실제'), R.procRows));
  out.push(_mhBarSlide(RT('Component별 시수'), R.compRows.map(r=>({name:r.name,val:r.mh}))));
  out.push(_bulletSlide(RT('분석 요약'), R.analysis.map(x=>({runs:[{t:'• '+x,sz:1600}]}))));
  out.push(_bulletSlide(RT('프로세스별 집계'), R.procRows.map(r=>({runs:[{t:'• '+r.name+' — '+RT('Joint 수')+' '+r.joints+', '+RT('이론(kg)')+' '+f(r.theo,2)+', '+RT('필요 용접봉(kg)')+' '+f(r.rod,2)+', '+RT('투입 시수(h)')+' '+f(r.mh,1)+', η '+r.eff+'%',sz:1500}]}))));
  out.push(_bulletSlide(RT('Component별 집계'), R.compRows.map(r=>({runs:[{t:'• '+r.name+' — '+RT('Joint 수')+' '+r.joints+', '+RT('이론(kg)')+' '+f(r.theo,2)+' ('+r.pct+'%)',sz:1500}]}))));
  var dv=R.jrows.filter(j=>j.pct!=null).sort((x,y)=>Math.abs(y.pct)-Math.abs(x.pct)).slice(0,12);
  out.push(_bulletSlide(RT('이론 vs 실제 — Joint별')+' · '+RT('편차 상위'), dv.map(j=>({runs:[{t:'• '+j.joint+' / '+j.comp+' — '+RT('이론(kg)')+' '+f(j.theo,2)+', '+RT('실제(kg)')+' '+f(j.act,2)+', '+(j.pct>=0?'+':'')+f(j.pct,1)+'%',sz:1400,color:(Math.abs(j.pct)>15?'D70015':'1D1D1F')}]})),2400));
  return out;
}
function _slidesProject(R){ var f=(n,d)=>rnd(n,d); var k=R.kpi; var lines=[
    {runs:[{t:RT('Joint 수')+' '+k.joints+'  ·  '+RT('총 이론 용착량')+' '+f(k.theo,2)+' kg  ·  '+RT('총 실제 용착량')+' '+(k.act!=null?f(k.act,2)+' kg':'-')+'  ·  '+RT('이론 대비')+' '+(k.act!=null?((k.dPct>=0?'+':'')+f(k.dPct,1)+'%'):'-')+'  ·  '+RT('총 예상 시수')+' '+f(k.mh,1)+' h',sz:1500,b:true}]}
  ].concat(R.analysis.map(x=>({runs:[{t:'• '+x,sz:1400}]})))
   .concat(R.procRows.map(r=>({runs:[{t:'· '+r.name+': '+RT('이론(kg)')+' '+f(r.theo,2)+(r.hasAct?', '+RT('실제(kg)')+' '+f(r.act,2):''),sz:1300,color:'515154'}]})));
  return _bulletSlide('■ '+RT('프로젝트')+': '+R.project, lines, 2200);
}
function pptReport(){
  const sc=_scope(); var slides=[];
  if(!sc.isAll){ slides=_slidesFull(reportFor(sc.groups[0].rs, sc.pick)); }
  else {
    const Rall=reportFor(sc.all, RT('전체'));
    slides.push(_titleSlide(Rall, RT('전체')+' ('+sc.groups.length+' '+RT('프로젝트')+')   ·   '+Rall.date));
    slides.push(_barSlide(RT('프로젝트별 이론 vs 실제'), sc.groups.map(g=>{ const R=reportFor(g.rs,g.name); return {name:g.name,theo:R.kpi.theo,act:(R.kpi.act||0),hasAct:R.kpi.act!=null}; })));
    slides.push(_bulletSlide(RT('분석 요약'), Rall.analysis.map(x=>({runs:[{t:'• '+x,sz:1600}]}))));
    sc.groups.forEach(g=>{ slides.push(_slidesProject(reportFor(g.rs,g.name))); });
  }
  const bytes=buildPptx(slides);
  _dl(bytes,'welding_status_report_'+_today()+'.pptx','application/vnd.openxmlformats-officedocument.presentationml.presentation');
}

<style>

*{box-sizing:border-box;margin:0;padding:0}

.btn-save:hover{filter:brightness(1.06)}
.btn-clear{padding:8px 14px;font-size:12.5px;font-weight:600;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:.15s}
.btn-clear:hover{color:var(--accent);border-color:var(--accent-bd);background:var(--accent-bg)}
@media(max-width:440px){.actbar{justify-content:stretch}.btn-save,.btn-clear{flex:1 1 0}}
.stitle::before{content:'';width:3.5px;height:13px;border-radius:3px;background:var(--grad);flex-shrink:0}
/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:680px){.g3{grid-template-columns:1fr 1fr}}
.g2,.g3{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.blgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.fld.s2{grid-column:span 2}
.ndebox{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.nderow{display:flex;gap:6px;align-items:center}
.nderow .chip{min-width:46px;text-align:center;flex:0 0 auto}
.ndesel{flex:1 1 auto;min-width:0;height:34px;border:1px solid var(--border2);border-radius:8px;background:var(--field);color:var(--text);font-size:12px;padding:0 6px}
.ndesel:disabled{opacity:.5}
@media(max-width:440px){.g2,.g3,.blgrid{grid-template-columns:repeat(2,1fr)}}
#recModal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);align-items:flex-start;justify-content:center;padding:24px 14px;overflow:auto}
#recModalCard{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh2);max-width:480px;width:100%;padding:20px}
#fmtModal{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:20px}
#fmtCard{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh2);max-width:320px;width:100%;padding:20px}
#rcprint{display:none}
@media print{ body.printing{background:#fff} body.printing>*:not(#rcprint){display:none!important} body.printing #rcprint{display:block!important} @page{size:A4;margin:9mm} }
.mt{margin-top:.7rem}.span2{grid-column:1/-1}
/* fields */
.fld{display:flex;flex-direction:column;gap:4px;min-width:0}
.fld label{font-size:11px;font-weight:650;color:var(--text2);user-select:none;letter-spacing:.1px}
.fld .hint{font-size:10px;color:var(--text3);margin-top:1px;line-height:1.45}
.fld input,.fld select{width:100%;height:36px;padding:0 11px;font-size:13px;font-variant-numeric:tabular-nums;border:1px solid var(--border2);border-radius:var(--rs);background:var(--field);color:var(--text);transition:border-color .15s,box-shadow .15s,background .15s;-webkit-appearance:none;appearance:none}
.fld select{padding-right:28px;background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' fill='none' stroke='%238b9ab1' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;cursor:pointer}
.fld input:hover,.fld select:hover{border-color:var(--accent-bd)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3.5px color-mix(in srgb,var(--accent) 16%,transparent)}
@supports not (background:color-mix(in srgb,red 50%,blue)){.fld input:focus,.fld select:focus{box-shadow:0 0 0 3.5px rgba(0,132,61,.16)}}
.fld input:disabled{opacity:.55;cursor:not-allowed;background:var(--bg)}
/* tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.7rem}
.tab{padding:7px 14px;font-size:12px;font-weight:600;border-radius:999px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:.16s;white-space:nowrap;line-height:1.4}
.tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,132,61,.28)}
.tab:hover:not(.active){background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd);transform:translateY(-1px)}
.tab .sym{font-size:15px;margin-right:5px;vertical-align:-1px}
/* iso badge */
.iso-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:linear-gradient(135deg,var(--accent-bg),var(--card));border:1px solid var(--accent-bd);border-radius:var(--rs);margin-bottom:.7rem;font-size:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.iso-badge .sym{font-size:18px;font-weight:700;color:var(--accent)}
.iso-badge .name{font-weight:700;color:var(--text)}
.iso-badge .desc{font-size:11px;color:var(--text3)}
/* chk */
.chk-row{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:550;color:var(--text2);cursor:pointer;margin:.55rem 0 0;padding:9px 12px;background:var(--field);border-radius:var(--rs);border:1px solid var(--border);transition:.15s}
.chk-row:hover{border-color:var(--accent-bd);background:var(--accent-bg)}
.chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:999px;padding:6px 12px;cursor:pointer;background:transparent;color:var(--text2);transition:.15s;user-select:none}
.chip.on{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(0,132,61,.25)}
.chip.amber.on{background:linear-gradient(135deg,#caa400,#9a7b00)}
/* results */
.res-hi{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:.8rem}
@media(max-width:420px){.res-hi{grid-template-columns:1fr 1fr}}
.rc{position:relative;background:linear-gradient(150deg,var(--accent-bg) 0%,var(--card) 120%);border:1px solid var(--accent-bd);border-radius:12px;padding:.7rem .9rem;overflow:hidden;transition:.18s}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad)}
.rc.warn{background:linear-gradient(150deg,var(--warn-bg) 0%,var(--card) 120%);border-color:var(--warn-bd)}
.rc.warn::before{background:linear-gradient(180deg,var(--warn),var(--warn2))}
.rc .rl{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:4px;letter-spacing:.2px}
.rc.warn .rl{color:var(--warn)}
.rc .rv{font-size:22px;font-weight:800;color:var(--accent);line-height:1.05;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.rc.warn .rv{color:var(--warn)}
.rc .ru{font-size:10px;color:var(--accent);opacity:.7;margin-top:2px}
.rc.warn .ru{color:var(--warn);opacity:.7}
.det{background:var(--field);border:1px solid var(--border);border-radius:var(--rs);padding:.45rem 1rem;margin-top:.6rem}
.dr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5.5px 0;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2)}
.dr:last-child{border-bottom:none}
.dr .dv{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.dr .dv.gap{color:var(--gap)}.dr .dv.pjp{color:var(--pjp)}
.dr .du{font-size:10px;font-weight:450;color:var(--text3);margin-left:3px}
/* diff banner */
.diff{margin-top:.7rem;border-radius:12px;padding:.8rem 1rem;border:1px solid var(--border2);background:var(--field)}
.diff .dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:5px}
.diff .dbig{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.diff .dmeta{font-size:11.5px;color:var(--text3);margin-top:7px;font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;font-weight:700;margin-left:9px;vertical-align:middle}
.tag.over{background:var(--warn-bg);color:var(--warn)}
.tag.under{background:var(--accent-bg);color:var(--accent)}
.tag.ok{background:var(--accent-bg);color:var(--accent)}
/* buttons */
.btn{padding:9px 16px;font-size:12.5px;font-weight:600;border-radius:999px;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.16s;white-space:nowrap}
.btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd);transform:translateY(-1px)}
.btn.pri{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 9px rgba(0,132,61,.30)}
.btn.pri:hover{filter:brightness(1.07);color:#fff}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.8rem}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700}
.bn{background:var(--accent-bg);color:var(--accent)}
.bw{background:var(--warn-bg);color:var(--warn)}
.bp{background:var(--pjp-bg);color:var(--pjp)}
.empty{padding:2.2rem;text-align:center;color:var(--text3);font-size:13px}
.hidden{display:none!important}
/* table */
.batch-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--rs)}
table.bt{width:100%;border-collapse:collapse;font-size:12px;min-width:720px}
table.bt th{position:sticky;top:0;z-index:1;background:var(--field);padding:8px 10px;font-weight:700;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.55px;border-bottom:2px solid var(--border2);text-align:left;white-space:nowrap}
table.bt td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums}
table.bt tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--field) 55%,transparent)}
table.bt tr:hover td{background:var(--accent-bg)}
td.r{text-align:right}
.delx{color:var(--red);cursor:pointer;border:none;background:none;font-size:15px;font-weight:700;padding:0 4px}
.sumbar{display:flex;gap:18px;flex-wrap:wrap;padding:.8rem .2rem 0;font-size:12px}
.sumbar .it{display:flex;flex-direction:column}
.sumbar .it span{color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.sumbar .it b{font-size:16px;font-variant-numeric:tabular-nums}
#toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(56px) scale(.96);background:linear-gradient(135deg,#16213b,#0f1c2e);color:#fff;padding:.6rem 1.25rem;border-radius:999px;font-size:12.5px;font-weight:600;opacity:0;transition:.26s cubic-bezier(.2,.9,.3,1.2);z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.foot{font-size:11px;color:var(--text3);text-align:center;margin:1.4rem auto 0;line-height:1.6;max-width:760px}
.foot code{background:var(--card);padding:1px 6px;border-radius:5px;border:1px solid var(--border)}
</style>

<body>
<style>
/* responsive safety net */
html,body{overflow-x:hidden}
.grid>*,.g2>*,.g3>*,.g4>*,.fld{min-width:0}
.fld>input,.fld>select,.fld>textarea{width:100%;max-width:100%}
label,.hint,.note{overflow-wrap:break-word}
.stitle{flex-wrap:wrap;row-gap:6px}
@media(max-width:520px){.grid,.g2,.g3,.g4{grid-template-columns:1fr!important}
.btn,.hbtn,.tab,button{white-space:nowrap}
.stitle,.actbar,.tabs,.mtoolbar,.chips,.toolbar{flex-wrap:wrap}
.appnav{flex-wrap:nowrap}
.topbar{flex-wrap:wrap;height:auto;min-height:46px;padding-top:4px;padding-bottom:4px}}
</style>

<header>
  <h1><span class="logo">📋</span><span class="htitle">Welding <em>Route Card</em></span></h1>
  <div class="hmodes">
    <button class="hbtn" onclick="resetForm()">새 Joint</button>
    <button class="hbtn" onclick="exportJSON()">저장하기</button>
    <button class="hbtn" onclick="document.getElementById('imp').click()">불러오기</button>
    <input id="imp" type="file" accept=".json" class="hidden" onchange="importJSON(event)">
  </div>
</header>

<main>
  <div class="card">
    <div class="stitle">Route Card 유형</div>
    <div class="tabs" id="typeTabs">
      <button class="tab active" data-t="piping" onclick="setType('piping')">배관 Piping</button>
      <button class="tab" data-t="vessel" onclick="setType('vessel')">압력용기 Vessel</button>
      <button class="tab" data-t="offshore" onclick="setType('offshore')">해양 구조물 Offshore</button>
    </div>
    
  </div>
  <div class="card" id="bl-card">
    <div class="stitle"><svg class="tic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><path d="M12 7v13"/><path d="M5 12a7 7 0 0 0 14 0"/><path d="M4 12h2M18 12h2"/></svg> 기준정보 불러오기</div>
    <div id="bl-empty" style="font-size:12.5px;color:var(--text3);margin-bottom:6px">‘기준 정보 등록’ 앱에서 먼저 기준정보를 등록(또는 일괄 업로드)하세요.</div>
    <div style="position:relative">
      <input id="bl-combo" type="search" autocomplete="off" placeholder="Joint 검색·선택 (프로젝트·Component·Joint·WPS)" oninput="blComboOpen()" onfocus="blComboOpen()" onblur="blComboBlur()" style="width:100%;height:36px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--field);color:var(--text);padding:0 12px">
      <div id="bl-combo-list" style="display:none;position:absolute;left:0;right:0;top:39px;z-index:40;max-height:280px;overflow:auto;background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);box-shadow:0 10px 28px rgba(0,0,0,.2)"></div>
    </div>
    <div id="bl-ref" style="margin-top:8px"></div>
  </div>
  <div class="card">
        <div class="stitle">기본 정보</div>
        <div class="g2">
          <div class="fld"><label>Project / Job No.</label><input id="proj" placeholder="P-2025-014" oninput="this.removeAttribute('data-ko')"></div>
          <div class="fld"><label>Route Card No.</label><input id="rcno"></div>
          <div class="fld"><label>Weld No.</label><input id="weldno" placeholder="W-001"></div><div class="fld"><label>모재1 재질</label><input id="bl-material" placeholder="미입력 시 유지" oninput="this.removeAttribute('data-ko')"></div><div class="fld"><label>모재2 재질</label><input id="bl-material2" placeholder="미입력 시 모재1" oninput="this.removeAttribute('data-ko')"></div>

          <div class="fld" data-only="piping"><label>Line No.</label><input id="lineno"></div>
          
          <div class="fld" data-only="piping"><label>Isometric / Dwg No.</label><input id="isono"></div>
          

          
          <div class="fld" data-only="vessel"><label>Part</label><select id="vpart"><option>Shell</option><option>Head</option><option>Nozzle</option><option>Manway</option><option>Pad</option><option>Support</option></select></div>
          
          
          <div class="fld" data-only="vessel"><label>Code</label><select id="vcode"><option>ASME VIII Div.1</option><option>ASME VIII Div.2</option><option>EN 13445</option><option>PD 5500</option></select></div>

          <div class="fld" data-only="offshore"><label>Structure / Module No.</label><input id="modno"></div>
          <div class="fld" data-only="offshore"><label>Member / Node No.</label><input id="memno"></div>
          
          

          <div class="fld"><label>작업 일자</label><input id="wdate" type="date"></div>
        </div>
              </div>
  <div class="phase"><span class="step">1</span>용접 전</div>
  <div class="card"><div class="stitle">Joint & 개선 형상</div><div class="card-hint"><svg class="tic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v10"/><path d="M8 10l4 3 4-3"/><path d="M5 19h14"/></svg> 기준정보 불러오면 형상·치수가 자동 입력됩니다 · 실측 후 다르면 수정하세요</div>
        <div class="fld span2" style="margin-bottom:10px">
          <label>Joint Type</label>
          <div class="chips" id="jointTypeChips"></div>
        </div>
        <div class="g2">
          <div class="fld"><label>개선 형상 · Groove</label>
            <select id="groove" onchange="onGroove()">
              <option value="ButtSquare">Square / I (맞대기)</option>
              <option value="ButtV" selected>Single-V (V형)</option>
              <option value="ButtX">Double-V (X형)</option>
              <option value="ButtBevel">Single Bevel (일면)</option>
              <option value="ButtK">Double Bevel (K형)</option>
              <option value="ButtU">Single-U (U형)</option>
              <option value="ButtJ">Single-J (J형)</option>
              <option value="Fillet">Fillet (필릿)</option>
              <option value="TJoint">T-Joint Fillet (경사 T)</option>
              <option value="TJointBevel">T + Single Bevel (T·일면개선)</option>
              <option value="TJointK">T + Double Bevel (T·양면개선 K)</option>
              <option value="TKY">TKY — 단면 Bevel</option>
              <option value="TKYDB">TKY — 양면 Bevel (K)</option>
            </select></div>
          <div class="fld"><label>두께 t₁ (mm)</label><input id="bl_pre_t1" type="number" step="any" oninput="recalc()"></div>
          <div class="fld"><label>두께 t₂ (mm)</label><input id="bl_pre_t2" type="number" step="any" oninput="recalc()"></div>

          <div class="fld" data-f="gap"><label>Root Gap (mm)</label><input id="bl_pre_gap" type="number" step="any" oninput="recalc()"></div>
          <div class="fld" data-f="cap"><label>덧살 cap (mm)</label><input id="cap" type="number" step="any" value="1.5" oninput="recalc()"></div>
          <div class="fld" data-f="ratio"><label>상부 비율 (%)</label><input id="ratio" type="number" step="any" value="50" oninput="recalc()"></div>
          <div class="fld" data-f="R"><label>Root 반경 R (mm)</label><input id="R" type="number" step="any" value="6" oninput="recalc()"></div>
          <div class="fld" data-f="z1"><label>각장 z₁ (mm)</label><input id="z1" type="number" step="any" value="8" oninput="recalc()"></div>

          <div class="fld" data-f="filside"><label>Fillet 면</label><select id="filSide" onchange="recalc()"><option value="single">단면 (single)</option><option value="double">양면 (double)</option></select></div>
          <div class="fld" data-f="tsub"><label>T-Joint 면</label><select id="tSub" onchange="recalc()"><option value="single">단면</option><option value="double">양면</option></select></div>
          <div class="fld" data-f="tAngle"><label>T 경사각 θ (°)</label><input id="tAngle" type="number" step="any" value="90" oninput="recalc()"></div>
        </div>
        <div id="tkyGroup" class="hidden">
          <div class="g3 mt">
            <div class="fld"><label>Chord OD₁ (mm)</label><input id="tkyD" type="number" step="any" value="508" oninput="recalc()"></div>
            <div class="fld"><label>Brace OD₂ (mm)</label><input id="tkyd" type="number" step="any" value="219" oninput="recalc()"></div>
            <div class="fld"><label>Brace 두께 t (mm)</label><input id="tkyt" type="number" step="any" value="12" oninput="recalc()"></div>
            <div class="fld"><label>개선각 α (°)</label><input id="tkyAng" type="number" step="any" value="45" oninput="recalc()"></div>
            <div class="fld"><label>Root Face (mm)</label><input id="tkyRoot" type="number" step="any" value="0" oninput="recalc()"></div>
            <div class="fld"><label>Root Gap (mm)</label><input id="tkyGap" type="number" step="any" value="3" oninput="recalc()"></div>
            <div class="fld"><label>보강 Fillet z₁ (mm)</label><input id="tkyFil" type="number" step="any" value="8" oninput="recalc()"></div>
